<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Prestige Gallery</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Garamond', serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #d4af37; background: rgba(0,0,0,0.85); padding: 15px 25px; border: 1px solid #d4af37; pointer-events: none; z-index: 10; }
        #joystick-container { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; z-index: 100; }
        #start { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #000; background: #d4af37; padding: 15px 60px; border: none; cursor: pointer; z-index: 1000; font-weight: bold; font-size: 22px; letter-spacing: 3px; box-shadow: 0 0 40px rgba(212,175,55,0.4); }
    </style>
</head>
<body>

<div id="ui">
    <h2 style="margin:0; letter-spacing: 5px;">GRAND OPENING</h2>
    <p style="margin:5px 0 0; color: #fff; font-size: 12px; opacity: 0.8;">Step forward to enter the boutique</p>
</div>
<div id="start">ENTER</div>
<div id="joystick-container"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.1/nipplejs.min.js"></script>

<script>
let watches = [];

// ==== الإعدادات الأساسية ====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020202);
scene.fog = new THREE.Fog(0x020202, 10, 45); // ضباب لإخفاء النهاية وزيادة الغموض

const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 1.7, 35); // نبدأ من مسافة بعيدة خارج المحل

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// ==== الإضاءة (قوية وواضحة) ====
const lightAmb = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(lightAmb);

// ==== المعمار (الأرضية والجدران) ====
const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(40, 120),
    new THREE.MeshStandardMaterial({color: 0x080808, roughness: 0.05, metalness: 0.8})
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

// السجاد الملكي الممتد من الخارج للداخل
const carpet = new THREE.Mesh(
    new THREE.PlaneGeometry(5, 120),
    new THREE.MeshStandardMaterial({color: 0x440000, roughness: 0.8})
);
carpet.rotation.x = -Math.PI / 2;
carpet.position.y = 0.02;
scene.add(carpet);

// جدران زجاجية جانبية عند المدخل
function createWall(x) {
    const wall = new THREE.Mesh(
        new THREE.BoxGeometry(1, 12, 80),
        new THREE.MeshStandardMaterial({color: 0x050505, metalness: 0.9, roughness: 0.1})
    );
    wall.position.set(x, 6, 0);
    scene.add(wall);
}
createWall(-10);
createWall(10);

// ==== موديلات الساعات المتحركة ====
function createLuxuryWatch(type) {
    const group = new THREE.Group();
    let matColor = (type === 'gold') ? 0xffd700 : (type === 'silver' ? 0xe0e0e0 : 0x111111);
    
    // الهيكل الرئيسي
    const caseGeo = new THREE.TorusGeometry(0.25, 0.04, 16, 100);
    const caseMat = new THREE.MeshStandardMaterial({color: matColor, metalness: 1, roughness: 0.1});
    const watchCase = new THREE.Mesh(caseGeo, caseMat);
    
    // المينا الداخلي
    const face = new THREE.Mesh(
        new THREE.CircleGeometry(0.22, 32),
        new THREE.MeshStandardMaterial({color: 0x000, metalness: 0.5})
    );
    face.position.z = 0.01;

    // العقارب الفوسفورية
    const hand = new THREE.Mesh(new THREE.PlaneGeometry(0.015, 0.15), new THREE.MeshBasicMaterial({color: 0x00ff00}));
    hand.position.set(0, 0.07, 0.02);
    face.add(hand);

    group.add(watchCase, face);
    return group;
}

function addDisplay(x, z, type) {
    const pedestal = new THREE.Mesh(
        new THREE.CylinderGeometry(0.6, 0.7, 1.3, 32),
        new THREE.MeshStandardMaterial({color: 0x000, metalness: 1})
    );
    pedestal.position.set(x, 0.65, z);
    scene.add(pedestal);

    const watch = createLuxuryWatch(type);
    watch.position.set(x, 1.8, z);
    scene.add(watch);
    watches.push({mesh: watch, offset: Math.random() * 100});

    // إضاءة Spotlight مركزة جداً لكل ساعة
    const spot = new THREE.SpotLight(0xffffff, 50);
    spot.position.set(x, 6, z);
    spot.target = watch;
    spot.angle = 0.3;
    scene.add(spot);
}

// توزيع الساعات بموديلات مختلفة
addDisplay(-5, 10, 'gold');
addDisplay(5, 10, 'silver');
addDisplay(-5, 0, 'black');
addDisplay(5, 0, 'gold');
addDisplay(0, -10, 'silver');

// ==== الموظف (الاستقبال في النهاية) ====
const staff = new THREE.Group();
const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.2, 0.3), new THREE.MeshStandardMaterial({color: 0x000}));
const head = new THREE.Mesh(new THREE.SphereGeometry(0.22, 16, 16), new THREE.MeshStandardMaterial({color: 0xdbac98}));
head.position.y = 0.8;
const mask = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.12, 0.15), new THREE.MeshStandardMaterial({color: 0xffffff}));
mask.position.set(0, 0.75, 0.15);
staff.add(body, head, mask);
staff.position.set(0, 0.6, -20);
scene.add(staff);

// ==== التحكم والحركة ====
let moveDir = {x:0, y:0};
const joystick = nipplejs.create({ zone: document.getElementById('joystick-container'), mode: 'static', position: {left: '60px', bottom: '60px'}, color: '#d4af37' });
joystick.on('move', (e, d) => { moveDir.x = d.vector.x; moveDir.y = d.vector.y; });
joystick.on('end', () => { moveDir = {x:0, y:0}; });

let lon = 0, lat = 0;
document.addEventListener('pointermove', (e) => { if(e.buttons === 1){ lon -= e.movementX * 0.1; lat -= e.movementY * 0.1; lat = Math.max(-85, Math.min(85, lat)); } });

document.getElementById("start").onclick = () => { document.getElementById("start").style.display = "none"; };

function animate() {
    requestAnimationFrame(animate);
    
    const time = Date.now() * 0.001;
    // تحريك الساعات (دوران جذاب + حركة عمودية)
    watches.forEach(w => {
        w.mesh.rotation.y += 0.02;
        w.mesh.position.y = 1.8 + Math.sin(time + w.offset) * 0.15;
    });

    // حركة الكاميرا
    const phi = THREE.MathUtils.degToRad(90 - lat);
    const theta = THREE.MathUtils.degToRad(lon);
    const target = new THREE.Vector3().setFromSphericalCoords(1, phi, theta).add(camera.position);
    camera.lookAt(target);

    const fwd = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
    fwd.y = 0; fwd.normalize();
    const rgt = new THREE.Vector3().crossVectors(camera.up, fwd).negate();

    camera.position.addScaledVector(fwd, moveDir.y * 0.15);
    camera.position.addScaledVector(rgt, moveDir.x * 0.15);

    staff.lookAt(camera.position.x, 1.5, camera.position.z);
    renderer.render(scene, camera);
}
animate();

window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
