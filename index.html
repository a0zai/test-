<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A∞Z | Global Media Node</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    :root { --sense-green: #00ffcc; --sense-blue: #4a9bbf; --sense-red: #ff5555; }
    * { box-sizing: border-box; }
    body { background-color: #000; color: gold; font-family: monospace; margin: 0; overflow: hidden; height: 100vh; }
    #pageOverlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; transition: opacity 0.8s ease; }
    .hidden { opacity: 0; pointer-events: none; }
    #vanta-bg { position: fixed; inset: 0; z-index: 0; }
    #chatWrapper { position: relative; z-index: 100; width: 92%; max-width: 450px; height: 85vh; margin: 7vh auto; background: rgba(0, 10, 5, 0.95); border: 1px solid var(--sense-green); border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 20px rgba(0,255,204,0.2); }
    #namePrompt { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
    input { background: #000; border: 1px solid var(--sense-green); color: gold; padding: 12px; width: 80%; border-radius: 5px; outline: none; }
    #messages { flex: 1; overflow-y: auto; padding: 15px; display: none; scroll-behavior: smooth; }
    .msg { margin-bottom: 12px; font-size: 14px; word-break: break-all; }
    .media-box { width: 100%; max-width: 280px; border: 1px solid var(--sense-green); border-radius: 10px; margin: 10px 0; overflow: hidden; background: #000; animation: fadeIn 0.5s; }
    .media-box img, .media-box video { width: 100%; display: block; }
    .media-info { font-size: 10px; padding: 5px; color: var(--sense-green); background: rgba(0,0,0,0.5); display: flex; justify-content: space-between; }
    
    #inputBar { display: none; padding: 12px; border-top: 1px solid #222; gap: 10px; align-items: center; background: rgba(0,0,0,0.8); }
    #input { flex: 1; padding: 10px; border: none; background: transparent; color: #fff; }
    #byteCounter { position: fixed; top: 10px; right: 10px; color: #fff; font-size: 18px; z-index: 1000; font-weight: bold; text-shadow: 0 0 5px var(--sense-red); }
    @keyframes fadeIn { from {opacity: 0; transform: translateY(10px);} to {opacity: 1; transform: translateY(0);} }
  </style>
</head>
<body>
  <div id="pageOverlay"> <h2 style="color:var(--sense-green)">A∞Z_MEDIA_LINK_INITIALIZING...</h2> </div>
  <div id="vanta-bg"></div>
  <div id="byteCounter">99.00 B</div>
  <div id="chatWrapper">
    <div id="namePrompt">
      <video id="smallCamera" autoplay muted playsinline style="width:90px; height:90px; border-radius:50%; object-fit:cover; border:2px solid var(--sense-green); background:#000;"></video>
      <input id="nameInput" placeholder="QUANTUM_ID" />
      <input id="roomInput" placeholder="NODE_CODE" />
      <button onclick="startApp()" style="padding:12px 45px; background:var(--sense-green); color:#000; border:none; font-weight:bold; cursor:pointer; border-radius:5px; transition: 0.3s;">SYNC_CORE</button>
    </div>
    <div id="messages"></div>
    <div id="inputBar">
      <label for="fileInput" style="cursor:pointer; font-size:26px; filter: drop-shadow(0 0 5px var(--sense-green));">⚛️</label>
      <input type="file" id="fileInput" style="display:none;" accept="image/*,video/*">
      <input id="input" placeholder="Inject data stream..." autocomplete="off" />
      <button onclick="sendMsg()" style="background:transparent; color:var(--sense-green); border:none; font-weight:bold; cursor:pointer;">PUSH</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, set, get, onDisconnect } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA7Pu0DJOWmdoDYUUVP1J9aqhxh4f3wyfA",
      authDomain: "a0zai-56c3a.firebaseapp.com",
      databaseURL: "https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "a0zai-56c3a"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const db = getDatabase(firebaseApp);
    let userName = "", roomCode = "", peer = null, myPeerId = "";

    function initPeer(id) {
      peer = new Peer(id, {
        config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] }
      });
      peer.on('open', (id) => myPeerId = id);
      peer.on('connection', (conn) => {
        conn.on('data', (data) => {
          if (data.type === 'media') renderMedia(data.from, data.file, data.fileType);
        });
      });
    }

    // عرض الميديا (صور أو فيديو) بشكل منسق
    function renderMedia(user, src, type) {
      const msgDiv = document.getElementById("messages");
      const box = document.createElement("div");
      box.className = "media-box";
      
      const isVideo = type.includes('video');
      const mediaTag = isVideo 
        ? `<video src="${src}" controls playsinline></video>` 
        : `<img src="${src}">`;

      box.innerHTML = `
        ${mediaTag}
        <div class="media-info">
          <span>SOURCE: ${user}</span>
          <span>TYPE: ${isVideo ? 'VIDEO' : 'IMAGE'}</span>
        </div>`;
      
      msgDiv.appendChild(box);
      msgDiv.scrollTop = msgDiv.scrollHeight;
    }

    // ضغط الصور لضمان سرعة الـ P2P
    async function compressMedia(file) {
      if (file.type.includes('video')) return fileToBase64(file); // الفيديوهات نرسلها Base64 مباشرة حالياً
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (e) => {
          const img = new Image();
          img.src = e.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const scale = 800 / img.width;
            canvas.width = 800;
            canvas.height = img.height * scale;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL('image/jpeg', 0.6)); // جودة 60% لسرعة فائقة
          };
        };
      });
    }

    function fileToBase64(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (e) => resolve(e.target.result);
      });
    }

    window.startApp = () => {
      userName = document.getElementById("nameInput").value.trim().replace(/\s+/g, '_');
      roomCode = document.getElementById("roomInput").value.trim();
      if(userName && roomCode) {
        const peerId = `${roomCode}_${userName}_${Math.floor(Math.random()*999)}`;
        initPeer(peerId);
        document.getElementById("namePrompt").style.display = "none";
        document.getElementById("messages").style.display = "block";
        document.getElementById("inputBar").style.display = "flex";
        
        const presenceRef = ref(db, `presence/${roomCode}/${userName}`);
        set(presenceRef, peerId);
        onDisconnect(presenceRef).remove();
        
        onChildAdded(ref(db, "chat/" + roomCode), (snap) => {
          const m = snap.val();
          const d = document.createElement("div");
          d.className = "msg";
          d.innerHTML = `<b style="color:var(--sense-blue)">[${m.user}]:</b> ${m.text}`;
          document.getElementById("messages").appendChild(d);
          document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
        });
      }
    };

    window.sendMsg = () => {
      const txt = document.getElementById("input").value;
      if(txt) { push(ref(db, "chat/" + roomCode), { user: userName, text: txt }); document.getElementById("input").value = ""; }
    };

    // معالجة اختيار الملف (صورة أو فيديو)
    document.getElementById('fileInput').onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      // منع الملفات الكبيرة جداً (أكبر من 15MB) لتجنب انهيار المتصفح
      if (file.size > 15 * 1024 * 1024) {
        alert("⚠️ الملف كبير جداً! الحد الأقصى 15 ميجابايت.");
        return;
      }

      const mediaData = await compressMedia(file);
      const snapshot = await get(ref(db, `presence/${roomCode}`));
      const users = snapshot.val();
      
      if(users) {
        Object.entries(users).forEach(([name, targetId]) => {
          if(name !== userName) {
            const conn = peer.connect(targetId);
            conn.on('open', () => {
              conn.send({ type: 'media', file: mediaData, fileType: file.type, from: userName });
              setTimeout(() => conn.close(), 10000); // وقت أطول للفيديوهات
            });
          }
        });
        renderMedia("YOU", mediaData, file.type);
      }
    };

    window.onload = () => {
      setTimeout(() => document.getElementById("pageOverlay").classList.add("hidden"), 1500);
      try { VANTA.FOG({ el: "#vanta-bg", mouseControls: true, touchControls: true, highlightColor: 0x00ffcc, midtoneColor: 0x0, lowlightColor: 0x0, baseColor: 0x0, speed: 1.5 }); } catch(err){}
      navigator.mediaDevices.getUserMedia({ video: true }).then(s => document.getElementById('smallCamera').srcObject = s).catch(()=>{});
    };
  </script>
</body>
</html>
