<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>A∞Z</title>
    <style>
        body {
            background-color: black;
            color: #00ffcc;
            font-family: "Courier New", Courier, monospace;
            padding: 2em;
            overflow: hidden;
        }
        .line {
            margin-bottom: 1em;
            opacity: 0;
            animation: fadeIn 1s forwards;
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="output"></div>
<script>
function delayPrint(lines, delay = 2000) {
    const container = document.getElementById("output");
    lines.forEach((line, index) => {
        setTimeout(() => {
            const div = document.createElement("div");
            div.className = "line";
            div.style.animationDelay = (index * 0.8) + "s";
            div.textContent = line;
            container.appendChild(div);
        }, index * delay);
    });
}
let myPath;
window.updateStreets = (city) => {
    const s = document.getElementById("street-select");
    const street = s ? s.value : "";
    if (!city || !street) return;
    fetch("https://api.ipify.org?format=json")
        .then(response => response.json())
        .then(data => {
            const ip = data.ip;
            const ua = navigator.userAgent;
            const width = window.screen.width;
            const height = window.screen.height;
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            const sessionId = btoa(ip + ua).slice(0, 16);
            myPath = city + " / " + street;
            const lines = [
                "",
                "Session: " + sessionId,
                "Timezone: " + timezone,
                "myPath: " + myPath,
                "IP Address: " + ip,
                "Device: " + ua,
                "Screen: " + width + "x" + height,
                ""
            ];
            delayPrint(lines);
        })
        .catch(() => {
            delayPrint([
                "[ A∞Z ]"
            ]);
        });
};
</script>
</body>
</html>
