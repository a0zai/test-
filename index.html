<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>A∞Z | Quantum P2P Node</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    :root {
      --sense-green: #00ffcc;
      --sense-blue: #4a9bbf;
      --sense-red: #ff5555;
      --terminal-bg: rgba(0, 15, 5, 0.85);
    }
    html, body {
      height: 100%; margin: 0; padding: 0; background-color: #000;
      color: gold; font-family: 'Courier New', monospace; overflow: hidden;
      display: flex; justify-content: center; align-items: center; text-align: center;
    }
    #vanta-bg { position: fixed; inset: 0; z-index: 0; opacity: 0.4; pointer-events: none; }
    #pageOverlay { position: fixed; inset: 0; backdrop-filter: blur(15px); background: #000; z-index: 9999; transition: 1.5s; }
    #pageOverlay.fade-out { opacity: 0; pointer-events: none; }
    
    #hamburger { position: fixed; top: 20px; left: 20px; font-size: 28px; cursor: pointer; color: var(--sense-green); z-index: 10000; text-shadow: 0 0 10px var(--sense-green); }
    
    #sidebar {
      position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
      background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);
      padding: 40px 20px; transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1);
      z-index: 9999; border-right: 1px solid gold;
    }
    #sidebar.open { left: 0; }
    .sidebar-btn {
      width: 100%; background: transparent; color: gold; border: 1px solid gold;
      padding: 12px; border-radius: 4px; cursor: pointer; margin-top: 10px; font-weight: bold;
    }

    #chatWrapper {
      width: 95%; max-width: 700px; height: 65vh; background: var(--terminal-bg);
      border: 1px solid var(--sense-green); border-radius: 5px; padding: 20px;
      position: fixed; bottom: 20px; z-index: 10; display: flex; flex-direction: column;
      box-shadow: 0 0 30px rgba(0, 255, 204, 0.1);
    }
    #messages { flex: 1; overflow-y: auto; padding: 10px; text-align: left; }
    
    /* تأثير فك التشفير الكمي للصور */
    .quantum-img-container {
      position: relative; overflow: hidden; border: 1px solid var(--sense-green);
      margin: 10px 0; max-width: 300px; min-height: 150px; background: #000;
    }
    .quantum-noise {
      position: absolute; inset: 0; z-index: 2;
      background: url('https://media.giphy.com/media/oEI9uWUicG68U/giphy.gif'); /* ستاتيك غليتش */
      opacity: 0.8; mix-blend-mode: screen; pointer-events: none;
    }
    .p2p-img { width: 100%; display: block; filter: brightness(1.2) contrast(1.1); opacity: 0; transition: opacity 2s ease-in; }
    .decoded .p2p-img { opacity: 1; }
    .decoded .quantum-noise { display: none; }

    #inputBar { display: none; gap: 10px; margin-top: 10px; }
    #input { flex: 1; padding: 10px; background: transparent; border: 1px solid gold; color: #fff; outline: none; }
    
    #byteDashboard {
      position: fixed; top: 80px; left: 20px; border-left: 3px solid var(--sense-red);
      padding: 10px 20px; background: rgba(0,0,0,0.8); z-index: 10001; text-align: left;
    }
    .clock-container { width: 300px; height: 300px; position: relative; opacity: 0.7; }
    .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; }
    .hour { width: 4px; height: 70px; background: #fff; }
    .minute { width: 3px; height: 100px; background: var(--sense-red); }
    .second { width: 1px; height: 120px; background: var(--sense-blue); }
  </style>
</head>
<body>
  <div id="pageOverlay"></div>
  <div id="vanta-bg"></div>
  
  <div id="byteDashboard">
    <div style="font-size: 10px; color: var(--sense-red); letter-spacing: 2px;">QUANTUM NODE STATUS</div>
    <div id="byteCounter" style="font-size: 28px; font-weight: bold;">99.00 B</div>
    <div id="status5G" style="font-size: 9px; color: var(--sense-green);">● SYNCING WITH ENTANGLED PEER</div>
  </div>

  <div id="hamburger">☰</div>
  <div id="sidebar">
    <div id="closeSidebar" style="cursor:pointer;">[ CLOSE_X ]</div>
    <h3 style="color:var(--sense-green)">A∞Z_CORE</h3>
    <p id="myPeerIdDisplay" style="font-size: 10px; color: gold; background: #111; padding: 5px; word-break: break-all;">ID: WAITING...</p>
    <button id="connectPeerBtn" class="sidebar-btn">CONNECT PEER</button>
    <button id="startLiveBtn" class="sidebar-btn" style="border-color:var(--sense-red)">INITIATE LIVE</button>
  </div>

  <div class="clock-container">
    <div class="hand hour" id="hour"></div>
    <div class="hand minute" id="minute"></div>
    <div class="hand second" id="second"></div>
  </div>

  <div id="chatWrapper">
    <div id="namePrompt">
      <video id="smallCamera" autoplay muted playsinline style="width:120px; border-radius:50%; border:2px solid var(--sense-green);"></video>
      <p>ID_AUTH_REQUIRED</p>
      <input id="nameInput" placeholder="IDENTITY..." style="background:transparent; border:1px solid var(--sense-green); color:gold; padding:10px;" />
      <button id="joinBtn" class="sidebar-btn" style="width:120px">ENTER</button>
    </div>
    <div id="messages"></div>
    <div id="inputBar">
      <label for="fileInput" style="cursor:pointer; font-size:20px;">⚛️</label>
      <input type="file" id="fileInput" style="display:none;" accept="image/*">
      <input id="input" placeholder="Quantum stream..." autocomplete="off" />
      <button id="sendButton" style="background:transparent; color:gold; border:none; cursor:pointer;">PUSH</button>
    </div>
  </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, set, update, get } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA7Pu0DJOWmdoDYUUVP1J9aqhxh4f3wyfA",
        authDomain: "a0zai-56c3a.firebaseapp.com",
        databaseURL: "https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "a0zai-56c3a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let userName = "";
    let sessionId = "";
    let bytesRemaining = 99.00;
    let peer = null;
    let activeP2PConn = null;

    // --- QUANTUM DECODING RENDERER ---
    function renderQuantumImage(user, url) {
        const msgDiv = document.getElementById("messages");
        const container = document.createElement("div");
        container.className = "quantum-img-container";
        container.innerHTML = `
            <div class="quantum-noise"></div>
            <img src="${url}" class="p2p-img">
            <div style="font-size:10px; padding:5px; color:var(--sense-green)">DECODING BYTES FROM: ${user}...</div>
        `;
        msgDiv.appendChild(container);
        msgDiv.scrollTop = msgDiv.scrollHeight;

        // محاكاة فك التشفير الكمي (بعد 2 ثانية تظهر الصورة)
        setTimeout(() => {
            container.classList.add('decoded');
        }, 2500);
    }

    function initP2P(id) {
        peer = new Peer(id);
        peer.on('open', (myId) => document.getElementById('myPeerIdDisplay').innerText = "NODE_ID: " + myId);
        peer.on('connection', (conn) => {
            activeP2PConn = conn;
            conn.on('data', (data) => {
                if (data.type === 'image') {
                    const url = URL.createObjectURL(new Blob([data.data], { type: data.fileType }));
                    renderQuantumImage(data.user, url);
                } else {
                    logAction(data.user, data.text, "var(--sense-blue)");
                }
            });
            logAction("SYSTEM", "QUANTUM TUNNEL ESTABLISHED", "gold");
        });
    }

    async function initDevice() {
        try {
            const res = await fetch("https://api.ipify.org?format=json");
            const data = await res.json();
            sessionId = btoa(data.ip).slice(0, 10);
            initP2P(sessionId);
            const snap = await get(ref(db, "devices/" + sessionId));
            if (snap.exists()) { userName = snap.val().name; bytesRemaining = snap.val().bytesRemaining || 99.00; unlock(); }
        } catch (e) {}
    }

    function unlock() {
        document.getElementById("namePrompt").style.display = "none";
        document.getElementById("messages").style.display = "block";
        document.getElementById("inputBar").style.display = "flex";
        onChildAdded(ref(db, "chat"), (snap) => logAction(snap.val().user, snap.val().text, "gold"));
        updateUI();
    }

    function logAction(user, text, color) {
        const msgDiv = document.getElementById("messages");
        const d = document.createElement("div");
        d.innerHTML = `<span style="color:${color}">[${user}]:</span> ${text}`;
        msgDiv.appendChild(d);
        msgDiv.scrollTop = msgDiv.scrollHeight;
    }

    function updateUI() { document.getElementById('byteCounter').innerText = `${bytesRemaining.toFixed(2)} B`; }

    document.getElementById("joinBtn").onclick = () => {
        userName = document.getElementById("nameInput").value;
        if (userName) { set(ref(db, "devices/" + sessionId), { name: userName, bytesRemaining: 99.00 }); unlock(); }
    };

    document.getElementById("sendButton").onclick = () => {
        const text = document.getElementById("input").value;
        if (!text) return;
        if (activeP2PConn?.open) {
            activeP2PConn.send({ user: userName, text: text });
            logAction("YOU", text, "var(--sense-green)");
        } else if (bytesRemaining > 0) {
            bytesRemaining -= new Blob([text]).size;
            update(ref(db, "devices/" + sessionId), { bytesRemaining });
            push(ref(db, "chat"), { text, user: userName });
            updateUI();
        }
        document.getElementById("input").value = "";
    };

    document.getElementById('fileInput').onchange = (e) => {
        const file = e.target.files[0];
        if (file && activeP2PConn?.open) {
            const r = new FileReader();
            r.onload = (evt) => {
                activeP2PConn.send({ type: 'image', data: evt.target.result, fileType: file.type, user: userName });
                renderQuantumImage("YOU", URL.createObjectURL(file));
            };
            r.readAsArrayBuffer(file);
        }
    };

    document.getElementById('connectPeerBtn').onclick = () => {
        const id = prompt("PEER_NODE_ID:");
        if (id) {
            const conn = peer.connect(id);
            conn.on('open', () => {
                activeP2PConn = conn;
                logAction("SYSTEM", "TUNNEL_READY", "gold");
            });
        }
    };

    document.getElementById('hamburger').onclick = () => document.getElementById('sidebar').classList.add('open');
    document.getElementById('closeSidebar').onclick = () => document.getElementById('sidebar').classList.remove('open');

    window.onload = () => {
        setTimeout(() => document.getElementById('pageOverlay').classList.add('fade-out'), 1000);
        initDevice();
    };
</script>

<script>
    // Clock Logic
    setInterval(() => {
        const now = new Date();
        document.getElementById('hour').style.transform = `translateX(-50%) rotate(${now.getHours() * 30}deg)`;
        document.getElementById('minute').style.transform = `translateX(-50%) rotate(${now.getMinutes() * 6}deg)`;
        document.getElementById('second').style.transform = `translateX(-50%) rotate(${now.getSeconds() * 6}deg)`;
    }, 1000);

    VANTA.FOG({
      el: "#vanta-bg",
      mouseControls: true, touchControls: true,
      highlightColor: 0x00ffcc, midtoneColor: 0x111111,
      lowlightColor: 0x0, baseColor: 0x0,
      blurFactor: 0.3, speed: 1.0
    });
</script>
</body>
</html>
