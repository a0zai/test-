<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A∞Z | Quantum Node v3</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    :root {
      --sense-green: #00ffcc;
      --sense-blue: #4a9bbf;
      --sense-red: #ff5555;
      --terminal-bg: rgba(0, 10, 5, 0.95);
    }
    * { box-sizing: border-box; }
    html, body {
      height: 100%; margin: 0; padding: 0; background-color: #000;
      color: gold; font-family: 'Courier New', monospace; overflow: hidden;
    }
    #vanta-bg { position: fixed; inset: 0; z-index: 0; opacity: 0.5; }
    #pageOverlay { position: fixed; inset: 0; backdrop-filter: blur(15px); background: #000; z-index: 9999; transition: 1.5s; display: flex; align-items: center; justify-content: center; }
    #pageOverlay.fade-out { opacity: 0; pointer-events: none; }

    #byteDashboard {
      position: fixed; top: 15px; right: 15px;
      border-right: 3px solid var(--sense-red); padding: 5px 15px;
      background: rgba(0,0,0,0.7); z-index: 1001; text-align: right;
    }
    #byteCounter { font-size: 22px; font-weight: bold; color: #fff; }

    #hamburger { position: fixed; top: 15px; left: 15px; font-size: 26px; cursor: pointer; color: var(--sense-green); z-index: 1002; }

    #sidebar {
      position: fixed; top: 0; left: -100%; width: 280px; height: 100%;
      background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);
      padding: 60px 20px; transition: 0.5s; z-index: 9999; border-right: 1px solid var(--sense-green);
    }
    #sidebar.open { left: 0; }
    .sidebar-btn {
      width: 100%; background: transparent; color: gold; border: 1px solid gold;
      padding: 12px; border-radius: 4px; cursor: pointer; margin-top: 15px; font-weight: bold;
    }

    #chatWrapper {
      width: 92%; max-width: 500px; height: 75vh; background: var(--terminal-bg);
      border: 1px solid rgba(0, 255, 204, 0.3); border-radius: 12px;
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 100; display: flex; flex-direction: column; overflow: hidden;
    }

    #namePrompt { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; padding: 20px; }
    #nameInput, #roomInput { background: #000; border: 1px solid var(--sense-green); color: gold; padding: 12px; width: 85%; text-align: center; border-radius: 5px; outline: none; }
    #roomInput { border-color: var(--sense-blue); color: var(--sense-blue); }

    #messages { flex: 1; overflow-y: auto; padding: 15px; display: none; scroll-behavior: smooth;}
    .msg-item { margin-bottom: 12px; font-size: 14px; word-break: break-word; text-align: left;}

    .quantum-img-container { position: relative; border-radius: 8px; overflow: hidden; border: 1px solid var(--sense-green); margin: 10px 0; width: 100%; max-width: 300px; background: #000; }
    .quantum-noise { position: absolute; inset: 0; z-index: 2; background: url('https://media.giphy.com/media/oEI9uWUicG68U/giphy.gif'); opacity: 0.4; mix-blend-mode: screen; }
    .p2p-img { width: 100%; display: block; opacity: 0; transition: 2s ease; }
    .decoded .p2p-img { opacity: 1; }
    .decoded .quantum-noise { display: none; }

    #inputBar { display: none; padding: 10px; background: rgba(0,0,0,0.5); border-top: 1px solid rgba(0, 255, 204, 0.2); gap: 10px; align-items: center;}
    #input { flex: 1; padding: 12px; background: transparent; border: none; color: #fff; outline: none; font-family: inherit;}
    
    .clock-container { position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 250px; height: 250px; opacity: 0.2; z-index: 1; pointer-events: none; }
    .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; }
    .hour { width: 5px; height: 60px; background: #fff; }
    .minute { width: 3px; height: 90px; background: var(--sense-red); }
    .second { width: 1px; height: 110px; background: var(--sense-blue); }
  </style>
</head>
<body>

  <div id="pageOverlay"> <h2 style="color:var(--sense-green)">A∞Z QUANTUM_LINK_v3...</h2> </div>
  <div id="vanta-bg"></div>
  
  <div id="byteDashboard">
    <div style="font-size: 9px; color: var(--sense-red);">DATA_RESERVE</div>
    <div id="byteCounter">99.00 B</div>
    <div id="roomDisplay" style="font-size: 8px; color: var(--sense-blue);">OFFLINE</div>
  </div>

  <div id="hamburger">☰</div>
  <div id="sidebar">
    <div id="closeSidebar" style="cursor:pointer; text-align:right;">[X]</div>
    <h3 style="color:var(--sense-green); border-bottom: 1px solid #333; padding-bottom: 10px;">SYSTEM_CORE</h3>
    <p id="myPeerIdDisplay" style="font-size: 9px; color: gold; background: #111; padding: 10px; margin-top:20px; border-radius:4px; word-break: break-all;">ID: NOT_READY</p>
    <div id="usersList" style="font-size: 10px; color: #fff; margin-top: 20px; text-align: left;">
        <div style="color: var(--sense-blue); margin-bottom: 5px;">ACTIVE_NODES_IN_ROOM:</div>
        <div id="usersListContent"></div>
    </div>
  </div>

  <div class="clock-container">
    <div class="hand hour" id="hour"></div>
    <div class="hand minute" id="minute"></div>
    <div class="hand second" id="second"></div>
    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:rgba(255,255,255,0.1); font-size:40px;">∞</div>
  </div>

  <div id="chatWrapper">
    <div id="namePrompt">
      <video id="smallCamera" autoplay muted playsinline style="width:100px; height:100px; border-radius:50%; object-fit:cover; border:2px solid var(--sense-green); box-shadow: 0 0 20px var(--sense-green);"></video>
      <input id="nameInput" placeholder="YOUR_IDENTITY" />
      <input id="roomInput" placeholder="ROOM_CODE (e.g. 777)" />
      <button id="joinBtn" class="sidebar-btn" style="width:150px">INITIALIZE_LINK</button>
    </div>
    <div id="messages"></div>
    <div id="inputBar">
      <label for="fileInput" style="cursor:pointer; font-size:22px; padding: 0 5px;">⚛️</label>
      <input type="file" id="fileInput" style="display:none;" accept="image/*">
      <input id="input" placeholder="Inject data stream..." autocomplete="off" />
      <button id="sendButton" style="background:transparent; color:gold; border:none; font-weight:bold; cursor:pointer; font-family: inherit;">>>PUSH</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, onValue, set, update, get, onDisconnect } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA7Pu0DJOWmdoDYUUVP1J9aqhxh4f3wyfA",
        authDomain: "a0zai-56c3a.firebaseapp.com",
        databaseURL: "https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "a0zai-56c3a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let userName = "", roomCode = "", sessionId = "", bytesRemaining = 99.00, peer = null, activeP2PConns = {};

    // --- Quantum Image Decoding ---
    function renderQuantumImage(user, url) {
        const msgDiv = document.getElementById("messages");
        const container = document.createElement("div");
        container.className = "quantum-img-container";
        container.innerHTML = `<div class="quantum-noise"></div><img src="${url}" class="p2p-img"><div style="font-size:9px; padding:5px; color:var(--sense-green)">DECODING_FROM: ${user}</div>`;
        msgDiv.appendChild(container);
        msgDiv.scrollTop = msgDiv.scrollHeight;
        setTimeout(() => container.classList.add('decoded'), 2000);
    }

    // --- P2P Logic ---
    function initP2P(id) {
        if(peer) peer.destroy();
        peer = new Peer(id);
        peer.on('open', (myId) => {
            document.getElementById('myPeerIdDisplay').innerText = "NODE_ID: " + myId;
        });
        peer.on('connection', (conn) => {
            activeP2PConns[conn.peer] = conn;
            setupP2PListeners(conn);
            logAction("SYSTEM", "P2P_LINK_ESTABLISHED_WITH_" + conn.peer.toUpperCase(), "var(--sense-green)");
        });
    }

    function setupP2PListeners(conn) {
        conn.on('data', (data) => {
            if (data.type === 'image') {
                const url = URL.createObjectURL(new Blob([data.data], { type: data.fileType }));
                renderQuantumImage(data.user, url);
            } else {
                logAction(data.user, data.text, "var(--sense-blue)");
            }
        });
        conn.on('close', () => {
            delete activeP2PConns[conn.peer];
        });
    }

    function unlock() {
        document.getElementById("namePrompt").style.display = "none";
        document.getElementById("messages").style.display = "block";
        document.getElementById("inputBar").style.display = "flex";
        document.getElementById("roomDisplay").innerText = "ROOM: " + roomCode;
        
        // الاستماع لرسائل الغرفة المحددة فقط
        onChildAdded(ref(db, "chat/" + roomCode), (snap) => {
            const m = snap.val();
            logAction(m.user, m.text, "gold");
        });

        // تحديث قائمة المستخدمين في الغرفة
        const roomUsersRef = ref(db, "rooms/" + roomCode);
        onValue(roomUsersRef, (snapshot) => {
            const users = snapshot.val();
            const listContent = document.getElementById("usersListContent");
            listContent.innerHTML = "";
            if(users) {
                Object.keys(users).forEach(u => {
                    if(u !== userName) {
                        const userDiv = document.createElement("div");
                        userDiv.innerHTML = `<span style="color:var(--sense-green);">●</span> ${u}`;
                        listContent.appendChild(userDiv);
                    }
                });
            }
        });

        updateUI();
    }

    function logAction(user, text, color) {
        const msgDiv = document.getElementById("messages");
        const d = document.createElement("div");
        d.className = "msg-item";
        d.innerHTML = `<span style="color:${color}; font-weight:bold;">[${user}]:</span> ${text}`;
        msgDiv.appendChild(d);
        msgDiv.scrollTop = msgDiv.scrollHeight;
    }

    function updateUI() { 
        document.getElementById('byteCounter').innerText = `${bytesRemaining.toFixed(2)} B`; 
    }

    document.getElementById("joinBtn").onclick = async () => {
        userName = document.getElementById("nameInput").value.trim();
        roomCode = document.getElementById("roomInput").value.trim();
        
        if (userName && roomCode) {
            let deviceFingerprint = localStorage.getItem('a0z_fingerprint');
            if(!deviceFingerprint) {
                deviceFingerprint = Math.random().toString(36).substring(7);
                localStorage.setItem('a0z_fingerprint', deviceFingerprint);
            }
            
            sessionId = roomCode + "_" + deviceFingerprint;
            
            // تهيئة الـ P2P بهوية سهلة: كود الغرفة + الاسم
            const myPeerId = roomCode + "_" + userName;
            initP2P(myPeerId);

            // جلب الرصيد وتسجيل التواجد في الغرفة
            const snap = await get(ref(db, "devices/" + sessionId));
            if (snap.exists()) {
                bytesRemaining = snap.val().bytesRemaining ?? 99.00;
            } else {
                bytesRemaining = 99.00;
            }
            
            // تسجيل الدخول وتحديث الرصيد
            update(ref(db, "devices/" + sessionId), { name: userName, room: roomCode, bytesRemaining: bytesRemaining });
            
            // تسجيل التواجد النشط وحذفه عند انقطاع الاتصال
            const myPresenceRef = ref(db, "rooms/" + roomCode + "/" + userName);
            set(myPresenceRef, true);
            onDisconnect(myPresenceRef).remove();

            unlock();
        } else {
            alert("⚠️ أدخل اسمك وكود الغرفة!");
        }
    };

    document.getElementById("sendButton").onclick = () => {
        const text = document.getElementById("input").value.trim();
        if (!text) return;

        // إرسال النص للجميع عبر فايربيس (يخصم بايتات)
        if (bytesRemaining > 0) {
            const size = new Blob([text]).size;
            bytesRemaining -= size;
            update(ref(db, "devices/" + sessionId), { bytesRemaining });
            push(ref(db, "chat/" + roomCode), { text, user: userName });
            updateUI();
        }
        document.getElementById("input").value = "";
    };

    // --- تحديث وظيفة إرسال الصور: إرسال ذكي للجميع P2P ---
    document.getElementById('fileInput').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // جلب قائمة المستخدمين الحاليين في الغرفة لإرسال الصورة لهم P2P
        get(ref(db, "rooms/" + roomCode)).then((snapshot) => {
            const users = snapshot.val();
            if(users) {
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const imageData = evt.target.result;
                    let sentCount = 0;

                    // إرسال الصورة لكل مستخدم في الغرفة (باستثناء نفسك)
                    Object.keys(users).forEach(u => {
                        if(u !== userName) {
                            const targetId = roomCode + "_" + u;
                            let conn = activeP2PConns[targetId];

                            // إذا لم يكن هناك اتصال مفتوح، ننشئ واحداً مؤقتاً ونرسل
                            if(!conn || !conn.open) {
                                conn = peer.connect(targetId);
                                conn.on('open', () => {
                                    activeP2PConns[targetId] = conn;
                                    conn.send({ type: 'image', data: imageData, fileType: file.type, user: userName });
                                });
                            } else {
                                // الاتصال مفتوح مسبقاً، نرسل فوراً
                                conn.send({ type: 'image', data: imageData, fileType: file.type, user: userName });
                            }
                            sentCount++;
                        }
                    });

                    if(sentCount > 0) {
                        // عرض الصورة عندك أيضاً
                        renderQuantumImage("YOU", URL.createObjectURL(file));
                    } else {
                        alert("⚠️ لا يوجد مستخدمون آخرون في الغرفة حالياً لإرسال الصورة لهم P2P.");
                    }
                };
                reader.readAsArrayBuffer(file);
            } else {
                 alert("⚠️ لا يوجد مستخدمون في الغرفة.");
            }
        });
    };

    document.getElementById('connectPeerBtn').onclick = () => {
        const targetName = prompt("اسم الشخص الذي تريد الاتصال به P2P (في نفس الغرفة):");
        if (targetName) {
            const targetId = roomCode + "_" + targetName;
            if(activeP2PConns[targetId] && activeP2PConns[targetId].open) {
                alert("أنت متصل بالفعل بـ " + targetName);
                return;
            }
            const conn = peer.connect(targetId);
            conn.on('open', () => { 
                activeP2PConns[targetId] = conn; 
                setupP2PListeners(conn); 
                logAction("SYSTEM", "TUNNEL_READY_WITH_" + targetName.toUpperCase(), "gold"); 
            });
        }
    };

    document.getElementById('hamburger').onclick = () => document.getElementById('sidebar').classList.add('open');
    document.getElementById('closeSidebar').onclick = () => document.getElementById('sidebar').classList.remove('open');

    window.onload = () => {
        setTimeout(() => document.getElementById('pageOverlay').classList.add('fade-out'), 1500);
        navigator.mediaDevices.getUserMedia({ video: true }).then(s => document.getElementById('smallCamera').srcObject = s).catch(e => null);
    };

    setInterval(() => {
        const now = new Date();
        document.getElementById('hour').style.transform = `translateX(-50%) rotate(${now.getHours() * 30}deg)`;
        document.getElementById('minute').style.transform = `translateX(-50%) rotate(${now.getMinutes() * 6}deg)`;
        document.getElementById('second').style.transform = `translateX(-50%) rotate(${now.getSeconds() * 6}deg)`;
    }, 1000);

    VANTA.FOG({ el: "#vanta-bg", mouseControls: true, touchControls: true, highlightColor: 0x00ffcc, midtoneColor: 0x0, lowlightColor: 0x0, baseColor: 0x0, blurFactor: 0.3, speed: 1.0 });
  </script>
</body>
</html>
