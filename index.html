<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Watch Shop</title>
<style>
body { margin:0; overflow:hidden; background:#eee; font-family: Arial;}
#ui { position:absolute; top:10px; left:10px; color:black; background: rgba(255,255,255,0.8); padding:8px; border-radius:8px; font-size:12px; pointer-events:none; z-index:10;}
#joystick-container { position:absolute; bottom:50px; left:50px; width:120px; height:120px; z-index:100;}
#start { position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); color:black; background:#fff; padding:20px; border:1px solid black; cursor:pointer; z-index:1000;}
</style>
</head>
<body>

<div id="ui">Shop 0 | Move joystick to walk | Drag to look around</div>
<div id="start">Enter</div>
<div id="joystick-container"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.1/nipplejs.min.js"></script>

<script>
// ==== Scene & Camera ====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 1.6, 5);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// ==== Lighting ====
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const spotLight = new THREE.SpotLight(0xffffff, 1.2);
spotLight.position.set(0, 8, 0);
spotLight.angle = Math.PI/6;
spotLight.penumbra = 0.3;
spotLight.castShadow = true;
scene.add(spotLight);

// ==== Floor & Walls ====
const floorMat = new THREE.MeshStandardMaterial({color:0xcccccc, roughness:0.6, metalness:0.1});
const floor = new THREE.Mesh(new THREE.PlaneGeometry(20, 60), floorMat);
floor.rotation.x = -Math.PI/2; scene.add(floor);

const wallMat = new THREE.MeshStandardMaterial({color:0xffffff});
const wallL = new THREE.Mesh(new THREE.PlaneGeometry(60, 5), wallMat);
wallL.rotation.y = Math.PI/2; wallL.position.set(-10,2.5,0); scene.add(wallL);

const wallR = new THREE.Mesh(new THREE.PlaneGeometry(60,5), wallMat);
wallR.rotation.y = -Math.PI/2; wallR.position.set(10,2.5,0); scene.add(wallR);

const wallBack = new THREE.Mesh(new THREE.PlaneGeometry(20,5), wallMat);
wallBack.position.set(0,2.5,-30); scene.add(wallBack);

const ceil = new THREE.Mesh(new THREE.PlaneGeometry(20, 60), wallMat);
ceil.rotation.x = Math.PI/2; ceil.position.y = 5; scene.add(ceil);

// ==== NPC (Staff) ====
const npc = new THREE.Mesh(new THREE.CapsuleGeometry(0.4,1.2,4,8), new THREE.MeshStandardMaterial({color:0x000000}));
npc.position.set(0,1,-22); scene.add(npc);

// ==== Shelves & Watches ====
function createWatch(x, y, z, number) {
    const geometry = new THREE.CylinderGeometry(0.15,0.15,0.05,32);
    const canvas = document.createElement('canvas');
    canvas.width = 128; canvas.height = 128;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(0,0,128,128);
    ctx.fillStyle = 'black';
    ctx.font = 'bold 50px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(number, 64, 64);
    const texture = new THREE.CanvasTexture(canvas);
    const material = new THREE.MeshStandardMaterial({map: texture});
    const watch = new THREE.Mesh(geometry, material);
    watch.rotation.x = Math.PI/2;
    watch.position.set(x, y, z);
    scene.add(watch);
}

function createShelf(x,z){
    const shelf = new THREE.Mesh(new THREE.BoxGeometry(3,0.1,0.8),
        new THREE.MeshStandardMaterial({color:0x444444}));
    shelf.position.set(x,1.2,z); scene.add(shelf);
    for(let i=0;i<4;i++){
        createWatch(x-0.9+i*0.6,1.35,z,i+1);
    }
}
[[-8,-5],[8,-5],[-8,-10],[8,-10],[-8,-15],[8,-15]].forEach(p=>createShelf(p[0],p[1]));

// ==== Particles on walls ====
function createWallParticles(wallX, width, height, depthStart, depthEnd, count) {
    const geometry = new THREE.BufferGeometry();
    const positions = [];
    for(let i=0;i<count;i++){
        const x = wallX; 
        const y = 0.5 + Math.random()*height;
        const z = depthStart + Math.random()*(depthEnd - depthStart);
        positions.push(x, y, z);
    }
    geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    const material = new THREE.PointsMaterial({color:0xffd700, size:0.05});
    const points = new THREE.Points(geometry, material);
    scene.add(points);
    return points;
}

const leftWallParticles = createWallParticles(-10, 0.1, 4, -28, 28, 300);
const rightWallParticles = createWallParticles(10, 0.1, 4, -28, 28, 300);
const backWallParticles = createWallParticles(0, 20, 4, -30, -30, 200); // على الجدار الخلفي

// ==== Joystick ====
let moveDir={x:0,y:0};
const joystick = nipplejs.create({
    zone: document.getElementById('joystick-container'),
    mode:'static',
    position:{left:'60px', bottom:'60px'},
    color:'black',
    size:100
});
joystick.on('move',(evt,data)=>{ moveDir.x=data.vector.x; moveDir.y=data.vector.y; });
joystick.on('end',()=>{ moveDir={x:0,y:0}; });

// ==== Pointer Camera Controls ====
let lon=0, lat=0, phi=0, theta=0;
let onPointerDownPointerX=0, onPointerDownPointerY=0, onPointerDownLon=0, onPointerDownLat=0;
document.addEventListener('pointerdown', e=>{
    if(e.target.id==='start') return;
    onPointerDownPointerX = e.clientX;
    onPointerDownPointerY = e.clientY;
    onPointerDownLon = lon;
    onPointerDownLat = lat;
    document.addEventListener('pointermove', onPointerMove);
    document.addEventListener('pointerup', onPointerUp);
});
function onPointerMove(e){
    lon = (onPointerDownPointerX - e.clientX)*0.15 + onPointerDownLon;
    lat = (e.clientY - onPointerDownPointerY)*0.15 + onPointerDownLat;
    lat = Math.max(-85, Math.min(85, lat));
}
function onPointerUp(){
    document.removeEventListener('pointermove', onPointerMove);
    document.removeEventListener('pointerup', onPointerUp);
}

// ==== Start Button ====
document.getElementById("start").onclick = ()=>{ document.getElementById("start").style.display="none"; };

// ==== Animation Loop ====
function animate(){
    requestAnimationFrame(animate);

    phi = THREE.MathUtils.degToRad(90 - lat);
    theta = THREE.MathUtils.degToRad(lon);
    const target = new THREE.Vector3();
    target.setFromSphericalCoords(1, phi, theta).add(camera.position);
    camera.lookAt(target);

    const forward = new THREE.Vector3().setFromMatrixColumn(camera.matrix,0).crossVectors(camera.up,new THREE.Vector3().setFromMatrixColumn(camera.matrix,0));
    const right = new THREE.Vector3().setFromMatrixColumn(camera.matrix,0);

    camera.position.addScaledVector(forward, moveDir.y*0.12);
    camera.position.addScaledVector(right, moveDir.x*0.12);

    camera.position.x = Math.max(-9, Math.min(9, camera.position.x));
    camera.position.z = Math.max(-28, Math.min(28, camera.position.z));

    npc.lookAt(camera.position);

    renderer.render(scene,camera);
}
animate();

// ==== Window Resize ====
window.addEventListener("resize", ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
