<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Watch Boutique</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #d4af37; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 5px; border: 1px solid #d4af37; pointer-events: none; z-index: 10; }
        #joystick-container { position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px; z-index: 100; opacity: 0.6; }
        #start { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #d4af37; background: #111; padding: 20px 40px; border: 2px solid #d4af37; cursor: pointer; z-index: 1000; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        #start:hover { background: #d4af37; color: #000; }
    </style>
</head>
<body>

<div id="ui">
    <strong style="font-size: 18px;">ROLEX ELITE STORE</strong><br>
    Move to explore the collection
</div>
<div id="start">ENTER BOUTIQUE</div>
<div id="joystick-container"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.1/nipplejs.min.js"></script>

<script>
// ==== 1. Scene Setup ====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020202);
scene.fog = new THREE.Fog(0x020202, 5, 25); // إضافة ضباب لزيادة العمق

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 1.6, 8);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true; // تفعيل الظلال
document.body.appendChild(renderer.domElement);

// ==== 2. Lighting (Drama & Luxury) ====
const ambient = new THREE.AmbientLight(0xffffff, 0.1); 
scene.add(ambient);

// إضاءة سقف مركزية
const topLight = new THREE.RectAreaLight(0xffffff, 2, 10, 10);
topLight.position.set(0, 4.9, -5);
topLight.lookAt(0, 0, -5);
// scene.add(topLight); // تحتاج RectAreaLight لـ Helper أو مكتبة إضافية، سنستخدم Spotlights

function createSpotlight(x, z) {
    const spot = new THREE.SpotLight(0xffd700, 5);
    spot.position.set(x, 4.5, z);
    spot.angle = Math.PI / 6;
    spot.penumbra = 0.5;
    spot.castShadow = true;
    scene.add(spot);
}
createSpotlight(0, -5);
createSpotlight(5, -10);
createSpotlight(-5, -10);

// ==== 3. Environment (Walls & Floor) ====
const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1, metalness: 0.8 });
const floor = new THREE.Mesh(new THREE.PlaneGeometry(30, 60), floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

const wallMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.5 });
const backWall = new THREE.Mesh(new THREE.PlaneGeometry(30, 10), wallMat);
backWall.position.set(0, 2.5, -20);
scene.add(backWall);

// ==== 4. The Staff (NPC) in Suit & Mask ====
function createStaff() {
    const group = new THREE.Group();
    
    // Suit (Black)
    const torso = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1, 0.3), new THREE.MeshStandardMaterial({color: 0x050505}));
    torso.position.y = 1;
    
    // Legs
    const legs = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1, 0.25), new THREE.MeshStandardMaterial({color: 0x050505}));
    legs.position.y = 0.5;

    // Head
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.22, 16, 16), new THREE.MeshStandardMaterial({color: 0xd2b48c}));
    head.position.y = 1.7;

    // Mask (White Medical)
    const mask = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.12, 0.1), new THREE.MeshStandardMaterial({color: 0xeeeeee}));
    mask.position.set(0, 1.65, 0.15);

    // Shirt & Tie Detail
    const shirt = new THREE.Mesh(new THREE.PlaneGeometry(0.15, 0.4), new THREE.MeshStandardMaterial({color: 0xffffff}));
    shirt.position.set(0, 1.2, 0.16);

    group.add(torso, legs, head, mask, shirt);
    group.position.set(0, 0, -12);
    return group;
}
const staff = createStaff();
scene.add(staff);

// ==== 5. Realistic Watch Generator ====
function createRealisticWatch(x, y, z) {
    const watchGroup = new THREE.Group();

    // 1. External Case (Gold/Steel)
    const caseGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.04, 32);
    const caseMat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 1, roughness: 0.2 });
    const watchCase = new THREE.Mesh(caseGeo, caseMat);
    watchCase.rotation.x = Math.PI / 2;

    // 2. Watch Face (Internal)
    const faceGeo = new THREE.CircleGeometry(0.12, 32);
    const faceMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.5 });
    const face = new THREE.Mesh(faceGeo, faceMat);
    face.position.z = 0.021;

    // 3. Hands (Pointers)
    const hand = new THREE.Mesh(new THREE.PlaneGeometry(0.01, 0.08), new THREE.MeshBasicMaterial({color: 0xffffff}));
    hand.position.set(0, 0.04, 0.022);
    face.add(hand);

    // 4. Glass Cover
    const glassGeo = new THREE.CylinderGeometry(0.13, 0.13, 0.01, 32);
    const glassMat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.4, roughness: 0 });
    const glass = new THREE.Mesh(glassGeo, glassMat);
    glass.rotation.x = Math.PI/2;
    glass.position.z = 0.025;

    watchGroup.add(watchCase, face, glass);
    watchGroup.position.set(x, y, z);
    scene.add(watchGroup);
    return watchGroup;
}

// ==== 6. Display Stands (Showcases) ====
function createDisplay(x, z) {
    // Marble Base
    const base = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.1, 1), new THREE.MeshStandardMaterial({color: 0x1a1a1a, metalness: 0.5}));
    base.position.set(x, 0.55, z);
    scene.add(base);

    // Glass Top
    const glass = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.6, 0.9), new THREE.MeshStandardMaterial({color: 0xffffff, transparent: true, opacity: 0.2}));
    glass.position.set(x, 1.4, z);
    scene.add(glass);

    // Light inside the glass
    const pLight = new THREE.PointLight(0xffd700, 1, 3);
    pLight.position.set(x, 1.6, z);
    scene.add(pLight);

    // Add Watch
    createRealisticWatch(x, 1.2, z);
}

// Layout
[[-3,-5], [3,-5], [-3,-10], [3,-10], [0, -10]].forEach(p => createDisplay(p[0], p[1]));

// ==== 7. Controls & Animation ====
let moveDir = {x:0, y:0};
const joystick = nipplejs.create({ zone: document.getElementById('joystick-container'), mode: 'static', position: {left: '60px', bottom: '60px'}, color: '#d4af37' });
joystick.on('move', (e, d) => { moveDir.x = d.vector.x; moveDir.y = d.vector.y; });
joystick.on('end', () => { moveDir = {x:0, y:0}; });

let lon = 0, lat = 0;
document.addEventListener('pointermove', (e) => {
    if (e.buttons === 1) {
        lon -= e.movementX * 0.1;
        lat -= e.movementY * 0.1;
        lat = Math.max(-85, Math.min(85, lat));
    }
});

document.getElementById("start").onclick = () => { document.getElementById("start").style.display = "none"; };

function animate() {
    requestAnimationFrame(animate);

    // Camera Rotation
    const phi = THREE.MathUtils.degToRad(90 - lat);
    const theta = THREE.MathUtils.degToRad(lon);
    const target = new THREE.Vector3().setFromSphericalCoords(1, phi, theta).add(camera.position);
    camera.lookAt(target);

    // Movement
    const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
    forward.y = 0; forward.normalize();
    const right = new THREE.Vector3().crossVectors(camera.up, forward).negate();

    camera.position.addScaledVector(forward, moveDir.y * 0.1);
    camera.position.addScaledVector(right, moveDir.x * 0.1);

    // Staff looks at you
    staff.lookAt(camera.position.x, 1.6, camera.position.z);

    renderer.render(scene, camera);
}
animate();

window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
