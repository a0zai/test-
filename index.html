<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A∞Z | Quantum Node</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    :root {
      --sense-green: #00ffcc;
      --sense-blue: #4a9bbf;
      --sense-red: #ff5555;
      --terminal-bg: rgba(0, 10, 5, 0.9);
    }
    * { box-sizing: border-box; }
    html, body {
      height: 100%; margin: 0; padding: 0; background-color: #000;
      color: gold; font-family: 'Courier New', monospace; overflow: hidden;
    }
    #vanta-bg { position: fixed; inset: 0; z-index: 0; opacity: 0.5; }
    #pageOverlay { position: fixed; inset: 0; backdrop-filter: blur(15px); background: #000; z-index: 9999; transition: 1.5s; display: flex; align-items: center; justify-content: center; }
    #pageOverlay.fade-out { opacity: 0; pointer-events: none; }

    #byteDashboard {
      position: fixed; top: 15px; right: 15px;
      border-right: 3px solid var(--sense-red); padding: 5px 15px;
      background: rgba(0,0,0,0.7); z-index: 1001; text-align: right;
    }
    #byteCounter { font-size: 22px; font-weight: bold; color: #fff; }

    #hamburger { position: fixed; top: 15px; left: 15px; font-size: 26px; cursor: pointer; color: var(--sense-green); z-index: 1002; }

    #sidebar {
      position: fixed; top: 0; left: -100%; width: 280px; height: 100%;
      background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);
      padding: 60px 20px; transition: 0.5s; z-index: 9999; border-right: 1px solid var(--sense-green);
    }
    #sidebar.open { left: 0; }
    .sidebar-btn {
      width: 100%; background: transparent; color: gold; border: 1px solid gold;
      padding: 12px; border-radius: 4px; cursor: pointer; margin-top: 15px; font-weight: bold;
    }

    #chatWrapper {
      width: 92%; max-width: 500px; height: 75vh; background: var(--terminal-bg);
      border: 1px solid rgba(0, 255, 204, 0.3); border-radius: 12px;
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 100; display: flex; flex-direction: column; overflow: hidden;
    }

    #namePrompt { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; padding: 20px; }
    #nameInput { background: #000; border: 1px solid var(--sense-green); color: gold; padding: 12px; width: 80%; text-align: center; border-radius: 5px; outline: none; }

    #messages { flex: 1; overflow-y: auto; padding: 15px; display: none; }
    .msg-item { margin-bottom: 12px; font-size: 14px; }

    .quantum-img-container { position: relative; border-radius: 8px; overflow: hidden; border: 1px solid var(--sense-green); margin: 10px 0; width: 100%; background: #000; }
    .quantum-noise { position: absolute; inset: 0; z-index: 2; background: url('https://media.giphy.com/media/oEI9uWUicG68U/giphy.gif'); opacity: 0.4; mix-blend-mode: screen; }
    .p2p-img { width: 100%; display: block; opacity: 0; transition: 2s ease; }
    .decoded .p2p-img { opacity: 1; }
    .decoded .quantum-noise { display: none; }

    #inputBar { display: none; padding: 10px; background: rgba(0,0,0,0.5); border-top: 1px solid rgba(0, 255, 204, 0.2); gap: 10px; }
    #input { flex: 1; padding: 12px; background: transparent; border: none; color: #fff; outline: none; }
    
    .clock-container { position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 250px; height: 250px; opacity: 0.2; z-index: 1; pointer-events: none; }
    .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; }
    .hour { width: 5px; height: 60px; background: #fff; }
    .minute { width: 3px; height: 90px; background: var(--sense-red); }
    .second { width: 1px; height: 110px; background: var(--sense-blue); }
  </style>
</head>
<body>

  <div id="pageOverlay"> <h2 style="color:var(--sense-green)">A∞Z QUANTUM_LINK...</h2> </div>
  <div id="vanta-bg"></div>
  
  <div id="byteDashboard">
    <div style="font-size: 9px; color: var(--sense-red);">DATA_RESERVE</div>
    <div id="byteCounter">99.00 B</div>
    <div style="font-size: 8px; color: var(--sense-green);">NODE: ONLINE</div>
  </div>

  <div id="hamburger">☰</div>
  <div id="sidebar">
    <div id="closeSidebar" style="cursor:pointer; text-align:right;">[X]</div>
    <h3 style="color:var(--sense-green)">SYSTEM_CORE</h3>
    <p id="myPeerIdDisplay" style="font-size: 9px; color: gold; background: #111; padding: 10px; word-break: break-all;">ID: FETCHING...</p>
    <button id="connectPeerBtn" class="sidebar-btn">CONNECT_NODE</button>
  </div>

  <div class="clock-container">
    <div class="hand hour" id="hour"></div>
    <div class="hand minute" id="minute"></div>
    <div class="hand second" id="second"></div>
  </div>

  <div id="chatWrapper">
    <div id="namePrompt">
      <video id="smallCamera" autoplay muted playsinline style="width:100px; height:100px; border-radius:50%; object-fit:cover; border:2px solid var(--sense-green);"></video>
      <input id="nameInput" placeholder="ENTER_PROXY_ID" />
      <button id="joinBtn" class="sidebar-btn" style="width:150px">AUTHENTICATE</button>
    </div>
    <div id="messages"></div>
    <div id="inputBar">
      <label for="fileInput" style="cursor:pointer; font-size:22px;">⚛️</label>
      <input type="file" id="fileInput" style="display:none;" accept="image/*">
      <input id="input" placeholder="Inject data stream..." autocomplete="off" />
      <button id="sendButton" style="background:transparent; color:gold; border:none; font-weight:bold; cursor:pointer;">>>PUSH</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, set, update, get } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA7Pu0DJOWmdoDYUUVP1J9aqhxh4f3wyfA",
        authDomain: "a0zai-56c3a.firebaseapp.com",
        databaseURL: "https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "a0zai-56c3a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let userName = "", sessionId = "", bytesRemaining = 99.00, peer = null, activeP2PConn = null;

    function renderQuantumImage(user, url) {
        const msgDiv = document.getElementById("messages");
        const container = document.createElement("div");
        container.className = "quantum-img-container";
        container.innerHTML = `<div class="quantum-noise"></div><img src="${url}" class="p2p-img"><div style="font-size:9px; padding:5px; color:var(--sense-green)">DECODING_FROM: ${user}</div>`;
        msgDiv.appendChild(container);
        msgDiv.scrollTop = msgDiv.scrollHeight;
        setTimeout(() => container.classList.add('decoded'), 2000);
    }

    function initP2P(id) {
        peer = new Peer(id);
        peer.on('open', (myId) => document.getElementById('myPeerIdDisplay').innerText = "NODE_ID: " + myId);
        peer.on('connection', (conn) => {
            activeP2PConn = conn;
            setupP2PListeners(conn);
            logAction("SYSTEM", "SECURE_P2P_LINK_OPEN", "var(--sense-green)");
        });
    }

    function setupP2PListeners(conn) {
        conn.on('data', (data) => {
            if (data.type === 'image') {
                const url = URL.createObjectURL(new Blob([data.data], { type: data.fileType }));
                renderQuantumImage(data.user, url);
            } else {
                logAction(data.user, data.text, "var(--sense-blue)");
            }
        });
    }

    async function initDevice() {
        try {
            let savedId = localStorage.getItem('a0z_node_v2');
            if (!savedId) {
                const res = await fetch("https://api.ipify.org?format=json");
                const data = await res.json();
                savedId = btoa(data.ip + Math.random()).slice(0, 12);
                localStorage.setItem('a0z_node_v2', savedId);
            }
            sessionId = savedId;
            initP2P(sessionId);
            const snap = await get(ref(db, "devices/" + sessionId));
            if (snap.exists()) {
                userName = snap.val().name;
                bytesRemaining = snap.val().bytesRemaining ?? 99.00;
                unlock();
            }
        } catch (e) { console.log("Init Error"); }
    }

    function unlock() {
        document.getElementById("namePrompt").style.display = "none";
        document.getElementById("messages").style.display = "block";
        document.getElementById("inputBar").style.display = "flex";
        onChildAdded(ref(db, "chat"), (snap) => logAction(snap.val().user, snap.val().text, "gold"));
        updateUI();
    }

    function logAction(user, text, color) {
        const msgDiv = document.getElementById("messages");
        const d = document.createElement("div");
        d.className = "msg-item";
        d.innerHTML = `<span style="color:${color}; font-weight:bold;">[${user}]:</span> ${text}`;
        msgDiv.appendChild(d);
        msgDiv.scrollTop = msgDiv.scrollHeight;
    }

    function updateUI() { document.getElementById('byteCounter').innerText = `${bytesRemaining.toFixed(2)} B`; }

    document.getElementById("joinBtn").onclick = () => {
        userName = document.getElementById("nameInput").value.trim();
        if (userName) {
            set(ref(db, "devices/" + sessionId), { name: userName, bytesRemaining: 99.00 });
            unlock();
        }
    };

    document.getElementById("sendButton").onclick = () => {
        const text = document.getElementById("input").value.trim();
        if (!text) return;
        if (activeP2PConn && activeP2PConn.open) {
            activeP2PConn.send({ user: userName, text: text });
            logAction("YOU (P2P)", text, "var(--sense-green)");
        } else if (bytesRemaining > 0) {
            bytesRemaining -= new Blob([text]).size;
            update(ref(db, "devices/" + sessionId), { bytesRemaining });
            push(ref(db, "chat"), { text, user: userName });
            updateUI();
        }
        document.getElementById("input").value = "";
    };

    document.getElementById('fileInput').onchange = (e) => {
        const file = e.target.files[0];
        if (file && activeP2PConn?.open) {
            const r = new FileReader();
            r.onload = (evt) => {
                activeP2PConn.send({ type: 'image', data: evt.target.result, fileType: file.type, user: userName });
                renderQuantumImage("YOU", URL.createObjectURL(file));
            };
            r.readAsArrayBuffer(file);
        } else { alert("⚠️ لخصم الصفر بايت، يجب فتح نفق P2P أولاً!"); }
    };

    document.getElementById('connectPeerBtn').onclick = () => {
        const id = prompt("TARGET_NODE_ID:");
        if (id) {
            const conn = peer.connect(id);
            conn.on('open', () => { activeP2PConn = conn; setupP2PListeners(conn); logAction("SYSTEM", "TUNNEL_ESTABLISHED", "gold"); });
        }
    };

    document.getElementById('hamburger').onclick = () => document.getElementById('sidebar').classList.add('open');
    document.getElementById('closeSidebar').onclick = () => document.getElementById('sidebar').classList.remove('open');

    window.onload = () => {
        setTimeout(() => document.getElementById('pageOverlay').classList.add('fade-out'), 1500);
        initDevice();
        navigator.mediaDevices.getUserMedia({ video: true }).then(s => document.getElementById('smallCamera').srcObject = s).catch(e => null);
    };

    setInterval(() => {
        const now = new Date();
        document.getElementById('hour').style.transform = `translateX(-50%) rotate(${now.getHours() * 30}deg)`;
        document.getElementById('minute').style.transform = `translateX(-50%) rotate(${now.getMinutes() * 6}deg)`;
        document.getElementById('second').style.transform = `translateX(-50%) rotate(${now.getSeconds() * 6}deg)`;
    }, 1000);

    VANTA.FOG({ el: "#vanta-bg", mouseControls: true, touchControls: true, highlightColor: 0x00ffcc, midtoneColor: 0x0, lowlightColor: 0x0, baseColor: 0x0, blurFactor: 0.3, speed: 1.0 });
  </script>
</body>
</html>
