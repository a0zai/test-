<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>0 Shop</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:8px;
}

</style>

</head>

<body>

<div id="ui">
W A S D 
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(0,2,6);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

//// الإضاءة

const light = new THREE.PointLight(0xffffff,1.2,30);
light.position.set(0,5,0);
scene.add(light);

const ambient = new THREE.AmbientLight(0x404040);
scene.add(ambient);

//// الأرضية

const floorGeo = new THREE.PlaneGeometry(60,60);
const floorMat = new THREE.MeshStandardMaterial({color:0x111111});
const floor = new THREE.Mesh(floorGeo,floorMat);

floor.rotation.x = -Math.PI/2;

scene.add(floor);

//// اللاعب

const playerGeo = new THREE.CapsuleGeometry(0.4,1.2,4,8);
const playerMat = new THREE.MeshStandardMaterial({color:0xdddddd});

const player = new THREE.Mesh(playerGeo,playerMat);
player.position.y = 1;

scene.add(player);

//// رفوف الساعات

function createShelf(x,z){

const shelfGeo = new THREE.BoxGeometry(3,2,0.5);
const shelfMat = new THREE.MeshStandardMaterial({color:0x333333});
const shelf = new THREE.Mesh(shelfGeo,shelfMat);

shelf.position.set(x,1,z);
scene.add(shelf);

for(let i=0;i<6;i++){

const watchGeo = new THREE.CylinderGeometry(0.15,0.15,0.05,32);
const watchMat = new THREE.MeshStandardMaterial({
color:0xffd700,
emissive:0x332200
});

const watch = new THREE.Mesh(watchGeo,watchMat);

watch.rotation.x = Math.PI/2;
watch.position.set(x-1.2+i*0.5,1.6,z+0.35);

scene.add(watch);
}
}
createShelf(-5,-5);
createShelf(5,-5);
createShelf(-5,-9);
createShelf(5,-9);
createShelf(-5,-13);
createShelf(5,-13);
const npcGeo = new THREE.CapsuleGeometry(0.45,1.3,4,8);
const npcMat = new THREE.MeshStandardMaterial({color:0x111111});

const npc = new THREE.Mesh(npcGeo,npcMat);
npc.position.set(0,1,-15);

scene.add(npc);

const maskGeo = new THREE.SphereGeometry(0.35,16,16);
const maskMat = new THREE.MeshStandardMaterial({
color:0xffffff,
emissive:0x111111
});

const mask = new THREE.Mesh(maskGeo,maskMat);
mask.position.set(0,1.9,-15);

scene.add(mask);

const keys = {};

document.addEventListener("keydown",(e)=>{
keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup",(e)=>{
keys[e.key.toLowerCase()] = false;
});

function movePlayer(){

let speed = 0.09;

if(keys["w"]) player.position.z -= speed;
if(keys["s"]) player.position.z += speed;
if(keys["a"]) player.position.x -= speed;
if(keys["d"]) player.position.x += speed;

camera.position.x += (player.position.x - camera.position.x) * 0.1;
camera.position.z += ((player.position.z + 6) - camera.position.z) * 0.1;

}


function npcLook(){

npc.lookAt(player.position);
mask.lookAt(player.position);

}


function animate(){

requestAnimationFrame(animate);

movePlayer();

npcLook();

camera.lookAt(player.position);

renderer.render(scene,camera);

}

animate();

window.addEventListener("resize",()=>{

camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>
