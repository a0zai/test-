.container { 
    position: relative; 
    z-index: 10; 
    display: flex; 
    justify-content: center; 
    align-items: flex-end; /* دفع العناصر للأسفل */
    height: 100vh; 
    padding-bottom: 20px; /* مسافة بسيطة عن الحافة */
    box-sizing: border-box;
}

.box { 
    width: 400px; 
    max-width: 95%; 
    padding: 15px; 
    background: transparent; /* إزالة الخلفية السوداء */
    border: none;             /* إزالة الإطار الأخضر */
    display: flex; 
    flex-direction: column; 
    align-items: center;      /* سنترة العناصر داخله */
    box-sizing: border-box; 
}


#chat-box {

    background: rgba(0, 0, 0, 0.7); /* شفافية خفيفة */
    margin: 10px 0; 
    font-size: 13px; 
    scroll-behavior: smooth;

input, select {

    font-family: inherit;

    outline: none;

        button { padding:10px; background:var(--neon); color:#000; border:none; font-weight:bold; cursor:pointer; width: 100%; }

        .timestamp { font-size: 9px; opacity: 0.5; }
h2 {

const select = document.getElementById("city-select");
nlCities.sort((a, b) => a.name.localeCompare(b.name));
nlCities.forEach(city => {
    let opt = document.createElement("option");
    opt.value = city.name.replace(/\s+/g, '_');
    opt.textContent = `${city.name.toUpperCase()} (${city.province})`;
    select.appendChild(opt);
});

// استرجاع الاسم من الذاكرة
let savedNick = localStorage.getItem("a0z_nick_v6");
if(savedNick) document.getElementById("nick-input").value = savedNick;

window.boot = () => {
    const nick = document.getElementById("nick-input").value.trim().toUpperCase();
    const city = document.getElementById("city-select").value;

    if(!/^[A-Z0-9]+$/.test(nick)) return alert("INVALID ID (Use A-Z, 0-9)");
    if(!city) return alert("SELECT CITY");
    
    localStorage.setItem("a0z_nick_v6", nick);
    
    navigator.geolocation.getCurrentPosition((p) => {
        startRadar(city, nick);
    }, () => alert("GPS REQUIRED FOR AUTHENTICATION"), { enableHighAccuracy: true });
};

function startRadar(zID, myNick) {
    document.getElementById("login-ui").style.display = "none";
    document.getElementById("chat-ui").style.display = "flex";
    document.getElementById("zone-display").textContent = `Z: ${zID.replace(/_/g, ' ')}`;

    const msgRef = ref(db, `v6/${zID}/msgs`);
    const onlineRef = ref(db, `v6/${zID}/online/${myNick}`);
    const onlineList = ref(db, `v6/${zID}/online`);

    set(onlineRef, serverTimestamp());
    onDisconnect(onlineRef).remove();
    onValue(onlineList, (s) => {
        document.getElementById("online-count").textContent = `👥 ${s.val() ? Object.keys(s.val()).length : 0} ONLINE`;
    });

    const today = new Date().toISOString().slice(0, 10).replace(/-/g, '');
    const usageRef = ref(db, `v6_usage/${myNick}/${today}`);
    onValue(usageRef, (s) => {
        document.getElementById("char-limit").textContent = `${33 - (s.val() || 0)} LEFT`;
    });

    window.send = () => {
        const inp = document.getElementById("msg-input");
        const txt = inp.value.trim();
        if(!txt) return;

        get(usageRef).then((s) => {
            let used = s.val() || 0;
            if(used + txt.length > 33) return alert("LIMIT REACHED FOR TODAY");
            push(msgRef, { n: myNick, m: txt, t: serverTimestamp() });
            set(usageRef, used + txt.length);
            inp.value = "";
        });
    };

    onChildAdded(msgRef, (s) => {
        const d = s.val();
        const div = document.createElement("div");
        div.className = "msg-line";
        div.innerHTML = `<span class="timestamp">[${new Date(d.t).toLocaleTimeString()}]</span><br><b>${d.n}✅</b>: ${d.m}`;
        document.getElementById("chat-box").appendChild(div);
        document.getElementById("chat-box").scrollTop = document.getElementById("chat-box").scrollHeight;
    });
}

const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
const fontSize = 16;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function drawMatrix() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; // لتأثير التلاشي
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.fillStyle = "#00ff41"; // لون المطر
    ctx.font = fontSize + "px monospace";

    drops.forEach((y, i) => {
        const text = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(text, i * fontSize, y * fontSize);
        
        if (y * fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
        }
        drops[i]++;
    });
}
setInterval(drawMatrix, 50);
