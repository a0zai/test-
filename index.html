<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B</title>
    <style>
        body {
            background-color: #0d1117;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            animation: fadeIn 1.5s ease-in-out;
        }

        .municipality-logo {
            width: 140px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            color: #58a6ff;
        }

        p {
            font-size: 1.1rem;
            color: #8b949e;
            margin: 4px 0;
        }

        .loader-bar {
            width: 180px;
            height: 3px;
            background: #30363d;
            margin-top: 30px;
            border-radius: 5px;
            overflow: hidden;
            display: inline-block;
        }

        .loader-progress {
            width: 0%;
            height: 100%;
            background: #238636;
            animation: load 4s linear forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes load {
            to { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://cuatro.sim-cdn.nl/doetinchem/uploads/2023-11/gemeente-doetinchem.svg" alt="Gemeente Doetinchem" class="municipality-logo">

        <h1>Bedankt voor uw inzet</h1>
        <p>Ter waardering van uw werk voor <strong>N</strong>.</p>
        <p>U wordt doorverwezen naar LinkedIn...</p>
        
        <div class="loader-bar">
            <div class="loader-progress"></div>
        </div>
    </div>

    <script>
        const linkedInURL = "https://www.linkedin.com/in/a0zai?utm_source=share_via&utm_content=profile&utm_medium=member_ios";

        setTimeout(() => {
            window.location.href = linkedInURL;
        }, 4500);
    </script>
</body>
</html>
