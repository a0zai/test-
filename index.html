<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>A∞Z</title>
    <style>
        body {
            background-color: black;
            color: #00ffcc;
            font-family: "Courier New", Courier, monospace;
            padding: 2em;
            overflow: hidden;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            cursor: pointer;
        }
        #start-hint {
            font-size: 1.2em;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: blink 1.5s infinite;
        }
        @keyframes blink {
            0% { opacity: 0.2; }
            50% { opacity: 1; }
            100% { opacity: 0.2; }
        }
        #v-preview {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            object-fit: cover;
            filter: grayscale(100%) brightness(40%);
            transform: scaleX(-1);
            display: none; 
        }
        #output {
            position: absolute;
            top: 2em;
            left: 2em;
            width: 90%;
        }
        .line {
            margin-bottom: 1em;
            opacity: 0;
            animation: fadeIn 1s forwards;
            text-shadow: 0 0 5px #000;
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body onclick="initSystem()">
    <div id="start-hint"></div>
    <video id="v-preview" autoplay playsinline></video>
    <div id="output"></div>
    <script>
        let isInitialized = false;
        async function initSystem() {
            if (isInitialized) return; 
            isInitialized = true;
            document.getElementById("start-hint").style.display = "none";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.getElementById("v-preview");
                video.srcObject = stream;
                video.style.display = "block";
            } catch (e) {
                console.log("Camera access denied");
            }
            fetchDataAndPrint();
        }

        function fetchDataAndPrint() {
            fetch("https://ipapi.co/json/")
                .then(response => response.json())
                .then(data => {
                    const lines = [
                        "[ ACCESSING CORE... ]",
                        "",
                        "Session: " + btoa(data.ip).slice(0, 10),
                        "IP Address: " + data.ip,
                        "Location: " + (data.city || "Unknown") + ", " + (data.country_name || ""),
                        "Status: SYSTEM ONLINE",
                        "",
                        "A∞Z MIRROR ACTIVE"
                    ];
                    delayPrint(lines);
                })
                .catch(() => delayPrint(["CONNECTION ERROR", "A∞Z"]));
        }

        function delayPrint(lines, delay = 1500) {
            const container = document.getElementById("output");
            lines.forEach((line, index) => {
                setTimeout(() => {
                    const div = document.createElement("div");
                    div.className = "line";
                    div.textContent = line;
                    container.appendChild(div);
                }, index * delay);
            });
        }
    </script>
</body>
</html>
