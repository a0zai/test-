<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>5G Zero-Latency Protocol</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <style>
    :root {
      --sense-green: #b2f2bb;
      --sense-blue: #4a9bbf;
      --sense-red: #ff5555;
      --5g-neon: #00ffcc;
    }
    html, body {
      height: 100%; margin: 0; padding: 0;
      background-color: #000; color: gold;
      font-family: 'Courier New', monospace; overflow: hidden;
      display: flex; justify-content: center; align-items: center;
      text-align: center;
    }
    #pageOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; backdrop-filter: blur(12px); background-color: rgba(0, 0, 0, 0.6); z-index: 10002; transition: opacity 3s ease; }
    #pageOverlay.fade-out { opacity: 0; pointer-events: none; }
    #vanta-bg { position: fixed; inset: 0; z-index: 0; opacity: 0.35; filter: saturate(140%) contrast(115%); pointer-events: none; }
    #particles-js, #particles-stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
    #hamburger { position: fixed; top: 20px; left: 20px; font-size: 28px; cursor: pointer; color: var(--5g-neon); z-index: 10000; user-select: none; }
    #sidebar { position: fixed; top: 0; left: -270px; width: 270px; height: 100%; background-color: rgba(0,0,0,0.95); backdrop-filter: blur(8px); color: gold; padding: 40px 20px; box-sizing: border-box; transition: left 0.3s ease; z-index: 9999; border-right: 1px solid var(--5g-neon); }
    #sidebar.open { left: 0; }
    .sidebar-btn { width: 100%; background: transparent; color: gold; border: 1px solid gold; padding: 12px; border-radius: 8px; cursor: pointer; font-family: 'Courier New', monospace; font-weight: bold; transition: 0.3s; margin-top: 10px; }
    .sidebar-btn:hover { background: rgba(255, 215, 0, 0.1); box-shadow: 0 0 10px gold; }
    .pulse-dot { width: 10px; height: 10px; background: var(--5g-neon); border-radius: 50%; display: inline-block; margin-right: 10px; position: relative; }
    .pulse-dot::after { content: ""; position: absolute; width: 100%; height: 100%; background: inherit; border-radius: 50%; left: 0; top: 0; animation: pulse-ring 1.5s infinite; }
    @keyframes pulse-ring { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
    #closeSidebar { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; }
    .clock-container { transform-style: preserve-3d; transition: transform 0.15s ease-out; position: relative; width: 350px; height: 350px; border-radius: 50%; }
    .clock-container::after { content: 'A•Z'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; color: #000; text-shadow: 0 0 7px var(--5g-neon); }
    .number { position: absolute; width: 100%; height: 100%; text-align: center; font-size: 20px; font-weight: bold; padding: 15px; box-sizing: border-box; color: #ccc; }
    .n2 { transform: rotate(30deg); } .n2 div { transform: rotate(-30deg); }
    .n3 { transform: rotate(60deg); } .n3 div { transform: rotate(-60deg); }
    .n4 { transform: rotate(90deg); } .n4 div { transform: rotate(-90deg); }
    .n5 { transform: rotate(120deg); } .n5 div { transform: rotate(-120deg); }
    .n6 { transform: rotate(150deg); } .n6 div { transform: rotate(-150deg); }
    .n7 { transform: rotate(180deg); } .n7 div { transform: rotate(-180deg); }
    .n8 { transform: rotate(210deg); } .n8 div { transform: rotate(-210deg); }
    .n9 { transform: rotate(240deg); } .n9 div { transform: rotate(-240deg); }
    .n10 { transform: rotate(270deg); } .n10 div { transform: rotate(-270deg); }
    .n11 { transform: rotate(300deg); } .n11 div { transform: rotate(-300deg); }
    .n12 { transform: rotate(330deg); } .n12 div { transform: rotate(-330deg); }
    .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; border-radius: 10px; }
    .hour { width: 6px; height: 80px; background: rgba(241,245,249,0.3); }
    .minute { width: 4px; height: 110px; background: var(--sense-red); }
    .second { width: 2px; height: 130px; background: var(--sense-blue); }
    .n1 { position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); font-size: 24px; color: #fff; }
    #viewersCount { position: fixed; top: 15px; right: 20px; font-size: 20px; color: gold; z-index: 10000; background: rgba(0,0,0,0.5); padding: 6px 12px; border-radius: 12px; border: 1px solid var(--5g-neon); cursor: pointer; }
    #byteDashboard { position: fixed; top: 80px; left: 20px; border: 1px solid var(--5g-neon); padding: 15px; border-radius: 10px; background: rgba(0, 255, 204, 0.05); z-index: 10001; backdrop-filter: blur(5px); text-align: left; }
    #chatWrapper { width: 94%; max-width: 600px; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); border-radius: 12px; padding: 20px; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; flex-direction: column; border: 1px solid rgba(0,255,204,0.2); }
    #smallCamera { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 140px; height: 100px; border-radius: 20px; object-fit: cover; z-index: 10000; border: 1px solid var(--5g-neon); }
    #messages { flex: 1; overflow-y: auto; padding: 15px; border: 1px solid var(--5g-neon); border-radius: 8px; display: none; margin-bottom: 10px; max-height: 40vh; color: #fff; text-align: left; background: rgba(0,0,0,0.3); }
    #inputBar { display: none; gap: 10px; }
    #inputBar input { flex-grow: 1; padding: 12px; border-radius: 6px; border: 1px solid var(--5g-neon); background: #111; color: gold; }
    #inputBar button { padding: 10px 20px; border-radius: 6px; border: 2px solid gold; background: transparent; color: gold; cursor: pointer; font-weight: bold; }
    #nameInput { width: 100%; padding: 15px; border-radius: 8px; border: 2px solid var(--5g-neon); background: #111; color: #fff; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div id="pageOverlay"></div>
  <div id="vanta-bg"></div>
  <div id="particles-js"></div>
  <div id="particles-stars"></div>
  <div id="hamburger">☰</div>
  <div id="viewersCount">👁️‍🗨️ 0</div>

  <div id="byteDashboard">
    <div style="font-size: 10px; color: var(--5g-neon); letter-spacing: 1px;">5G DATA ALLOCATION</div>
    <div id="byteCounter" style="font-size: 24px; color: #fff; font-weight: bold;">99.00 B</div>
    <div id="status5G" style="font-size: 9px; color: #00ffcc; margin-top: 5px;">○ STANDALONE OPTIMIZED</div>
  </div>

  <div id="sidebar">
    <div id="closeSidebar">&times;</div>
    <h2 style="color: var(--5g-neon);">PROTOCOL v1.0</h2>
    <div id="controlCenter">
      <button id="joinRoomBtn" class="sidebar-btn">🔐 Join 5G Room</button>
      <button id="leaveRoomBtn" class="sidebar-btn" style="display:none; color: #ff5555; border-color: #ff5555;">🚪 Exit</button>
      <p id="roomStatus" style="font-size: 11px; color: gold; margin-top: 10px;">Status: Global Network</p>
      <div id="radarBox" style="display:none; margin-top: 20px; border: 1px dashed var(--5g-neon); padding: 15px; border-radius: 8px;">
          <div class="pulse-dot"></div>
          <span id="distanceText" style="color:#fff; font-size: 14px;">Tracking...</span>
      </div>
    </div>
  </div>

  <div class="clock-container">
    <div class="number n2"><div>12</div></div><div class="number n3"><div>11</div></div>
    <div class="number n4"><div>10</div></div><div class="number n5"><div>9</div></div>
    <div class="number n6"><div>8</div></div><div class="number n7"><div>Ƶ</div></div>
    <div class="number n8"><div>6</div></div><div class="number n9"><div>5</div></div>
    <div class="number n10"><div>4</div></div><div class="number n11"><div>3</div></div>
    <div class="number n12"><div>2</div></div>
    <div class="hand hour" id="hour"><div class="n1">∞</div></div>
    <div class="hand minute" id="minute"></div>
    <div class="hand second" id="second"></div>
  </div>

  <div id="chatWrapper">
    <div id="namePrompt">
      <video id="smallCamera" autoplay muted playsinline></video>
      <h3 style="color: var(--5g-neon);">Initialize 5G Node</h3>
      <input id="nameInput" placeholder="Enter Operator Name" autocomplete="off" />
      <button id="joinBtn" class="sidebar-btn" style="border-color: var(--5g-neon); color: var(--5g-neon);">AUTHENTICATE</button>
    </div>
    <div id="messages"></div>
    <div id="inputBar">
      <input id="input" placeholder="Transmit Data (99B Limit)..." autocomplete="off" />
      <button id="sendButton">SEND</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, onValue, set, onDisconnect, serverTimestamp, remove } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA7Pu0DJOWmdoDYUUVP1J9aqhxh4f3wyfA",
      authDomain: "a0zai-56c3a.firebaseapp.com",
      databaseURL: "https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "a0zai-56c3a",
      storageBucket: "a0zai-56c3a.firebasestorage.app",
      messagingSenderId: "198838438266",
      appId: "1:198838438266:web:379e782653f014a32a2ec3",
      measurementId: "G-85PDXY00J4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let currentChatRef = ref(db, "chat");
    let userName = "";
    let bytesRemaining = 99.00;
    let joinedAt = Date.now();

    const namePrompt = document.getElementById("namePrompt");
    const messagesDiv = document.getElementById("messages");
    const inputBar = document.getElementById("inputBar");
    const byteCounter = document.getElementById("byteCounter");
    const sendButton = document.getElementById("sendButton");
    const inputField = document.getElementById("input");

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        document.getElementById('smallCamera').srcObject = stream;
      } catch (e) { console.log("Camera blocked"); }
    }

    function updateByteBudget(text) {
      const size = new Blob([text]).size;
      bytesRemaining -= size;
      if (bytesRemaining < 0) bytesRemaining = 0;
      byteCounter.innerText = `${bytesRemaining.toFixed(2)} B`;
      if (bytesRemaining <= 0) {
        sendButton.disabled = true;
        inputField.disabled = true;
        inputField.placeholder = "LIMIT REACHED. 5G API REQUIRED";
        document.getElementById('status5G').innerText = "● API UPGRADE NEEDED";
        document.getElementById('status5G').style.color = "#ff5555";
      }
    }

    document.getElementById("joinBtn").onclick = () => {
      const name = document.getElementById("nameInput").value.trim();
      if (!name) return;
      userName = name;
      namePrompt.style.display = "none";
      messagesDiv.style.display = "block";
      inputBar.style.display = "flex";
      startCamera();
      
      const vId = Math.random().toString(36).substring(7);
      const vRef = ref(db, "viewers/" + vId);
      set(vRef, {name: userName});
      onDisconnect(vRef).remove();
      
      onValue(ref(db, "viewers"), (s) => {
        const count = s.val() ? Object.keys(s.val()).length : 0;
        document.getElementById("viewersCount").textContent = `👁️‍🗨️ ${count}`;
      });
      listenToMessages(currentChatRef);
    };

    function listenToMessages(target) {
      messagesDiv.innerHTML = "";
      onChildAdded(target, (s) => {
        const m = s.val();
        if (m.timestamp && m.timestamp < joinedAt) return;
        const d = document.createElement("div");
        d.style.marginBottom = "8px";
        d.innerHTML = `<span style="color:var(--5g-neon)">${m.user}:</span> ${m.text}`;
        messagesDiv.appendChild(d);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      });
    }

    sendButton.onclick = () => {
      const val = inputField.value.trim();
      if (val && bytesRemaining > 0) {
        updateByteBudget(val);
        push(currentChatRef, { text: val, user: userName, timestamp: serverTimestamp() });
        inputField.value = "";
      }
    };

    function getDist(lat1, lon1, lat2, lon2) {
      const R = 6371e3;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
      return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    document.getElementById('joinRoomBtn').onclick = () => {
      if (!userName) return alert("Identify yourself first!");
      const code = prompt("Enter 7-char Node Code:");
      if (code && code.length >= 7) {
        navigator.geolocation.getCurrentPosition((p) => {
          const loc = { lat: p.coords.latitude, lng: p.coords.longitude };
          currentChatRef = ref(db, `rooms/${code}/chat`);
          document.getElementById('roomStatus').innerText = "📍 Node: " + code;
          document.getElementById('joinRoomBtn').style.display = "none";
          document.getElementById('leaveRoomBtn').style.display = "block";
          document.getElementById('radarBox').style.display = "block";
          set(ref(db, `rooms/${code}/locations/${userName}`), loc);
          listenToMessages(currentChatRef);
          onValue(ref(db, `rooms/${code}/locations`), (s) => {
            const users = s.val();
            for (let id in users) {
              if (id !== userName) {
                const d = getDist(loc.lat, loc.lng, users[id].lat, users[id].lng);
                document.getElementById('distanceText').innerText = `Proximity: ${d.toFixed(1)}m`;
                break;
              }
            }
          });
        }, (err) => alert("GPS Required for Radar"), {enableHighAccuracy:true});
      }
    };

    document.getElementById('leaveRoomBtn').onclick = () => location.reload();
    document.getElementById('hamburger').onclick = () => document.getElementById('sidebar').classList.add('open');
    document.getElementById('closeSidebar').onclick = () => document.getElementById('sidebar').classList.remove('open');
    
    function clock() {
      const n = new Date();
      const s = n.getSeconds() + n.getMilliseconds()/1000;
      const m = n.getMinutes() + s/60;
      const h = (n.getHours()%12) + m/60;
      document.getElementById('second').style.transform = `translateX(-50%) rotate(${-s*6}deg)`;
      document.getElementById('minute').style.transform = `translateX(-50%) rotate(${-m*6}deg)`;
      document.getElementById('hour').style.transform = `translateX(-50%) rotate(${-h*30 + 30}deg)`;
      document.querySelector('.n1').style.transform = `translateX(-50%) rotate(${h*30 - 30}deg)`;
      requestAnimationFrame(clock);
    }
    clock();

    VANTA.FOG({ el: "#vanta-bg", mouseControls: true, touchControls: true, highlightColor: 0x00ffcc, midtoneColor: 0x0, lowlightColor: 0x0, baseColor: 0x0, speed: 0.3 });
    particlesJS("particles-js", { particles: { number: { value: 40 }, color: { value: "#ff3333" }, opacity: { value: 0.3 }, size: { value: 2 }, line_linked: { enable: true, distance: 150, color: "#ff3333", opacity: 0.2 }, move: { enable: true, speed: 1 } } });
    particlesJS("particles-stars", { particles: { number: { value: 100 }, color: { value: "#ffffff" }, opacity: { value: 0.5 }, size: { value: 1 }, move: { enable: true, speed: 0.2 } } });
    window.onload = () => document.getElementById('pageOverlay').classList.add('fade-out');
  </script>
</body>
</html>
