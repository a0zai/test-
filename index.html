<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A0Z</title>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>
body { background:#000; color:#0ff; font-family:monospace; margin:0; overflow:hidden;}
#particles-js { position:absolute; width:100%; height:100%; z-index:1;}
.container { position:relative; z-index:10; display:flex; justify-content:center; align-items:center; height:100vh;}
.box { width:400px; padding:20px; border:1px solid #f33; background:#100; box-shadow:0 0 15px #f33;}
button { width:100%; padding:12px; background:#f33; border:none; font-weight:bold; cursor:pointer;}
#chat-screen { display:none; flex-direction:column; height:85vh;}
#chat-box { flex:1; overflow-y:auto; border:1px solid #f33; padding:10px; background:#000;}
input { width:100%; padding:10px; background:#000; border:1px solid #f33; color:#f33;}
</style>
</head>

<body>

<div id="particles-js"></div>

<div class="container">
<div id="login" class="box">
<h3 style="color:#f33;">A0Z 🔥</h3>
<input id="postcode" placeholder="Postcode">
<button onclick="join()">ENTER</button>
<p id="status" style="font-size:12px;color:#888;"></p>
</div>

<div id="chat-screen" class="box">
<div id="room-info" style="color:#f33;font-size:12px;"></div>
<div id="chat-box"></div>
<div id="count">99</div>
<div style="display:flex;gap:5px;">
<input id="msg" placeholder="msg..." onkeydown="if(event.key==='Enter')send()">
<button onclick="send()">SND</button>
</div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { 
 getDatabase, ref, push, onChildAdded, serverTimestamp,
 onDisconnect, set, onValue
} from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

const app = initializeApp({
 apiKey:"AIzaSy...",
 projectId:"a0zai-56c3a",
 databaseURL:"https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app"
});

const db = getDatabase(app);

let roomRef, userLoc="Unknown";
let blocked = JSON.parse(localStorage.getItem("blocked") || "[]");

window.join = () => {
 const postcode = document.getElementById("postcode").value.trim();
 if(!postcode) return alert("postcode!");

 document.getElementById("status").textContent="Getting location...";

 navigator.geolocation.getCurrentPosition((p)=>{

  const lat = p.coords.latitude;
  const lon = p.coords.longitude;

  userLoc = `${lat.toFixed(4)},${lon.toFixed(4)}`;

  startChat(postcode, lat, lon);

 }, ()=> alert("GPS error"), {timeout:10000});
};

function startChat(postcode, lat, lon){

 document.getElementById("login").style.display="none";
 document.getElementById("chat-screen").style.display="flex";

 const roomID = `${lat.toFixed(3)}_${lon.toFixed(3)}`;
 roomRef = ref(db, "rooms/"+roomID);

 document.getElementById("room-info").textContent =
 `📍 ${lat.toFixed(3)}, ${lon.toFixed(3)}`;

 // 👥 presence
 const userRef = ref(db, "rooms/"+roomID+"/users/"+postcode);

 set(userRef, true);
 onDisconnect(userRef).remove();

 const usersRef = ref(db, "rooms/"+roomID+"/users");

 onValue(usersRef, (snap)=>{
  const count = snap.val() ? Object.keys(snap.val()).length : 0;
  document.getElementById("room-info").textContent =
  `📍 ${lat.toFixed(3)}, ${lon.toFixed(3)} | 👥 ${count}`;
 });

 // 💬 send
 window.send = ()=>{
  const input = document.getElementById("msg");
  const text = input.value.trim();

  let today = new Date().toDateString();
  let used = parseInt(localStorage.getItem("u_"+today)||"0");

  if(!text) return;
  if(used+text.length>99) return alert("limit!");

  push(roomRef,{
   sender:postcode,
   msg:text,
   loc:userLoc,
   t:serverTimestamp()
  });

  localStorage.setItem("u_"+today, used+text.length);
  input.value="";
  updateCount();
 };

 // 📩 receive
 onChildAdded(roomRef,(snap)=>{
  const d = snap.val();

  if(blocked.includes(d.sender)) return;

  const ok = d.loc!=="Unknown" ? "✅":"";

  const div = document.createElement("div");
  div.style.margin="5px 0";

  div.innerHTML = `
  <span style="color:#f33;cursor:pointer;" onclick="blockUser('${d.sender}')">
  [${d.sender} ${ok}]
  </span>: ${d.msg}
  `;

  document.getElementById("chat-box").appendChild(div);
 });

 updateCount();
}

// 🚫 block
window.blockUser = (id)=>{
 if(!confirm("Block "+id+" ?")) return;

 blocked.push(id);
 localStorage.setItem("blocked", JSON.stringify(blocked));
 alert("Blocked 💀");
};

// 🔢 count
function updateCount(){
 let used = parseInt(localStorage.getItem("u_"+new Date().toDateString())||"0");
 document.getElementById("count").textContent = 99-used;
}

// 🌌 particles
particlesJS("particles-js",{
 particles:{number:{value:40},color:{value:"#f33"},move:{speed:1}}
});
</script>

</body>
</html>
