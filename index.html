<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A∞Z | Fast Node</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    :root { --sense-green: #00ffcc; --sense-blue: #4a9bbf; --sense-red: #ff5555; }
    * { box-sizing: border-box; }
    body { background-color: #000; color: gold; font-family: monospace; margin: 0; overflow: hidden; height: 100vh; }
    
    #pageOverlay { 
      position: fixed; inset: 0; background: #000; z-index: 9999; 
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.8s ease; 
    }
    .hidden { opacity: 0; pointer-events: none; }

    #vanta-bg { position: fixed; inset: 0; z-index: 0; }
    #chatWrapper { 
      position: relative; z-index: 100; width: 90%; max-width: 400px; 
      height: 80vh; margin: 10vh auto; background: rgba(0, 10, 5, 0.9);
      border: 1px solid var(--sense-green); border-radius: 15px;
      display: flex; flex-direction: column; overflow: hidden;
    }
    #namePrompt { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
    input { background: #000; border: 1px solid var(--sense-green); color: gold; padding: 12px; width: 80%; border-radius: 5px; text-align: center; }
    #messages { flex: 1; overflow-y: auto; padding: 15px; display: none; }
    #inputBar { display: none; padding: 10px; border-top: 1px solid #333; gap: 5px; }
    .msg { margin-bottom: 10px; font-size: 13px; }
    #byteCounter { position: fixed; top: 10px; right: 10px; color: #fff; font-weight: bold; z-index: 1000; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 5px;}
  </style>
</head>
<body>

  <div id="pageOverlay"> <h2 style="color:var(--sense-green)">A∞Z_CONNECTING...</h2> </div>
  <div id="vanta-bg"></div>
  <div id="byteCounter">99.00 B</div>

  <div id="chatWrapper">
    <div id="namePrompt">
      <video id="smallCamera" autoplay muted playsinline style="width:70px; height:70px; border-radius:50%; object-fit:cover; border:2px solid var(--sense-green); background:#111;"></video>
      <input id="nameInput" placeholder="اسمك المستعار" />
      <input id="roomInput" placeholder="رقم الغرفة (مثال: 777)" />
      <button onclick="startApp()" style="padding:10px 30px; background:transparent; color:var(--sense-green); border:1px solid var(--sense-green); cursor:pointer;">دخول</button>
    </div>
    <div id="messages"></div>
    <div id="inputBar">
      <input id="input" style="width:70%;" placeholder="اكتب هنا..." />
      <button onclick="sendMsg()" style="width:25%; background:var(--sense-green); border:none; color:#000; font-weight:bold;">إرسال</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, set, onDisconnect } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA7Pu0DJOWmdoDYUUVP1J9aqhxh4f3wyfA",
      authDomain: "a0zai-56c3a.firebaseapp.com",
      databaseURL: "https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "a0zai-56c3a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let userName = "", roomCode = "";

    // وظيفة بدء التطبيق
    window.startApp = () => {
      userName = document.getElementById("nameInput").value;
      roomCode = document.getElementById("roomInput").value;
      
      if(userName && roomCode) {
        document.getElementById("namePrompt").style.display = "none";
        document.getElementById("messages").style.display = "block";
        document.getElementById("inputBar").style.display = "flex";
        
        // الاستماع للرسائل
        onChildAdded(ref(db, "chat/" + roomCode), (snap) => {
          const m = snap.val();
          const d = document.createElement("div");
          d.className = "msg";
          d.innerHTML = `<b style="color:var(--sense-blue)">${m.user}:</b> ${m.text}`;
          document.getElementById("messages").appendChild(d);
          document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
        });
      }
    };


    window.sendMsg = () => {
      const txt = document.getElementById("input").value;
      if(txt) {
        push(ref(db, "chat/" + roomCode), { user: userName, text: txt });
        document.getElementById("input").value = "";
      }
    };


    window.onload = () => {
      setTimeout(() => {
        document.getElementById("pageOverlay").classList.add("hidden");
      }, 2000);
      

      try {
        VANTA.FOG({
          el: "#vanta-bg",
          mouseControls: true, touchControls: true,
          highlightColor: 0x00ffcc, midtoneColor: 0x0, lowlightColor: 0x0, baseColor: 0x0,
          speed: 1.5
        });
      } catch(e) { console.log("Vanta error"); }

      navigator.mediaDevices.getUserMedia({ video: true })
        .then(s => document.getElementById('smallCamera').srcObject = s)
        .catch(() => console.log("Camera denied"));
    };
  </script>
</body>
</html>
