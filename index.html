<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A0Z - Fixed</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<style>
body { background:#000; color:#0ff; font-family:monospace; margin:0; overflow:hidden;}
#vanta-bg { position: fixed; inset: 0; z-index: 0; opacity: 0.35; pointer-events: none;}
#particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
.container { position:relative; z-index:10; display:flex; justify-content:center; align-items:center; height:100vh;}
.box { width:400px; padding:20px; border:1px solid #f33; background:rgba(15, 0, 0, 0.9); box-shadow:0 0 15px #f33;}
button { width:100%; padding:12px; background:#f33; border:none; font-weight:bold; cursor:pointer; color:#000;}
#chat-screen { display:none; flex-direction:column; height:80vh;}
#chat-box { flex:1; overflow-y:auto; border:1px solid #f33; padding:10px; background:#000; margin-bottom:10px; color:#fff;}
input { width:100%; padding:10px; background:#000; border:1px solid #f33; color:#f33; box-sizing: border-box; margin-bottom:5px;}
#count { color: #f33; text-align: right; font-size: 12px;}
</style>
</head>
<body>

<div id="vanta-bg"></div>
<div id="particles-js"></div>

<div class="container">
    <div id="login" class="box">
        <h3 style="color:#f33;">A0Z 🔥</h3>
        <input id="postcode" placeholder="Enter Postcode/Name">
        <button onclick="join()">ENTER</button>
        <p id="status" style="font-size:12px;color:#888;"></p>
    </div>

    <div id="chat-screen" class="box">
        <div id="room-info" style="color:#f33;font-size:12px; margin-bottom:5px;">Connecting...</div>
        <div id="chat-box"></div>
        <div id="count">Remaining: 99</div>
        <div style="display:flex;gap:5px;">
            <input id="msg" placeholder="Type message..." onkeydown="if(event.key==='Enter')send()">
            <button onclick="send()" style="width:70px;">SND</button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, serverTimestamp, onDisconnect, set, onValue } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";

const firebaseConfig = { 
    apiKey: "AIzaSyA7Pu0DJOWmdoDYUUVP1J9aqhxh4f3wyfA", 
    projectId: "a0zai-56c3a",
    databaseURL: "https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app" 
};

// 1. تشغيل التطبيق أولاً
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let roomRef, userLoc="Unknown";
let blocked = JSON.parse(localStorage.getItem("blocked") || "[]");

window.join = () => {
    const postcode = document.getElementById("postcode").value.trim();
    if(!postcode) return alert("Enter ID!");

    document.getElementById("status").textContent="Requesting GPS...";

    navigator.geolocation.getCurrentPosition((p)=>{
        startChat(postcode, p.coords.latitude, p.coords.longitude);
    }, ()=> {
        alert("GPS required for room access.");
        document.getElementById("status").textContent="GPS Error.";
    }, {timeout:10000});
};

function startChat(postcode, lat, lon){
    userLoc = `${lat.toFixed(4)},${lon.toFixed(4)}`;
    document.getElementById("login").style.display="none";
    document.getElementById("chat-screen").style.display="flex";

    // تحديد الغرفة بناءً على الموقع (تقريب الإحداثيات لجمع المستخدمين القريبين)
    const roomID = `${lat.toFixed(2)}_${lon.toFixed(2)}`.replace(/\./g, '-');
    
    // مسارات منفصلة للرسائل والمستخدمين
    const msgRef = ref(db, `rooms/${roomID}/messages`);
    const usersRef = ref(db, `rooms/${roomID}/users`);
    const myPresenceRef = ref(db, `rooms/${roomID}/users/${postcode}`);

    // تسجيل الدخول وحذف المستخدم عند الخروج
    set(myPresenceRef, { active: true, lastSeen: serverTimestamp() });
    onDisconnect(myPresenceRef).remove();

    // تحديث عدد المتواجدين
    onValue(usersRef, (snap)=>{
        const count = snap.val() ? Object.keys(snap.val()).length : 0;
        document.getElementById("room-info").textContent = `📍 ${lat.toFixed(2)},${lon.toFixed(2)} | 👥 Online: ${count}`;
    });

    // وظيفة الإرسال
    window.send = ()=>{
        const input = document.getElementById("msg");
        const text = input.value.trim();
        let today = new Date().toDateString();
        let used = parseInt(localStorage.getItem("u_"+today)|| "0");

        if(!text) return;
        if(used + text.length > 99) return alert("Limit 99 chars reached!");

        push(msgRef, {
            sender: postcode,
            msg: text,
            loc: userLoc,
            t: serverTimestamp()
        });

        localStorage.setItem("u_"+today, used + text.length);
        input.value="";
        updateCount();
    };

    // وظيفة استقبال الرسائل
    onChildAdded(msgRef, (snap)=>{
        const d = snap.val();
        if(blocked.includes(d.sender)) return;

        const div = document.createElement("div");
        div.style.padding = "4px";
        div.innerHTML = `<b style="color:#f33; cursor:pointer" onclick="window.blockUser('${d.sender}')">[${d.sender}]</b>: ${d.msg}`;
        
        const cb = document.getElementById("chat-box");
        cb.appendChild(div);
        cb.scrollTop = cb.scrollHeight;
    });

    updateCount();
}

window.blockUser = (id)=>{
    if(confirm("Block "+id+"?")){
        blocked.push(id);
        localStorage.setItem("blocked", JSON.stringify(blocked));
        location.reload();
    }
};

function updateCount(){
    let used = parseInt(localStorage.getItem("u_"+new Date().toDateString())||"0");
    document.getElementById("count").textContent = "Chars left: " + (99 - used);
}

// تأثيرات بصرية
VANTA.FOG({
    el: "#vanta-bg",
    mouseControls: true, touchControls: true,
    highlightColor: 0xff3333, midtoneColor: 0x110000, lowlightColor: 0x0, baseColor: 0x0,
    speed: 1.5
});
</script>
</body>
</html>
