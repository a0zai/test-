<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A0Z - TERMINAL 366m</title>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body { margin:0; font-family:'Courier New', monospace; background: var(--bg); color: var(--neon); overflow:hidden; }
        #particles-js { position:fixed; inset:0; z-index:1; }
        
        .box { 
            position:relative; z-index:10; width:380px; max-width:90%; padding:20px; 
            border: 4px double var(--neon); background: rgba(0, 20, 0, 0.9);
            box-shadow: inset 0 0 20px rgba(0,255,65,0.2), 0 0 15px rgba(0,255,65,0.5);
            text-align: center;
        }

        h2 { text-transform: uppercase; letter-spacing: 4px; border-bottom: 2px solid var(--neon); padding-bottom: 10px; animation: pulse 2s infinite; }
        
        #chat-screen { display:none; flex-direction:column; height:85vh; width:500px; }
        #chat-box { 
            flex:1; overflow-y:auto; border: 1px solid var(--neon); padding:10px; 
            background: #000; margin-bottom:10px; text-align:left; font-size:14px;
        }

        input { 
            width:100%; padding:10px; background:#000; border:1px solid var(--neon); 
            color:var(--neon); outline:none; font-family:inherit; margin-top:5px;
        }

        button { 
            width:100%; padding:12px; background:var(--neon); color:#000; 
            border:none; font-weight:bold; cursor:pointer; margin-top:10px;
            text-transform:uppercase; transition: 0.3s;
        }
        button:hover { background: #fff; box-shadow: 0 0 20px var(--neon); }

        .sys-msg { color: #fff; font-size: 10px; opacity: 0.6; margin-bottom: 10px; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--neon); }
    </style>
</head>
<body>

<div id="particles-js"></div>

<div style="display:flex; justify-content:center; align-items:center; height:100vh;">
    <div id="login" class="box">
        <h2>System Boot</h2>
        <p class="sys-msg">Searching for device signature...</p>
        <p id="device-info" style="font-size:12px;"></p>
        <button id="boot-btn" onclick="bootSystem()">Connect GPS</button>
    </div>

    <div id="chat-screen" class="box">
        <div id="meta" style="font-size:10px; margin-bottom:5px;">ZONE: SCANNING...</div>
        <div id="chat-box"></div>
        <div style="font-size:10px; text-align:right;">MAX_LEN: 99</div>
        <div style="display:flex; gap:5px;">
            <input id="msg" placeholder="Command..." onkeydown="if(event.key==='Enter')send()">
            <button onclick="send()" style="width:70px; margin-top:5px;">SND</button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";

const firebaseConfig = { 
    apiKey: "AIzaSyA7Pu0DJOWmdoDYUUVP1J9aqhxh4f3wyfA", 
    projectId: "a0zai-56c3a",
    databaseURL: "https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app" 
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
let deviceID = localStorage.getItem("a0z_signature");
if(!deviceID) {
    deviceID = 'USR-' + Math.random().toString(36).substr(2, 5).toUpperCase();
    localStorage.setItem("a0z_signature", deviceID);
}
document.getElementById("device-info").textContent = "ID: " + deviceID;

window.bootSystem = () => {
    const btn = document.getElementById("boot-btn");
    btn.textContent = "LOCATING...";

    navigator.geolocation.getCurrentPosition((p) => {
        const lat = p.coords.latitude;
        const lon = p.coords.longitude;
        
        // 2. نطاق 366 متر (تقسيم المنطقة لغرف دقيقة)
        const zoneID = `Z-${(Math.round(lat / 0.0033) * 0.0033).toFixed(4)}_${(Math.round(lon / 0.0033) * 0.0033).toFixed(4)}`.replace(/\./g, '');
        
        runRadar(zoneID);
    }, () => {
        alert("ACCESS DENIED: GPS Signal Missing.");
        location.reload();
    }, { enableHighAccuracy: true });
};

function runRadar(zoneID) {
    document.getElementById("login").style.display = "none";
    document.getElementById("chat-screen").style.display = "flex";
    document.getElementById("meta").textContent = `STATION: ${zoneID} | SIG: ${deviceID}`;

    const chatRef = ref(db, `v3_zones/${zoneID}`);

    window.send = () => {
        const input = document.getElementById("msg");
        const text = input.value.trim();
        let today = new Date().toDateString();
        let used = parseInt(localStorage.getItem("u_" + today) || "0");

        if(!text || (used + text.length > 99)) return;

        push(chatRef, { 
            id: deviceID, 
            msg: text, 
            t: serverTimestamp() 
        });

        localStorage.setItem("u_" + today, used + text.length);
        input.value = "";
    };

    onChildAdded(chatRef, (snap) => {
        const d = snap.val();
        const chatBox = document.getElementById("chat-box");
        const div = document.createElement("div");
        div.style.padding = "2px 0";
        div.innerHTML = `> <b style="color:#fff;">${d.id}✅</b>: ${d.msg}`;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    });
}

particlesJS("particles-js", {
    "particles": {
        "number": { "value": 80 },
        "color": { "value": "#00ff41" },
        "shape": { "type": "edge" },
        "opacity": { "value": 0.2 },
        "size": { "value": 2 },
        "line_linked": { "enable": true, "distance": 150, "color": "#00ff41", "opacity": 0.1, "width": 1 },
        "move": { "enable": true, "speed": 1 }
    }
});
</script>
</body>
</html>
