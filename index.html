<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dark Watch Shop - Mobile</title>
<style>
    body { margin: 0; overflow: hidden; background: black; font-family: Arial; touch-action: none; }
    #ui { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 8px; border-radius: 8px; font-size: 12px; pointer-events: none; z-index: 10; }
    #joystick-container { position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px; z-index: 100; }
    #action-btn { position: absolute; bottom: 70px; right: 50px; width: 80px; height: 80px; background: rgba(255,255,255,0.2); border: 2px solid white; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; z-index: 100; font-weight: bold; -webkit-tap-highlight-color: transparent; }
    #start { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; background: black; padding: 20px; border: 1px solid white; cursor: pointer; z-index: 1000; }
    #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #00ff88; font-size: 24px; text-shadow: 0 0 10px #00ff88; display: none; pointer-events: none; z-index: 500; text-align: center; }
</style>
</head>
<body>

<div id="ui">حرك الجويستيك للمشي | اسحب الشاشة للرؤية</div>
<div id="start">دخول</div>
<div id="msg">ساعة الـ 22 نبضت!</div>
<div id="joystick-container"></div>
<div id="action-btn">نبض</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.1/nipplejs.min.js"></script>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const light = new THREE.PointLight(0xffffff, 2, 50);
light.position.set(0, 5, 0);
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040));

const floor = new THREE.Mesh(new THREE.PlaneGeometry(80, 80), new THREE.MeshStandardMaterial({color: 0x111111}));
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

function createShelf(x, z) {
    const shelf = new THREE.Mesh(new THREE.BoxGeometry(4, 2, 0.5), new THREE.MeshStandardMaterial({color: 0x333333}));
    shelf.position.set(x, 1, z);
    scene.add(shelf);
    for(let i=0; i<6; i++){
        const watch = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.05, 32), new THREE.MeshStandardMaterial({color: 0xffd700, emissive: 0x332200}));
        watch.rotation.x = Math.PI/2;
        watch.position.set(x-1.5+i*0.6, 1.5, z+0.35);
        scene.add(watch);
    }
}
[[-6,-6],[6,-6],[-6,-12],[6,-12],[-6,-18],[6,-18]].forEach(p => createShelf(p[0], p[1]));

const npc = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1.4, 4, 8), new THREE.MeshStandardMaterial({color: 0x111111}));
npc.position.set(0, 1, -22);
scene.add(npc);

const mask = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 16), new THREE.MeshStandardMaterial({color: 0xffffff}));
mask.position.set(0, 2, -22);
scene.add(mask);

let lon = 0, lat = 0, phi = 0, theta = 0;
let onPointerDownPointerX = 0, onPointerDownPointerY = 0, onPointerDownLon = 0, onPointerDownLat = 0;

document.addEventListener('pointerdown', (e) => {
    if(e.target.id === 'action-btn') return;
    onPointerDownPointerX = e.clientX;
    onPointerDownPointerY = e.clientY;
    onPointerDownLon = lon;
    onPointerDownLat = lat;
    document.addEventListener('pointermove', onPointerMove);
    document.addEventListener('pointerup', onPointerUp);
});

function onPointerMove(e) {
    lon = (onPointerDownPointerX - e.clientX) * 0.15 + onPointerDownLon;
    lat = (e.clientY - onPointerDownPointerY) * 0.15 + onPointerDownLat;
    lat = Math.max(-85, Math.min(85, lat));
}

function onPointerUp() {
    document.removeEventListener('pointermove', onPointerMove);
    document.removeEventListener('pointerup', onPointerUp);
}

let moveDir = { x: 0, y: 0 };
const joystick = nipplejs.create({
    zone: document.getElementById('joystick-container'),
    mode: 'static',
    position: { left: '60px', bottom: '60px' },
    color: 'white'
});

joystick.on('move', (evt, data) => {
    moveDir.x = data.vector.x;
    moveDir.y = data.vector.y;
});
joystick.on('end', () => { moveDir = { x: 0, y: 0 }; });

document.getElementById("action-btn").addEventListener("touchstart", (e) => {
    e.preventDefault();
    const dist = camera.position.distanceTo(npc.position);
    if(dist < 5) {
        document.getElementById("msg").style.display = "block";
        mask.material.emissive.setHex(0x00ff88);
        setTimeout(() => {
            document.getElementById("msg").style.display = "none";
            mask.material.emissive.setHex(0x000000);
        }, 2000);
    }
});

document.getElementById("start").onclick = () => {
    document.getElementById("start").style.display = "none";
};

function animate() {
    requestAnimationFrame(animate);

    phi = THREE.MathUtils.degToRad(90 - lat);
    theta = THREE.MathUtils.degToRad(lon);
    const target = new THREE.Vector3();
    target.setFromSphericalCoords(1, phi, theta).add(camera.position);
    camera.lookAt(target);

    const forward = new THREE.Vector3().setFromMatrixColumn(camera.matrix, 0).crossVectors(camera.up, new THREE.Vector3().setFromMatrixColumn(camera.matrix, 0));
    const right = new THREE.Vector3().setFromMatrixColumn(camera.matrix, 0);
    
    camera.position.addScaledVector(forward, moveDir.y * 0.15);
    camera.position.addScaledVector(right, moveDir.x * 0.15);

    npc.lookAt(camera.position);
    mask.lookAt(camera.position);
    renderer.render(scene, camera);
}
animate();

window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
