<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>FATAL ERROR</title>
    <style>
        body { background: #000; color: #f00; font-family: 'Courier New', monospace; overflow: hidden; margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; cursor: pointer; }
        
        #v-preview { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; transform: scaleX(-1); filter: invert(100%) contrast(200%) brightness(50%); display: none; }
        
        #console { position: absolute; top: 20px; left: 20px; width: 90%; pointer-events: none; }
        .line { font-size: 12px; margin-bottom: 4px; white-space: nowrap; }
        
        .glitch { animation: glitch 0.1s infinite; font-size: 20px; font-weight: bold; }
        @keyframes glitch { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(0); } }
        
        #init-msg { border: 2px solid #f00; padding: 20px; letter-spacing: 2px; }
        .flash { animation: flash-red 0.1s infinite; }
        @keyframes flash-red { 0% { background: #000; } 50% { background: #300; } 100% { background: #000; } }
    </style>
</head>
<body onclick="executeDestruction()">

    <div id="init-msg">CRITICAL SYSTEM FAILURE<br>TAP TO ATTEMPT RECOVERY</div>
    <video id="v-preview" autoplay playsinline></video>
    <div id="console"></div>

    <script>
        let isRunning = false;

        async function executeDestruction() {
            if (isRunning) return;
            isRunning = true;
            document.getElementById("init-msg").remove();
            document.body.classList.add("flash");
            const video = document.getElementById("v-preview");
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.style.display = "block";
                };
            } catch (e) {
                printLines(["SECURITY OVERRIDE FAILED", "FORCING SYSTEM WIPE..."]);
            }

            const sequence = [
                "INFECTING KERNEL...",
                "ACCESSING PRIVATE_STORAGE/DCIM/CAMERA",
                "FOUND 2419 IMAGES - UPLOADING...",
                "CONTACTS SYNCED TO EXTERNAL SERVER",
                "DELETING BIOS PARTITION...",
                "WIPING NVRAM...",
                "TERMINAL STATUS: COMPROMISED"
            ];
            
            printLines(sequence);
        }

        function printLines(lines) {
            const container = document.getElementById("console");
            lines.forEach((text, i) => {
                setTimeout(() => {
                    const div = document.createElement("div");
                    div.className = "line";
                    div.textContent = ">> " + text;
                    container.appendChild(div);
                    if (navigator.vibrate) navigator.vibrate(50); // اهتزاز مع كل سطر
                    
                    if (i === lines.length - 1) {
                        setTimeout(finalBlow, 2000);
                    }
                }, i * 350);
            });
        }

        function finalBlow() {
            document.body.classList.remove("flash");
            document.body.style.background = "#000";
            document.body.innerHTML = "<div class='glitch'>HARDWARE DESTROYED.<br>GOODBYE.</div>";
            if (navigator.vibrate) navigator.vibrate(2000); // اهتزاز طويل جداً
            setTimeout(() => {
                document.body.innerHTML = "";
            }, 3000);
        }
    </script>
</body>
</html>
