<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Royal Gallery</title>
    <style>
        body { margin: 0; overflow: hidden; background: #fff; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #b8860b; background: rgba(255,255,255,0.9); padding: 15px 25px; border-radius: 10px; border: 2px solid #b8860b; pointer-events: none; z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #joystick-container { position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px; z-index: 100; }
        #start { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; background: #b8860b; padding: 15px 60px; border: none; border-radius: 50px; cursor: pointer; z-index: 1000; font-weight: bold; font-size: 22px; box-shadow: 0 10px 20px rgba(184,134,11,0.4); transition: 0.3s; }
        #start:hover { background: #966d09; transform: translate(-50%, -50%) scale(1.05); }
    </style>
</head>
<body>

<div id="ui">
    <h2 style="margin:0; letter-spacing: 2px;">ELITE BOUTIQUE</h2>
    <p style="margin:5px 0 0; color: #444; font-size: 14px;">إضاءة كاملة - تجربة فاخرة</p>
</div>
<div id="start">دخول المعرض</div>
<div id="joystick-container"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.1/nipplejs.min.js"></script>

<script>
let watches = [];
let targetMove = { x: 0, z: 0 };
let currentMove = { x: 0, z: 0 };

// ==== 1. Scene & Bright Lighting ====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xfafafa); // خلفية فاتحة جداً لنظافة التصميم

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 1.7, 30); // البداية من الخارج

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// إضاءة عامة قوية (Bright White Interior)
const ambientLight = new THREE.AmbientLight(0xffffff, 1.2); 
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
sunLight.position.set(5, 10, 7.5);
scene.add(sunLight);

// ==== 2. Architecture (Marble & Gold) ====
// الأرضية: رخام أبيض لامع
const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(50, 150),
    new THREE.MeshStandardMaterial({color: 0xffffff, roughness: 0.05, metalness: 0.2})
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

// السجاد: أحمر مخملي ناصع
const carpet = new THREE.Mesh(
    new THREE.PlaneGeometry(6, 150),
    new THREE.MeshStandardMaterial({color: 0x990000})
);
carpet.rotation.x = -Math.PI / 2;
carpet.position.y = 0.03;
scene.add(carpet);

// الجدران: بيضاء مع إطارات ذهبية
function createWall(x) {
    const wall = new THREE.Mesh(
        new THREE.BoxGeometry(0.5, 15, 100),
        new THREE.MeshStandardMaterial({color: 0xffffff})
    );
    wall.position.set(x, 7.5, 0);
    scene.add(wall);

    // إطار ذهبي سفلي
    const trim = new THREE.Mesh(
        new THREE.BoxGeometry(0.6, 0.5, 100),
        new THREE.MeshStandardMaterial({color: 0xd4af37, metalness: 1})
    );
    trim.position.set(x, 0.25, 0);
    scene.add(trim);
}
createWall(-12);
createWall(12);

// ==== 3. Animated Luxury Watches ====
function createWatchModel(colorHex) {
    const group = new THREE.Group();
    const caseGeo = new THREE.TorusGeometry(0.3, 0.05, 16, 100);
    const caseMat = new THREE.MeshStandardMaterial({color: colorHex, metalness: 1, roughness: 0.1});
    const watchCase = new THREE.Mesh(caseGeo, caseMat);
    
    const dial = new THREE.Mesh(new THREE.CircleGeometry(0.26, 32), new THREE.MeshStandardMaterial({color: 0xffffff}));
    dial.position.z = 0.02;

    const hands = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.2, 0.01), new THREE.MeshBasicMaterial({color: 0x000}));
    hands.position.y = 0.1; hands.position.z = 0.03;
    
    group.add(watchCase, dial, hands);
    return group;
}

function addDisplay(x, z, color) {
    // قاعدة كريستالية
    const base = new THREE.Mesh(
        new THREE.CylinderGeometry(0.7, 0.7, 1.4, 32),
        new THREE.MeshStandardMaterial({color: 0xffffff, transparent: true, opacity: 0.8, metalness: 0.5})
    );
    base.position.set(x, 0.7, z);
    scene.add(base);

    const watch = createWatchModel(color);
    watch.position.set(x, 2, z);
    scene.add(watch);
    watches.push(watch);

    // إضاءة Spotlight لكل ساعة (بيضاء نقية)
    const spot = new THREE.SpotLight(0xffffff, 30);
    spot.position.set(x, 8, z);
    spot.target = watch;
    scene.add(spot);
}

addDisplay(-6, 10, 0xd4af37); // ذهب
addDisplay(6, 10, 0xc0c0c0);  // فضة
addDisplay(-6, -5, 0x111111); // أسود ملكي
addDisplay(6, -5, 0xd4af37);  // ذهب
addDisplay(0, -15, 0xc0c0c0); // فضة

// ==== 4. الموظف الأنيق ====
const staff = new THREE.Group();
const suit = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.3, 0.4), new THREE.MeshStandardMaterial({color: 0x111}));
const head = new THREE.Mesh(new THREE.SphereGeometry(0.25, 16, 16), new THREE.MeshStandardMaterial({color: 0xedc9af}));
head.position.y = 0.9;
const mask = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.12, 0.2), new THREE.MeshStandardMaterial({color: 0xffffff}));
mask.position.set(0, 0.85, 0.18);
staff.add(suit, head, mask);
staff.position.set(0, 0.65, -25);
scene.add(staff);

// ==== 5. Controls & Smooth Animation ====
let moveDir = { x: 0, y: 0 };
const joystick = nipplejs.create({ zone: document.getElementById('joystick-container'), mode: 'static', position: {left: '70px', bottom: '70px'}, color: '#b8860b' });
joystick.on('move', (e, d) => { moveDir.x = d.vector.x; moveDir.y = d.vector.y; });
joystick.on('end', () => { moveDir = { x: 0, y: 0 }; });

let lon = 0, lat = 0;
document.addEventListener('pointermove', (e) => { if(e.buttons === 1){ lon -= e.movementX * 0.15; lat -= e.movementY * 0.15; lat = Math.max(-85, Math.min(85, lat)); } });

document.getElementById("start").onclick = () => { document.getElementById("start").style.display = "none"; };

function animate() {
    requestAnimationFrame(animate);
    
    // تحريك الساعات (دوران ناعم)
    const time = Date.now() * 0.0015;
    watches.forEach((w, i) => {
        w.rotation.y += 0.02;
        w.position.y = 2 + Math.sin(time + i) * 0.1;
    });

    // سلاسة حركة الكاميرا (Damping)
    currentMove.x += (moveDir.x * 0.18 - currentMove.x) * 0.1;
    currentMove.z += (moveDir.y * 0.18 - currentMove.z) * 0.1;

    const phi = THREE.MathUtils.degToRad(90 - lat);
    const theta = THREE.MathUtils.degToRad(lon);
    const target = new THREE.Vector3().setFromSphericalCoords(1, phi, theta).add(camera.position);
    camera.lookAt(target);

    const fwd = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
    fwd.y = 0; fwd.normalize();
    const rgt = new THREE.Vector3().crossVectors(camera.up, fwd).negate();

    camera.position.addScaledVector(fwd, currentMove.z);
    camera.position.addScaledVector(rgt, currentMove.x);

    staff.lookAt(camera.position.x, 1.7, camera.position.z);
    renderer.render(scene, camera);
}
animate();

window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
