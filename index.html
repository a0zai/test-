<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A∞Z | Global Player</title>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #ff3333; font-family: 'Courier New', monospace; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: 0; }
        #ui-wrapper { z-index: 10; background: rgba(0,0,0,0.9); padding: 40px; border: 1px solid red; border-radius: 20px; text-align: center; width: 300px; box-shadow: 0 0 20px red; }
        
        .main-btn { 
            background: transparent; border: 2px solid #ff0000; color: #ff0000; 
            padding: 20px; cursor: pointer; font-weight: bold; border-radius: 10px; 
            width: 100%; font-size: 18px; text-transform: uppercase; transition: 0.3s;
        }
        .main-btn:hover { background: #ff0000; color: #000; box-shadow: 0 0 30px #ff0000; }
        #status { margin-top: 20px; font-size: 12px; color: #666; }
        .flash { animation: flashAnim 0.1s infinite; }
        @keyframes flashAnim { 0% { background: #000; } 50% { background: #200; } 100% { background: #000; } }
    </style>
</head>
<body>

<div id="particles-js"></div>

<div id="ui-wrapper">
    <h2 style="letter-spacing: 5px;">A∞Z SYSTEM</h2>
    <p style="font-size: 10px; color: #800;">GLOBAL AUDIO PROTOCOL</p>
    
    <button id="playAllBtn" class="main-btn">ACTIVATE ALL ⚡</button>
    
    <div id="status">Waiting for signal...</div>
</div>

<audio id="globalAudio" src="seensee.mp3" preload="auto"></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getDatabase, ref, set, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyBUb10JpH6iTD1sqSN7xz_lYDZUNSVennQ",
    authDomain: "testing-9b30c.firebaseapp.com",
    databaseURL: "https://testing-9b30c-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "testing-9b30c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const audio = document.getElementById("globalAudio");
const btn = document.getElementById("playAllBtn");
const status = document.getElementById("status");
btn.onclick = () => {
    set(ref(db, 'global_trigger'), {
        action: 'PLAY',
        timestamp: serverTimestamp()
    });
    status.textContent = "SIGNAL SENT!";
};

onValue(ref(db, 'global_trigger'), (snap) => {
    const data = snap.val();
    if (data && data.action === 'PLAY') {
        // تشغيل الغنية عند الكل
        audio.currentTime = 0; // يبدأ من الأول
        audio.play().then(() => {
            status.textContent = "SYSTEM ACTIVE: PLAYING...";
            document.body.classList.add("flash");
            setTimeout(() => document.body.classList.remove("flash"), 5000);
        }).catch(e => {
            status.innerHTML = "<b style='color:yellow;'>TAP SCREEN TO JOIN AUDIO!</b>";
        });
    }
});

// Particles
particlesJS("particles-js", {
    particles: { number: { value: 60 }, color: { value: "#ff0000" }, shape: { type: "circle" }, opacity: { value: 0.3 }, size: { value: 2 }, line_linked: { enable: true, color: "#ff0000", opacity: 0.2 }, move: { speed: 1 } }
});
</script>
</body>
</html>
