    <style>
:root {
    --neon: #00ff41;
    --bg: #000000;
    --sense-green: #b2f2bb;
    --sense-blue: #4a9bbf;
    --sense-red: #9b5050;
}
   body, html { margin:0; padding:0; width:100%; height:100%; background: var(--bg); font-family:'Courier New', monospace; overflow:hidden; color: var(--neon); }
        body::before { content: " "; display: block; position: absolute; inset: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); z-index: 100; background-size: 100% 2px, 3px 100%; pointer-events: none; }
        #particles-js { position:fixed; inset:0; z-index:1; background: #000; }
.container { 
    position:relative; 
    z-index:10; 
    display:flex; 
    flex-direction: column; 
    justify-content: center; 
    align-items: center; 
    min-height: 100vh; 
}
    .clock-container {
    transform-style: preserve-3d;
    transform: translateZ(20px);
    transition: transform 0.15s ease-out;
    will-change: transform;
    position: relative;
    width: 200px;
    height: 200px;
    border-radius: 50%;
}
.glass-cover {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    pointer-events: none;
    transform: translateZ(30px);
}
.clock-container::after {
    content: '1•N';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 24px;
    letter-spacing: 3px;
    color: #000;
    text-shadow: 0 0 7px #00ff88;
}
.brand-name {
    position: absolute;
    top: 63%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: var(--sense-green);
    font-size: 9px;
    letter-spacing: 7px;
    opacity: 0.6;
    text-transform: uppercase;
}

@keyframes pulse {
    0%,100% { transform: translate(-50%, -50%) scale(1); opacity: 0.9; }
    50% { transform: translate(-50%, -50%) scale(1.7); opacity: 0.4; }
}
.number {
    position: absolute;
    width: 100%;
    height: 100%;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    padding: 20px;
    box-sizing: border-box;
    color: #cccccc;
}
.n1  { transform: rotate(0deg); }    .n1 div  { transform: rotate(0deg); }
.n2  { transform: rotate(30deg); }   .n2 div  { transform: rotate(-30deg); }
.n3  { transform: rotate(60deg); }   .n3 div  { transform: rotate(-60deg); }
.n4  { transform: rotate(90deg); }   .n4 div  { transform: rotate(-90deg); }
.n5  { transform: rotate(120deg); }  .n5 div  { transform: rotate(-120deg); }
.n6  { transform: rotate(150deg); }  .n6 div  { transform: rotate(-150deg); }
.n7  { transform: rotate(180deg); }  .n7 div  { transform: rotate(-180deg); }
.n8  { transform: rotate(210deg); }  .n8 div  { transform: rotate(-210deg); }
.n9  { transform: rotate(240deg); }  .n9 div  { transform: rotate(-240deg); }
.n10 { transform: rotate(270deg); }  .n10 div { transform: rotate(-270deg); }
.n11 { transform: rotate(300deg); }  .n11 div { transform: rotate(-300deg); }
.n12 { transform: rotate(330deg); }  .n12 div { transform: rotate(-330deg); }
.hand {
    position: absolute;
    bottom: 50%;
    left: 50%;
    transform-origin: bottom;
    border-radius: 10px;
    transform: translateZ(20px);
}
.n1 {
    position: absolute;
    bottom: 100%; 
    left: 50%;
    transform: translateX(-50%) rotate(0deg); 
    font-size: 22px;
    color: #f1f5f9;
    white-space: nowrap;
    transition: opacity 0.3s ease;
}
.hour {
    width: 4px;
    height: 60px;
    background: rgba(241,245,249,0.25);
    box-shadow: 0 0 10px rgba(241,245,249,0.3); 
}
.minute {
    width: 3.5px;
    height: 69px;
    background: var(--sense-red);
    box-shadow: 0 0 11px var(--sense-red); 
}
.second {
    width: 2.5px;
    height: 72px;
    background: var(--sense-blue);
    box-shadow: 0 0 12px var(--sense-blue);
}

@media (max-width:600px){

<script>
const hour = document.getElementById('hour');
const minute = document.getElementById('minute'); 
const second = document.getElementById('second');
const n1 = hour.querySelector('.n1'); 
function updateClock() {
    const now = new Date();
    const ms = now.getMilliseconds();
    const s = now.getSeconds() + ms / 1000;
    const m = now.getMinutes() + s / 60;
    const h = (now.getHours() % 12) + m / 60;
    hour.style.transform = `translateX(-50%) rotate(${-h*30 + 30}deg)`;
    if (n1) {
        n1.style.transform = `translateX(-50%) rotate(${h*30 - 30}deg)`;
        n1.innerText = "∞";
        n1.style.fontWeight = '600';
        n1.style.letterSpacing = '2px';
        n1.style.fontSize = '18px';
        n1.style.color = '#f1f5f9'; 
    }
    second.style.transform = `translateX(-50%) rotate(${-s*6 + 0}deg)`;
    minute.style.transform = `translateX(-50%) rotate(${-m*6 + 0}deg)`;
    requestAnimationFrame(updateClock);
}
updateClock();
</script>

window.boot = () => {
    const nick = document.getElementById("nick-input").value.trim().toUpperCase();
    const city = document.getElementById("city-select").value;

    if(!/^[A-Z0-9]+$/.test(nick)) return alert("INVALID ID (Use A-Z, 0-9)");
    if(!city) return alert("SELECT CITY");
    
    localStorage.setItem("a0z_nick_v6", nick);
    
    navigator.geolocation.getCurrentPosition((p) => {
        startRadar(city, nick);
    }, () => alert("GPS REQUIRED FOR AUTHENTICATION"), { enableHighAccuracy: true });
};

function startRadar(zID, myNick) {
    const clock = document.getElementById("main-clock");
    const title = document.querySelector("h2");
    if(clock) clock.classList.add("hidden");
    if(title) title.classList.add("hidden");
    document.getElementById("login-ui").style.display = "none";
    document.getElementById("chat-ui").style.display = "flex";
    const msgRef = ref(db, `v6/${zID}/msgs`);
    const onlineRef = ref(db, `v6/${zID}/online/${myNick}`);
    const onlineList = ref(db, `v6/${zID}/online`);

    set(onlineRef, serverTimestamp());
    onDisconnect(onlineRef).remove();
    onValue(onlineList, (s) => {
        document.getElementById("online-count").textContent = `👥 ${s.val() ? Object.keys(s.val()).length : 0} ONLINE`;
    });

    const today = new Date().toISOString().slice(0, 10).replace(/-/g, '');
    const usageRef = ref(db, `v6_usage/${myNick}/${today}`);
    onValue(usageRef, (s) => {
        document.getElementById("char-limit").textContent = `${33 - (s.val() || 0)} LEFT`;
    });

    window.send = () => {
        const inp = document.getElementById("msg-input");
        const txt = inp.value.trim();
        if(!txt) return;

        get(usageRef).then((s) => {
            let used = s.val() || 0;
            if(used + txt.length > 33) return alert("LIMIT REACHED FOR TODAY");
            push(msgRef, { n: myNick, m: txt, t: serverTimestamp() });
            set(usageRef, used + txt.length);
            inp.value = "";
        });
    };

    onChildAdded(msgRef, (s) => {
        const d = s.val();
        const div = document.createElement("div");
        div.className = "msg-line";
        div.innerHTML = `<span class="timestamp">[${new Date(d.t).toLocaleTimeString()}]</span><br><b>${d.n}✅</b>: ${d.m}`;
        document.getElementById("chat-box").appendChild(div);
        document.getElementById("chat-box").scrollTop = document.getElementById("chat-box").scrollHeight;
    });
}
