<style>
html, body {
    margin: 0;
    padding: 0;
    background: transparent !important;
    color: white;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    width: 100%;
    overflow-x: hidden;
}

#vanta-bg, #particles-stars {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    z-index: -1;
    pointer-events: none;
}

header, main, section {
    background: transparent !important;
    position: relative;
    z-index: 1;
    width: 100%;
    box-sizing: border-box;
}

.logo-row {
    display: flex;
    align-items: center;
    gap: 12px;
}

.logo {
    width: 64px;
    height: 64px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(90deg,#002b20,#004d2f);
    box-shadow: 0 8px 30px rgba(0,0,0,0.6);
}

.logo h1 {
    margin: 0;
    font-size: 14px;
}
#viewersCount {
  position:fixed; top:15px; left:50%;
  transform:translateX(-50%);
  font-size:14px; font-weight:bold;
  color:#ff3333; z-index:10000;
  user-select:none;
  background: rgba(0,0,0,0.5);
  padding:6px 12px; border-radius:12px;
  box-shadow:0 0 8px #ff0000;
  cursor:pointer;
}
.fade-in-fog {
  opacity: 0;
  filter: blur(10px); 
  transform: translateY(20px); 
  transition: opacity 3s ease, filter 6s ease, transform 9s ease;
}

.fade-in-fog.visible {
  opacity: 1;
  filter: blur(0);
  transform: translateY(0);
}
/* VIEWERS LIST */
#viewersListPopup {
  position: fixed;
  top: 70px; 
  left: 50%;
  transform: translateX(-50%);
  max-height: 200px;
  width: 200px;
  overflow-y: auto;
  background: rgba(0, 0, 0, 0.9);
  color: #00ff00; 
  border: 1px solid #00ff00;
  border-radius: 8px;
  padding: 10px;
  font-size: 7px;
  display: none; 
  z-index: 10001;
  box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
}

.header-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 0 20px;
    box-sizing: border-box;
}
#modeToggle {
    cursor: pointer;
    font-size: 24px;
    transition: transform 0.3s ease;
    filter: drop-shadow(0 0 5px rgba(0, 255, 0, 0.8));
    animation: butterflyGlow 2s infinite alternate;
}

@keyframes butterflyGlow {
    0% {
        filter: drop-shadow(0 0 2px rgba(0, 255, 0, 0.5));
        transform: scale(1);
    }
    100% {
        filter: drop-shadow(0 0 15px rgba(0, 255, 0, 1)) brightness(1.2);
        transform: scale(1.1);
    }
}

.hamburger {
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    background: inherit;
    font-size: 28px;
    user-select: none;
    z-index: 1001;
    transition: transform 0.2s;
}

.hamburger:active {
    transform: scale(0.9);
}

nav {
    position: absolute;
    top: 60px;
    right: 20px;
    background-color: rgba(255, 255, 255, 0.95);
    border-radius: 8px;
    display: none;
    flex-direction: column;
    min-width: 160px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    z-index: 1002;
}

nav.active {
    display: flex;
}

nav a {
    padding: 12px 20px;
    text-decoration: none;
    color: #111;
    font-weight: bold;
    border-bottom: 1px solid #eee;
}

nav a:last-child {
    border-bottom: none;
}



footer {
  width: 100%;
  padding: 80px 20px;
  text-align: left;
  position: relative;
  overflow: hidden;
}

.footer-links {
  display: flex;
  flex-direction: column;
  gap: 5px;
  color: #1E90FF;
  text-align: left;
}

.footer-links a {
  color: #1E90FF;
  text-decoration: none;
  font-size: 14px;
  transition: 0.3s;
}

.footer-links a:hover {
  color: #00BFFF;
}

#threeContainer {
  position: absolute;
  bottom: 10px;
  right: 10px; 
  width: 100px;
  height: 100px;
  transform: translateX(-20px);
}
@keyframes moveLink {
  0% { transform: translateX(0); }
  50% { transform: translateX(10px); }
  100% { transform: translateX(0); }
}
@keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

@keyframes shake {
  0% { transform: translate(0px, 0px); }
  25% { transform: translate(2px, -2px); }
  50% { transform: translate(-2px, 2px); }
  75% { transform: translate(2px, 2px); }
  100% { transform: translate(0px, 0px); }
}
body {
  animation: none; 
}
</style>

<script type="module">

  authDomain: "testing-9b30c.firebaseapp.com",
  databaseURL: "https://testing-9b30c-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "testing-9b30c",
  storageBucket: "testing-9b30c.appspot.com",
  messagingSenderId: "569390736740",
  appId: "1:569390736740:web:4f017178b0b3df5ef28671"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const viewersRef = ref(db,"viewers");
const viewersCountDiv = document.getElementById("viewersCount");
const viewersPopup = document.getElementById("viewersListPopup");
let userName = "";
let visitorId = Math.random().toString(36).substring(2,9);
let visitorRef = ref(db,"viewers/"+visitorId);
let torchTrack = null;
let interval;
const totalDuration = 180;

// ====== Viewers Handling ======
set(visitorRef,{ name:"Guest" });
onDisconnect(visitorRef).remove();

onValue(viewersRef, snap=>{
  let v = snap.val();
  let count = v ? Object.keys(v).length : 0;
  viewersCountDiv.textContent = ` ${count}`;
});

viewersCountDiv.onclick = ()=>{
  if(viewersPopup.style.display==="block"){ viewersPopup.style.display="none"; return; }
  onValue(viewersRef, snap=>{
    let v = snap.val();
    viewersPopup.innerHTML = "<strong>Viewers:</strong><br>" +

    viewersPopup.style.display="block";
  },{onlyOnce:true});
};
window.addEventListener('load', () => {
  document.getElementById('viewersCount').classList.add('visible');
});

</script>
<script>
const hamburger = document.getElementById('hamburger');
const menu = document.getElementById('menu');
const footer = document.getElementById('footer');
const navLinks = menu.querySelectorAll('a');
const modeToggle = document.getElementById('modeToggle');
let isDark = false;
modeToggle.addEventListener('click', () => {
  if (!isDark) {
    document.body.style.filter = "invert(1)";
    isDark = true;
  } else {
    document.body.style.filter = "none";
    isDark = false;
  }
});
hamburger.addEventListener('click', () => {
  menu.classList.toggle('active');
  if(menu.classList.contains('active')) {
    footer.style.backgroundColor = '#ffffff';  
    footer.style.color = '#000000';
  } else {
    footer.style.backgroundColor = 'rgba(128, 0, 128, 0.5)';  
    footer.style.color = '#ffffff';
  }
  footer.scrollIntoView({ behavior: 'smooth' });
});

navLinks.forEach(link => {
  link.addEventListener('click', (e) => {
    e.preventDefault();
    const targetId = link.getAttribute('href').substring(1);
    const targetSection = document.getElementById(targetId);
    if (targetSection) {
      targetSection.scrollIntoView({ behavior: 'smooth' });
    }
    menu.classList.remove('active');
  });
});
</script>
<script>
(function() {
  const container = document.getElementById('threeContainer');
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, container.clientWidth/container.clientHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  container.appendChild(renderer.domElement);

const geometry = new THREE.TorusKnotGeometry(5, 1.2, 150, 20);
  const material = new THREE.MeshStandardMaterial({ color: 0x00ffff, metalness: 0.8, roughness: 0.2 });
  const torusKnot = new THREE.Mesh(geometry, material);
  scene.add(torusKnot);

  const light = new THREE.PointLight(0xffffff, 2, 100);
  light.position.set(10,10,10);
  scene.add(light);

  camera.position.z = 20; 

  function animate() {
    requestAnimationFrame(animate);
    torusKnot.rotation.x += 0.01;
    torusKnot.rotation.y += 0.005;
    renderer.render(scene, camera);
  }
  animate();
  window.addEventListener('resize', () => {
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
  });
})();
</script>
<script>

});
