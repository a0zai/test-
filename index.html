<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A0Z - FINAL RADAR</title>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #000000; }
        body, html { margin:0; padding:0; width:100%; height:100%; background: var(--bg); font-family:'Courier New', monospace; overflow:hidden; color: var(--neon); }
        
        /* طبقة الشاشة القديمة */
        body::before {
            content: " "; display: block; position: absolute; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 100; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        #particles-js { position:fixed; inset:0; z-index:1; background: #000; }
        .container { position:relative; z-index:10; display:flex; justify-content:center; align-items:center; height:100vh; }
        
        .box { 
            width:400px; max-width:95%; height: 85vh; padding:15px; 
            border: 2px solid var(--neon); background: rgba(0, 5, 0, 0.9);
            display:flex; flex-direction:column; box-sizing: border-box;
        }

        #chat-box { 
            flex:1; overflow-y:auto; border: 1px solid #004411; padding:10px; 
            background: #000; margin: 10px 0; font-size:13px; scroll-behavior: smooth;
        }

        .header-bar { display:flex; justify-content:space-between; font-size:11px; border-bottom:1px solid var(--neon); padding-bottom:5px; }
        #online-count { color: #fff; font-weight: bold; }
        #char-limit { color: #ff3333; font-size: 10px; text-align: right; }

        input { width:100%; padding:10px; background:transparent; border:1px solid var(--neon); color:var(--neon); font-family:inherit; box-sizing: border-box; }
        button { padding:10px 20px; background:var(--neon); color:#000; border:none; font-weight:bold; cursor:pointer; }
        
        .msg-line { margin-bottom: 8px; border-left: 2px solid var(--neon); padding-left: 5px; }
        .timestamp { font-size: 9px; opacity: 0.5; }
    </style>
</head>
<body>

<div id="particles-js"></div>

<div class="container">
    <div id="login-ui" class="box" style="height:auto;">
        <h2 style="text-align:center; letter-spacing:3px;">SYSTEM BOOT</h2>
        <input id="nick-input" placeholder="NICKNAME..." maxlength="12">
        <button onclick="boot()">INITIALIZE</button>
    </div>

    <div id="chat-ui" class="box" style="display:none;">
        <div class="header-bar">
            <span id="zone-display">Z: SCANNING</span>
            <span id="online-count">👥 0 ONLINE</span>
        </div>
        <div id="chat-box"></div>
        <div id="char-limit">33 LEFT</div>
        <div style="display:flex; gap:5px;">
            <input id="msg-input" placeholder="TYPE..." maxlength="33" onkeydown="if(event.key==='Enter')send()">
            <button onclick="send()">SND</button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, serverTimestamp, onValue, onDisconnect, set, get } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";

const firebaseConfig = { apiKey: "AIzaSyA7Pu0DJOWmdoDYUUVP1J9aqhxh4f3wyfA", projectId: "a0zai-56c3a", databaseURL: "https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app" };
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let myNick = localStorage.getItem("a0z_nick_v6");
if(myNick) {
    document.getElementById("nick-input").value = myNick;
    document.getElementById("nick-input").disabled = true;
}

window.boot = () => {
    const nick = document.getElementById("nick-input").value.trim().toUpperCase();
    if(!/^[A-Z0-9]+$/.test(nick)) return alert("INVALID ID");
    
    localStorage.setItem("a0z_nick_v6", nick);
    myNick = nick;

    navigator.geolocation.getCurrentPosition((p) => {
        const zID = `Z-${(Math.round(p.coords.latitude / 0.0033) * 0.0033).toFixed(4)}_${(Math.round(p.coords.longitude / 0.0033) * 0.0033).toFixed(4)}`.replace(/\./g, '');
        startRadar(zID);
    }, () => alert("GPS REQUIRED"), { enableHighAccuracy: true });
};

function startRadar(zID) {
    document.getElementById("login-ui").style.display = "none";
    document.getElementById("chat-ui").style.display = "flex";
    document.getElementById("zone-display").textContent = `Z: ${zID}`;

    const msgRef = ref(db, `v6/${zID}/msgs`);
    const onlineRef = ref(db, `v6/${zID}/online/${myNick}`);
    const onlineList = ref(db, `v6/${zID}/online`);

    // إصلاح عداد المشاهدة
    set(onlineRef, serverTimestamp());
    onDisconnect(onlineRef).remove();
    onValue(onlineList, (s) => {
        document.getElementById("online-count").textContent = `👥 ${s.val() ? Object.keys(s.val()).length : 0} ONLINE`;
    });

    // عداد الـ 33 حرف
    const today = new Date().toISOString().slice(0, 10).replace(/-/g, '');
    const usageRef = ref(db, `v6_usage/${myNick}/${today}`);
    onValue(usageRef, (s) => {
        document.getElementById("char-limit").textContent = `${33 - (s.val() || 0)} LEFT`;
    });

    window.send = () => {
        const inp = document.getElementById("msg-input");
        const txt = inp.value.trim();
        if(!txt) return;

        get(usageRef).then((s) => {
            let used = s.val() || 0;
            if(used + txt.length > 33) return alert("LIMIT REACHED");
            push(msgRef, { n: myNick, m: txt, t: serverTimestamp() });
            set(usageRef, used + txt.length);
            inp.value = "";
        });
    };

    onChildAdded(msgRef, (s) => {
        const d = s.val();
        const div = document.createElement("div");
        div.className = "msg-line";
        div.innerHTML = `<span class="timestamp">[${new Date(d.t).toLocaleTimeString()}]</span><br><b>${d.n}✅</b>: ${d.m}`;
        document.getElementById("chat-box").appendChild(div);
        document.getElementById("chat-box").scrollTop = document.getElementById("chat-box").scrollHeight;
    });
}

particlesJS("particles-js", { "particles": { "number": { "value": 40 }, "color": { "value": "#00ff41" }, "shape": { "type": "edge" }, "opacity": 0.2, "line_linked": { "enable": true, "color": "#00ff41", "opacity": 0.1 } } });
</script>
</body>
</html>
