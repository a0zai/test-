<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>A∞Z AI - 5G Optimized</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <style>
    :root {
      --sense-green: #00ffcc;
      --sense-blue: #4a9bbf;
      --sense-red: #ff5555;
    }
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background-color: #000;
      color: gold;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    #pageOverlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      backdrop-filter: blur(12px);
      background-color: rgba(0, 0, 0, 0.6);
      z-index: 9999;
      opacity: 1;
      transition: opacity 2s ease;
    }
    #pageOverlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    #vanta-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.35;
      filter: saturate(140%) contrast(115%);
      pointer-events: none;
    }
    #particles-js, #particles-stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    #hamburger {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 28px;
      cursor: pointer;
      color: var(--sense-green);
      z-index: 10000;
      user-select: none;
    }
    #sidebar {
      position: fixed;
      top: 0;
      left: -250px; 
      width: 250px;
      height: 100%;
      background-color: rgba(0,0,0,0.9);
      backdrop-filter: blur(8px);
      color: gold;
      padding: 40px 20px;
      box-sizing: border-box;
      transition: left 0.3s ease;
      z-index: 9999;
    }
    #sidebar.open {
      left: 0;
    }
    .sidebar-btn {
      width: 100%;
      background: transparent;
      color: gold;
      border: 1px solid gold;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      transition: 0.3s;
      margin-top: 10px;
    }
    .pulse-dot {
      width: 10px;
      height: 10px;
      background: var(--sense-green); 
      border-radius: 50%;
      display: inline-block;
      margin-right: 10px;
      position: relative;
    }
    .pulse-dot::after {
      content: "";
      position: absolute;
      width: 100%; height: 100%;
      background: inherit;
      border-radius: 50%;
      animation: pulse-ring 1.5s infinite;
    }
    @keyframes pulse-ring {
      0% { transform: scale(0.5); opacity: 1; }
      100% { transform: scale(3); opacity: 0; }
    }
    #closeSidebar {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 24px;
      cursor: pointer;
    }
    .clock-container {
      transform-style: preserve-3d;
      position: relative;
      width: 400px;
      height: 400px;
      border-radius: 50%;
    }
    .clock-container::after {
      content: 'A•Z';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px;
      color: #000;
      text-shadow: 0 0 7px #00ff88;
    }
    .number {
      position: absolute;
      width: 100%; height: 100%;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      padding: 20px;
      box-sizing: border-box;
      color: #cccccc;
    }
    .n2 { transform: rotate(30deg); } .n2 div { transform: rotate(-30deg); }
    .n3 { transform: rotate(60deg); } .n3 div { transform: rotate(-60deg); }
    .n4 { transform: rotate(90deg); } .n4 div { transform: rotate(-90deg); }
    .n5 { transform: rotate(120deg); } .n5 div { transform: rotate(-120deg); }
    .n6 { transform: rotate(150deg); } .n6 div { transform: rotate(-150deg); }
    .n7 { transform: rotate(180deg); } .n7 div { transform: rotate(-180deg); }
    .n8 { transform: rotate(210deg); } .n8 div { transform: rotate(-210deg); }
    .n9 { transform: rotate(240deg); } .n9 div { transform: rotate(-240deg); }
    .n10 { transform: rotate(270deg); } .n10 div { transform: rotate(-270deg); }
    .n11 { transform: rotate(300deg); } .n11 div { transform: rotate(-300deg); }
    .n12 { transform: rotate(330deg); } .n12 div { transform: rotate(-330deg); }
    .hand {
      position: absolute;
      bottom: 50%; left: 50%;
      transform-origin: bottom;
      border-radius: 10px;
    }
    .hour { width: 5px; height: 93px; background: rgba(241,245,249,0.25); }
    .minute { width: 4.5px; height: 114px; background: var(--sense-red); }
    .second { width: 4px; height: 124px; background: var(--sense-blue); }
    #viewersCount {
      position: fixed;
      top: 15px; right: 20px;
      font-size: 24px;
      color: gold;
      z-index: 10000;
      background: rgba(0,0,0,0.5);
      padding: 6px 12px;
      border-radius: 12px;
    }
    #chatWrapper {
      width: 96%;
      max-width: 700px;
      max-height: 66vh;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      border-radius: 12px;
      padding: 20px;
      box-sizing: border-box;
      position: fixed;
      bottom: 20px; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
    }
    #nameInput {
      width: 250px;
      padding: 15px;
      font-size: 16px;
      border-radius: 8px;
      border: 2px solid #1100ff;
      background-color: #111;
      color: #ff0000;
      font-family: 'Courier New', monospace;
    }
    #smallCamera {
      position: fixed;
      top: 20px; left: 50%;
      transform: translateX(-50%);
      width: 160px; height: 120px;
      border-radius: 50% / 60%;
      object-fit: cover;
      z-index: 10000;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      border: 1px solid var(--sense-green);
      border-radius: 8px;
      display: none;
      color: var(--sense-green);
      text-align: left;
    }
    #inputBar {
      display: none;
      gap: 10px;
      margin-top: 10px;
    }
    #inputBar input {
      flex-grow: 1;
      padding: 10px;
      background: #111;
      border: 1px solid var(--sense-green);
      color: gold;
    }
    #inputBar button {
      padding: 10px 20px;
      border: 2px solid gold;
      background: transparent;
      color: gold;
      cursor: pointer;
    }
    #clearButton {
      margin-top: 10px;
      align-self: flex-end;
      border: 2px solid var(--sense-red);
      background: transparent;
      color: var(--sense-red);
      cursor: pointer;
    }
    @media (max-width:600px){
      .clock-container { width:260px; height:260px; }
    }
  </style>
</head>
<body>
  <div id="pageOverlay"></div>
  <div id="vanta-bg"></div>
  <div id="particles-js"></div>
  <div id="particles-stars"></div>

  <div id="byteDashboard" style="position: fixed; top: 80px; left: 20px; border: 1px solid #00ffcc; padding: 15px; border-radius: 10px; background: rgba(0, 255, 204, 0.05); z-index: 10001; backdrop-filter: blur(5px); text-align: left;">
    <div style="font-size: 10px; color: #00ffcc; letter-spacing: 1px;">5G DATA ALLOCATION</div>
    <div id="byteCounter" style="font-size: 24px; color: #fff; font-weight: bold;">99.00 B</div>
    <div id="status5G" style="font-size: 9px; color: #00ffcc; margin-top: 5px;">○ STANDALONE OPTIMIZED</div>
  </div>

  <div id="hamburger">☰</div>
  <div id="sidebar">
    <div id="closeSidebar">&times;</div>
    <h2>👑🚪👑</h2>
    <h3 style="color: gold;">🪞 Mirror Card</h3>
    <img src="https://avatars.githubusercontent.com/u/201962374?s=96&v=4" style="width:100%; border-radius:8px; margin-bottom:10px;">
    <p style="font-size: 12px;">🤫 Session Tracked by IP</p>
    <hr style="border: 0.5px solid #444; margin: 20px 0;">
    <div id="controlCenter">
      <button id="joinRoomBtn" class="sidebar-btn">🔐 Join Room</button>
      <button id="leaveRoomBtn" class="sidebar-btn" style="display:none; color: #ff5555; border-color: #ff5555;">🚪 Exit Room</button>
      <p id="roomStatus" style="font-size: 11px; color: gold; margin-top: 5px;">📍 Status: Global</p>
      <div id="radarBox" style="display:none; margin-top: 20px; border: 1px dashed gold; padding: 10px; border-radius: 8px;">
        <div class="pulse-dot"></div>
        <span id="distanceText" style="color:#00ffcc; font-size: 14px;">Searching...</span>
      </div>
    </div>
  </div>

  <div class="clock-container">
    <div class="brand-name" style="position:absolute; top:63%; left:50%; transform:translate(-50%,-50%); font-size:9px; opacity:0.6;">0</div>
    <div class="number n2"><div>12</div></div><div class="number n3"><div>11</div></div>
    <div class="number n4"><div>10</div></div><div class="number n5"><div>9</div></div>
    <div class="number n6"><div>8</div></div><div class="number n7"><div>Ƶ</div></div>
    <div class="number n8"><div>6</div></div><div class="number n9"><div>5</div></div>
    <div class="number n10"><div>4</div></div><div class="number n11"><div>3</div></div>
    <div class="number n12"><div>2</div></div>
    <div class="hand hour" id="hour"><div class="n1" style="position:absolute; bottom:100%; left:50%; transform:translateX(-50%); font-size:24px;">∞</div></div>
    <div class="hand minute" id="minute"></div>
    <div class="hand second" id="second"></div>
  </div>

  <div id="viewersCount">👁️‍🗨️ 0</div>
  <div id="viewersListPopup" style="position: fixed; top: 60px; right: 20px; width: 180px; background: rgba(0,0,0,0.8); color: gold; border: 1px solid gold; border-radius: 8px; padding: 10px; display: none; z-index: 10001;"></div>

  <div id="chatWrapper">
    <div id="namePrompt">
      <h2>👁️‍🗨️ SYSTEM AUTH 👁️‍🗨️</h2>
      <video id="smallCamera" autoplay muted playsinline></video>
      <input id="nameInput" placeholder="Enter Identity..." autocomplete="off" />
      <button id="joinBtn" style="padding:10px 20px; border:2px solid gold; background:transparent; color:gold; margin-top:10px; cursor:pointer;">Verify</button>
    </div>
    <div id="messages"></div>
    <div id="inputBar">
      <input id="input" placeholder="Secure Transmission..." autocomplete="off" />
      <button id="sendButton">SEND</button>
    </div>
    <button id="clearButton" style="display:none; padding:5px; font-size:10px;">🗑️ CLEAR</button>
  </div>

  <script>
    const hour = document.getElementById('hour');
    const minute = document.getElementById('minute'); 
    const second = document.getElementById('second');
    const n1 = hour.querySelector('.n1'); 
    function updateClock() {
      const now = new Date();
      const ms = now.getMilliseconds();
      const s = now.getSeconds() + ms / 1000;
      const m = now.getMinutes() + s / 60;
      const h = (now.getHours() % 12) + m / 60;
      hour.style.transform = `translateX(-50%) rotate(${-h*30 + 30}deg)`;
      n1.style.transform = `translateX(-50%) rotate(${h*30 - 30}deg)`;
      second.style.transform = `translateX(-50%) rotate(${-s*6}deg)`;
      minute.style.transform = `translateX(-50%) rotate(${-m*6}deg)`;
      requestAnimationFrame(updateClock);
    }
    updateClock();
  </script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, onValue, set, update, onDisconnect, serverTimestamp, get, remove } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA7Pu0DJOWmdoDYUUVP1J9aqhxh4f3wyfA",
        authDomain: "a0zai-56c3a.firebaseapp.com",
        databaseURL: "https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "a0zai-56c3a",
        storageBucket: "a0zai-56c3a.firebasestorage.app",
        messagingSenderId: "198838438266",
        appId: "1:198838438266:web:379e782653f014a32a2ec3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let userName = "";
    let sessionId = "";
    let bytesRemaining = 99.00;
    let currentChatRef = ref(db, "chat");

    async function initDevice() {
        try {
            const res = await fetch("https://api.ipify.org?format=json");
            const data = await res.json();
            sessionId = btoa(data.ip + navigator.userAgent).slice(0, 16);
            
            const deviceRef = ref(db, "devices/" + sessionId);
            const snapshot = await get(deviceRef);
            
            if (snapshot.exists()) {
                const userData = snapshot.val();
                userName = userData.name;
                bytesRemaining = userData.bytesRemaining !== undefined ? userData.bytesRemaining : 99.00;
                updateUI();
                startSystem();
            }
        } catch (e) { console.error("Identity Error:", e); }
    }

    function startSystem() {
        document.getElementById("namePrompt").style.display = "none";
        document.getElementById("messages").style.display = "block";
        document.getElementById("inputBar").style.display = "flex";
        document.getElementById("clearButton").style.display = "block";
        startCamera();
        
        const vId = Math.random().toString(36).substring(7);
        const vRef = ref(db, "viewers/" + vId);
        set(vRef, {name: userName});
        onDisconnect(vRef).remove();
        
        listenToMessages(currentChatRef);
        updateUI();
    }

    function updateUI() {
        document.getElementById('byteCounter').innerText = `${bytesRemaining.toFixed(2)} B`;
        if (bytesRemaining <= 0) {
            document.getElementById("sendButton").disabled = true;
            document.getElementById("input").disabled = true;
            document.getElementById("input").placeholder = "LIMIT REACHED. 5G UPGRADE REQ.";
            document.getElementById('status5G').innerText = "● API UPGRADE NEEDED";
            document.getElementById('status5G').style.color = "#ff5555";
        }
    }

    async function updateByteBudget(text) {
        const size = new Blob([text]).size;
        bytesRemaining -= size;
        if (bytesRemaining < 0) bytesRemaining = 0;
      
        const deviceRef = ref(db, "devices/" + sessionId);
        await update(deviceRef, { bytesRemaining: bytesRemaining });
        
        updateUI();
    }

    document.getElementById("joinBtn").onclick = () => {
        const name = document.getElementById("nameInput").value.trim();
        if (!name || !sessionId) return;
        userName = name;
        set(ref(db, "devices/" + sessionId), { 
            name: name, 
            bytesRemaining: 99.00,
            joinedAt: serverTimestamp() 
        });
        startSystem();
    };

    document.getElementById("sendButton").onclick = () => {
        const text = document.getElementById("input").value.trim();
        if (text && userName && bytesRemaining > 0) {
            updateByteBudget(text);
            push(currentChatRef, { text, user: userName, timestamp: serverTimestamp() });
            document.getElementById("input").value = "";
        }
    };

    function listenToMessages(targetRef) {
        const msgDiv = document.getElementById("messages");
        msgDiv.innerHTML = "";
        onChildAdded(targetRef, (snap) => {
            const m = snap.val();
            const d = document.createElement("div");
            d.style.marginBottom = "5px";
            d.innerHTML = `<span style="color:gold;">${m.user}:</span> ${m.text}`;
            msgDiv.appendChild(d);
            msgDiv.scrollTop = msgDiv.scrollHeight;
        });
    }

    async function startCamera() {
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('smallCamera').srcObject = s;
        } catch (e) {}
    }

    onValue(ref(db, "viewers"), (snap) => {
        const count = snap.val() ? Object.keys(snap.val()).length : 0;
        document.getElementById("viewersCount").textContent = `👁️‍🗨️ ${count}`;
    });

    document.getElementById('joinRoomBtn').onclick = () => {
        const code = prompt("Room Code:");
        if (code && code.length >= 4) {
            currentChatRef = ref(db, "rooms/" + code + "/chat");
            document.getElementById('roomStatus').innerText = "📍 Room: " + code;
            document.getElementById('radarBox').style.display = "block";
            listenToMessages(currentChatRef);
        }
    };

    document.getElementById('hamburger').onclick = () => document.getElementById('sidebar').classList.add('open');
    document.getElementById('closeSidebar').onclick = () => document.getElementById('sidebar').classList.remove('open');
    document.getElementById('clearButton').onclick = () => { if(confirm("Clear All?")) remove(ref(db, "chat")); };

    window.onload = () => {
        document.getElementById('pageOverlay').classList.add('fade-out');
        initDevice();
    };
</script>
  <script>
    VANTA.FOG({
      el: "#vanta-bg",
      mouseControls: true, touchControls: true,
      minHeight: 200.0, minWidth: 200.0,
      highlightColor: 0x00ffcc, midtoneColor: 0x000000,
      lowlightColor: 0x111111, baseColor: 0x000000,
      blurFactor: 0.15, speed: 0.5, zoom: 1.0
    });
    particlesJS("particles-js", {
      particles: {
        number: { value: 40 },
        color: { value: "#ff3333" },
        line_linked: { enable: true, distance: 150, color: "#ff3333", opacity: 0.3, width: 1 },
        move: { enable: true, speed: 1 }
      }
    });
  </script>
</body>
</html>
