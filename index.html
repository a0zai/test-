<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>0</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.46/Tone.js"></script>
<style>
html, body {
    margin: 0; padding: 0;
    background: transparent !important;
    color: white; font-family: 'Courier New', monospace;
    min-height: 100vh; width: 100%; overflow-x: hidden;
}
#vanta-bg, #particles-stars {
    position: fixed; inset: 0;
    width: 100vw; height: 100vh;
    z-index: -1; pointer-events: none;
}
header, main, section, footer {
    background: transparent !important;
    position: relative; z-index: 1;
    width: 100%; box-sizing: border-box;
}
.logo-row { display: flex; align-items: center; gap: 12px; }
.logo {
    width: 64px; height: 64px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(90deg,#002b20,#004d2f);
    box-shadow: 0 8px 30px rgba(0,0,0,0.6);
}
#viewersCount {
  position:fixed; top:15px; left:50%;
  transform:translateX(-50%);
  font-size:24px; font-weight:bold;
  color:#ff3333; z-index:10000;
  user-select:none; background: rgba(0,0,0,0.5);
  padding:6px 12px; border-radius:12px;
  box-shadow:0 0 8px #ff0000; cursor:pointer;
}
.fade-in-fog { opacity: 0; filter: blur(10px); transform: translateY(20px); transition: opacity 3s ease, filter 6s ease, transform 9s ease; }
.fade-in-fog.visible { opacity: 1; filter: blur(0); transform: translateY(0); }
#viewersListPopup {
  position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
  max-height: 200px; width: 200px; overflow-y: auto;
  background: rgba(0, 0, 0, 0.9); color: #0f0; 
  border: 1px solid #0f0; border-radius: 8px;
  padding: 10px; font-size: 14px; display: none; z-index: 10001;
}
.header-bottom { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 0 20px; }
.hamburger { cursor: pointer; display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; background: transparent !important; font-size: 28px; z-index: 1001; }
nav { position: absolute; top: 60px; right: 20px; background-color: rgba(255, 255, 255, 0.95); border-radius: 8px; display: none; flex-direction: column; min-width: 160px; z-index: 1002; }
nav.active { display: flex; }
nav a { padding: 12px 20px; text-decoration: none; color: #111; font-weight: bold; border-bottom: 1px solid #eee; }
footer { width: 100%; padding: 80px 20px; text-align: left; }
#threeContainer { position: absolute; bottom: 10px; right: 10px; width: 100px; height: 100px; }
@keyframes moveLink { 0% { transform: translateX(0); } 50% { transform: translateX(10px); } 100% { transform: translateX(0); } }
</style>
</head>
<body>

<div id="vanta-bg"></div>
<div id="particles-stars"></div>

<div id="viewersCount" class="fade-in-fog">👁️‍🗨️ 0</div>
<div id="viewersListPopup"></div>

<header>
  <div class="logo-row" style="padding: 20px;">
    <div class="logo"><h1>A0Z</h1></div>
    <div>
      <div class="title">0</div>
      <div class="subtitle">Origin</div>
    </div>
  </div>

  <div class="header-bottom">
    <div class="left-controls">
      <div class="mode-toggle" id="modeToggle">🦋</div>
    </div>
    <div class="right-controls">
      <div class="hamburger" id="hamburger">⚫️</div>
    </div>
    <nav id="menu">
      <a href="#home">Home</a>
      <a href="#contact">Contact</a>
      <a href="#over-ons">Over Ons</a>
    </nav>
  </div>
</header>

<main>
  <section id="home" style="min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;">
    <h2>Welcome to A0ZAI</h2>
    <p>Future Test!!🔥</p>
    <a href="https://a0z.nl" target="_blank" style="color: #FF0000; font-size: 18px; animation: moveLink 2s linear infinite alternate;">⚪️</a>
  </section>
</main>

<footer id="footer">
  &copy; A0ZAI
  <div class="footer-links"><a href="#home" style="color:#1E90FF; text-decoration:none;">Home</a></div>
  <div id="threeContainer"></div>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import { getDatabase, ref, onValue, set, onDisconnect } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBUb10JpH6iTD1sqSN7xz_lYDZUNSVennQ",
  authDomain: "testing-9b30c.firebaseapp.com",
  databaseURL: "https://testing-9b30c-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "testing-9b30c",
  storageBucket: "testing-9b30c.appspot.com",
  messagingSenderId: "569390736740",
  appId: "1:569390736740:web:4f017178b0b3df5ef28671"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const viewersCountDiv = document.getElementById("viewersCount");
const viewersPopup = document.getElementById("viewersListPopup");

let visitorId = Math.random().toString(36).substring(2,9);
let visitorRef = ref(db, "viewers/" + visitorId);

set(visitorRef, { name: "Guest", timestamp: Date.now() });
onDisconnect(visitorRef).remove();

onValue(ref(db, "viewers"), snap => {
  let v = snap.val();
  let count = v ? Object.keys(v).length : 0;
  viewersCountDiv.textContent = `👁️‍🗨️ ${count}`;
});

viewersCountDiv.onclick = () => {
  if(viewersPopup.style.display === "block") { viewersPopup.style.display = "none"; }
  else {
    onValue(ref(db, "viewers"), snap => {
      let v = snap.val();
      viewersPopup.innerHTML = "<strong>Viewers:</strong><br>" + (v ? Object.values(v).map(x=>x.name).join("<br>") : "None");
      viewersPopup.style.display = "block";
    }, {onlyOnce: true});
  }
};

window.addEventListener('load', () => { viewersCountDiv.classList.add('visible'); });
</script>

<script>
// Hamburger & Menu
const hamburger = document.getElementById('hamburger');
const menu = document.getElementById('menu');
hamburger.addEventListener('click', () => { menu.classList.toggle('active'); });

(function() {
  const container = document.getElementById('threeContainer');
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, container.clientWidth/container.clientHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  container.appendChild(renderer.domElement);
  const geometry = new THREE.TorusKnotGeometry(5, 1.2, 150, 20);
  const material = new THREE.MeshStandardMaterial({ color: 0x00ffff, metalness: 0.8, roughness: 0.2 });
  const torusKnot = new THREE.Mesh(geometry, material);
  scene.add(torusKnot);
  const light = new THREE.PointLight(0xffffff, 2, 100);
  light.position.set(10,10,10); scene.add(light);
  camera.position.z = 20;
  function animate() {
    requestAnimationFrame(animate);
    torusKnot.rotation.x += 0.01; torusKnot.rotation.y += 0.005;
    renderer.render(scene, camera);
  }
  animate();
})();

VANTA.FOG({
    el: "#vanta-bg",
    mouseControls: true, touchControls: true,
    highlightColor: 0x00ff00, midtoneColor: 0x00ff00, lowlightColor: 0x00ff00,
    baseColor: 0x000000, blurFactor: 0.09, speed: 0.3, zoom: 0.9
});
particlesJS("particles-stars", {
    particles: {
        number: { value: 78 },
        color: { value: "#ffffff" },
        opacity: { value: 0.6, random: true },
        size: { value: 1.5, random: true },
        move: { enable: true, speed: 0.2 },
        line_linked: { enable: false }
    }
});
</script>
</body>
</html>
