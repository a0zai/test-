<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>0 | Origin</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.46/Tone.js"></script>
    <style>
        :root {
            --sense-green: #00ff00;
            --sense-red: #ff3333;
            --sense-blue: #00d4ff;
        }

        html, body {
            margin: 0;
            padding: 0;
            background: #000 !important;
            color: white;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            width: 100%;
            overflow-x: hidden;
        }

        #vanta-bg, #particles-stars {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        header, main, section {
            background: transparent !important;
            position: relative;
            z-index: 1;
            width: 100%;
            box-sizing: border-box;
        }

        .logo-row { display: flex; align-items: center; gap: 12px; padding: 20px; }
        .logo {
            width: 64px; height: 64px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(90deg,#002b20,#004d2f);
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
        }
        .logo h1 { margin: 0; font-size: 14px; }

        #viewersCount {
            position:fixed; top:15px; left:50%; transform:translateX(-50%);
            font-size:14px; font-weight:bold; color:#ff3333; z-index:10000;
            user-select:none; background: rgba(0,0,0,0.5); padding:6px 12px; 
            border-radius:12px; box-shadow:0 0 8px #ff0000; cursor:pointer;
        }

        #viewersListPopup {
            position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
            max-height: 200px; width: 200px; overflow-y: auto;
            background: rgba(0, 0, 0, 0.9); color: #00ff00; 
            border: 1px solid #00ff00; border-radius: 8px; padding: 10px;
            font-size: 10px; display: none; z-index: 10001;
        }

        .header-bottom { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        
        #modeToggle {
            cursor: pointer; font-size: 24px; animation: butterflyGlow 2s infinite alternate;
        }

        @keyframes butterflyGlow {
            0% { filter: drop-shadow(0 0 2px rgba(0, 255, 0, 0.5)); transform: scale(1); }
            100% { filter: drop-shadow(0 0 15px rgba(0, 255, 0, 1)); transform: scale(1.1); }
        }

        .hamburger { cursor: pointer; font-size: 28px; z-index: 1001; }
        nav {
            position: absolute; top: 60px; right: 20px; background: rgba(255, 255, 255, 0.95);
            border-radius: 8px; display: none; flex-direction: column; min-width: 160px; z-index: 1002;
        }
        nav.active { display: flex; }
        nav a { padding: 12px 20px; text-decoration: none; color: #111; font-weight: bold; border-bottom: 1px solid #eee; }

        .clock-container {
            position: relative; width: 120px; height: 120px; border-radius: 50%; border: 1px solid #ff0000;
            transform-style: preserve-3d; transition: transform 0.15s ease-out; cursor: pointer;
        }
        .clock-container::after {
            content: 'A•Z'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 22px; color: #000; text-shadow: 0 0 7px #000;
        }

        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; border-radius: 10px; }
        .hour { width: 3px; height: 24px; background: rgba(241,245,249,0.25); }
        .minute { width: 2px; height: 36px; background: var(--sense-red); }
        .second { width: 1.5px; height: 48px; background: var(--sense-blue); }

        .n1 {
            position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
            font-size: 18px; font-weight: 600; color: #f1f5f9; letter-spacing: 2px;
        }

        #chat-overlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            width: 280px; background: rgba(0, 0, 0, 0.9); border: 1px solid var(--sense-green);
            border-radius: 15px; padding: 15px; z-index: 10005; display: none; flex-direction: column; gap: 10px;
        }
        #chat-overlay.active { display: flex; transform: translate(-50%, -50%) scale(1); }

        #messages-display { height: 180px; overflow-y: auto; font-size: 11px; color: #00ff00; display: flex; flex-direction: column; gap: 8px; padding-right: 5px; }
        .chat-input { background: rgba(0, 50, 0, 0.3); border: 1px solid #004d2f; color: #00ff00; padding: 8px; font-size: 12px; outline: none; }
        .chat-btn { background: var(--sense-green); color: black; border: none; padding: 8px; font-weight: bold; cursor: pointer; }

        .close-chat {
            position: absolute; top: -10px; right: -10px; background: #ff3333; color: white;
            width: 25px; height: 25px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        .tagline { margin-top: 33px; font-size: 11px; letter-spacing: 2px; text-align: center; width: 100%; opacity: 0.85; }
        
        footer { width: 100%; padding: 40px 20px; position: relative; }
        #threeContainer { position: absolute; bottom: 10px; right: 10px; width: 100px; height: 100px; }

        body { opacity: 0; transition: opacity 2s; }
        body.loaded { opacity: 1; }
    </style>
</head>
<body>

<div id="vanta-bg"></div>
<div id="particles-stars"></div>

<header>
    <div id="viewersCount">0</div>
    <div id="viewersListPopup"></div>
    <div class="logo-row">
        <div class="logo"><h1>0</h1></div>
        <div><div style="letter-spacing:4px">0</div><div style="font-size:10px">A0Z</div></div>
    </div>
    <div class="header-bottom">
        <div id="modeToggle">🦋</div>
        <div class="hamburger" id="hamburger">⚫️</div>
        <nav id="menu"><a href="#home">Home</a></nav>
    </div>
</header>

<main>
    <section id="home" style="min-height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center;">
        <div class="clock-container" id="mainClock">
            <div class="n1">∞</div>
            <div class="hand hour" id="hour"></div>
            <div class="hand minute" id="minute"></div>
            <div class="hand second" id="second"></div>
        </div>

        <div id="chat-overlay">
            <div class="close-chat" onclick="toggleChat()">X</div>
            <div style="font-size: 8px; color: #555; text-align: center;">SECURE CHANNEL: A0Z</div>
            <input type="text" id="roomInput" class="chat-input" placeholder="ROOM CODE (Default: 0)">
            <div id="messages-display"></div>
            <div style="display: flex; gap: 5px;">
                <input type="text" id="msgInput" class="chat-input" style="flex: 1;" placeholder="MESSAGE...">
                <button class="chat-btn" onclick="sendA0ZMessage()">SEND</button>
            </div>
        </div>
        <div class="tagline">Zero Time</div>
    </section>
</main>

<footer id="footer">
    &copy; A0Z
    <div id="threeContainer"></div>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, set, onDisconnect, serverTimestamp, query, limitToLast } 
    from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBUb10JpH6iTD1sqSN7xz_lYDZUNSVennQ",
        authDomain: "testing-9b30c.firebaseapp.com",
        databaseURL: "https://testing-9b30c-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "testing-9b30c",
        storageBucket: "testing-9b30c.appspot.com",
        messagingSenderId: "569390736740",
        appId: "1:569390736740:web:4f017178b0b3df5ef28671"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const visitorId = Math.random().toString(36).substring(2, 7);
    
    // إدارة المتواجدين
    const visitorRef = ref(db, `viewers/${visitorId}`);
    set(visitorRef, { name: "User_" + visitorId, online: true });
    onDisconnect(visitorRef).remove();

    onValue(ref(db, "viewers"), (snap) => {
        const count = snap.exists() ? Object.keys(snap.val()).length : 0;
        document.getElementById("viewersCount").textContent = count;
    });

    // إدارة الدردشة
    let currentRoom = "0";
    const msgDisplay = document.getElementById('messages-display');

    window.toggleChat = () => {
        document.getElementById('chat-overlay').classList.toggle('active');
    };

    window.sendA0ZMessage = () => {
        const text = document.getElementById('msgInput').value.trim();
        if (!text) return;
        push(ref(db, "chats"), {
            room: currentRoom,
            user: visitorId,
            text: text,
            time: serverTimestamp()
        });
        document.getElementById('msgInput').value = "";
    };

    // مراقبة تغيير الغرفة وجلب الرسائل
    const loadChat = (room) => {
        msgDisplay.innerHTML = "";
        onValue(query(ref(db, "chats")), (snap) => {
            msgDisplay.innerHTML = "";
            snap.forEach((child) => {
                const data = child.val();
                if (data.room === room) {
                    const div = document.createElement('div');
                    div.innerHTML = `<span style="color:#555">[${data.user}]:</span> ${data.text}`;
                    msgDisplay.appendChild(div);
                }
            });
            msgDisplay.scrollTop = msgDisplay.scrollHeight;
        });
    };

    document.getElementById('roomInput').addEventListener('change', (e) => {
        currentRoom = e.target.value.trim() || "0";
        loadChat(currentRoom);
    });

    document.getElementById('msgInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') window.sendA0ZMessage();
    });

    document.getElementById('mainClock').onclick = window.toggleChat;
    loadChat("0");
</script>

<script>
    // الرسوميات والمؤثرات (Three, Vanta, Clock)
    window.onload = () => {
        document.body.classList.add('loaded');
        
        VANTA.FOG({
            el: "#vanta-bg",
            mouseControls: true, touchControls: true,
            highlightColor: 0x00ff00, midtoneColor: 0x0,
            lowlightColor: 0x0, baseColor: 0x0, speed: 1.5
        });

        particlesJS("particles-stars", {
            particles: {
                number: { value: 80 },
                color: { value: "#ffffff" },
                size: { value: 1.5 },
                move: { enable: true, speed: 0.5 }
            }
        });

        const hHand = document.getElementById('hour');
        const mHand = document.getElementById('minute');
        const sHand = document.getElementById('second');

        function updateClock() {
            const now = new Date();
            const s = now.getSeconds() + now.getMilliseconds()/1000;
            const m = now.getMinutes();
            const h = now.getHours() % 12;

            sHand.style.transform = `translateX(-50%) rotate(${s * 6}deg)`;
            mHand.style.transform = `translateX(-50%) rotate(${m * 6}deg)`;
            hHand.style.transform = `translateX(-50%) rotate(${(h * 30) + (m / 2)}deg)`;
            requestAnimationFrame(updateClock);
        }
        updateClock();

        // القائمة والوضع المظلم
        const modeBtn = document.getElementById('modeToggle');
        modeBtn.onclick = () => {
            document.body.style.filter = document.body.style.filter === 'invert(1)' ? 'none' : 'invert(1)';
        };

        const ham = document.getElementById('hamburger');
        ham.onclick = () => document.getElementById('menu').classList.toggle('active');

        // Three.js Torus
        const container = document.getElementById('threeContainer');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true });
        renderer.setSize(100, 100);
        container.appendChild(renderer.domElement);
        
        const geo = new THREE.TorusKnotGeometry(5, 1.5, 100, 16);
        const mat = new THREE.MeshStandardMaterial({ color: 0x00ff00 });
        const obj = new THREE.Mesh(geo, mat);
        scene.add(obj);
        
        const light = new THREE.PointLight(0xffffff, 1);
        light.position.set(10, 10, 10);
        scene.add(light);
        camera.position.z = 15;

        function animateThree() {
            requestAnimationFrame(animateThree);
            obj.rotation.x += 0.01; obj.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animateThree();
    };
</script>

</body>
</html>
