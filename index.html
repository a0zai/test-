<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NL.LIVE - nl</title>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <style>
        :root {
            --neon: #00ff41;
            --bg: #000000;
            --sense-blue: #4a9bbf;
            --sense-red: #9b5050;
            --sense-green: #00ff88;
        }

        body, html { 
            margin:0; padding:0; width:100%; height:100%; 
            background: var(--bg); font-family:'Courier New', monospace; 
            overflow:hidden; color: var(--neon); 
        }

        /* Scanline effect */
        body::before { 
            content: " "; display: block; position: absolute; inset: 0; 
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); 
            z-index: 100; background-size: 100% 2px, 3px 100%; pointer-events: none; 
        }

        #particles-js { position:fixed; inset:0; z-index:1; background: #000; }

        .container { 
            position:relative; z-index:10; 
            display:flex; flex-direction: column; 
            align-items: center; height: 100vh; 
            overflow-y: auto; padding: 10px 0;
        }

        /* Scene for 3D Clock ONLY */
        .scene {
            width: 100%;
            height: 260px; /* تحديد طول ثابت للساعة عشان ما تاخد الشاشة كلها */
            display: flex; justify-content: center; align-items: center;
            perspective: 1000px;
            flex-shrink: 0;
        }

        .clock-container {
            transform-style: preserve-3d;
            position: relative;
            width: 200px; height: 200px;
            border-radius: 50%;
            border: 1px solid rgba(0, 255, 65, 0.2);
        }

        .clock-container::after {
            content: '1•N'; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); font-size: 20px;
            color: #000; text-shadow: 0 0 7px var(--sense-green); z-index: 5;
        }

        .number {
            position: absolute; width: 100%; height: 100%;
            text-align: center; font-size: 18px; font-weight: bold;
            padding: 15px; box-sizing: border-box; color: #cccccc;
        }

        /* Numbers Rotation Logic */
        .n2  { transform: rotate(30deg); }   .n2 div  { transform: rotate(-30deg); }
        .n3  { transform: rotate(60deg); }   .n3 div  { transform: rotate(-60deg); }
        .n4  { transform: rotate(90deg); }   .n4 div  { transform: rotate(-90deg); }
        .n5  { transform: rotate(120deg); }  .n5 div  { transform: rotate(-120deg); }
        .n6  { transform: rotate(150deg); }  .n6 div  { transform: rotate(-150deg); }
        .n7  { transform: rotate(180deg); }  .n7 div  { transform: rotate(-180deg); }
        .n8  { transform: rotate(210deg); }  .n8 div  { transform: rotate(-210deg); }
        .n9  { transform: rotate(240deg); }  .n9 div  { transform: rotate(-240deg); }
        .n10 { transform: rotate(270deg); }  .n10 div { transform: rotate(-270deg); }
        .n11 { transform: rotate(300deg); }  .n11 div { transform: rotate(-300deg); }
        .n12 { transform: rotate(330deg); }  .n12 div { transform: rotate(-330deg); }

        .hand {
            position: absolute; bottom: 50%; left: 50%;
            transform-origin: bottom; border-radius: 10px;
        }
        .hour { width: 4px; height: 50px; background: rgba(241,245,249,0.3); }
        .minute { width: 3px; height: 65px; background: var(--sense-red); }
        .second { width: 2px; height: 70px; background: var(--sense-blue); }

        .n1 {
            position: absolute; bottom: 100%; left: 50%;
            transform: translateX(-50%); font-size: 22px; color: #f1f5f9;
        }

        /* UI Box Styling */
        .box {
            width: 90%; max-width: 350px;
            background: rgba(0,0,0,0.8);
            border: 1px solid var(--neon);
            padding: 20px; box-sizing: border-box;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
            z-index: 20;
        }

        input, select { 
            width:100%; padding:12px; background:black; 
            border:1px solid var(--neon); color:var(--neon); 
            font-family:inherit; margin-bottom: 15px; outline: none; 
            box-sizing: border-box;
        }

        button { 
            padding:12px; background:var(--neon); color:#000; 
            border:none; font-weight:bold; cursor:pointer; width: 100%; 
        }

        #chat-box { height: 50vh; overflow-y:auto; border: 1px solid #004411; padding:10px; margin-bottom: 10px; }
        .msg-line { margin-bottom: 8px; border-left: 2px solid var(--neon); padding-left: 5px; font-size: 12px; }
        .timestamp { font-size: 9px; opacity: 0.5; }
    </style>
</head>
<body>

<div id="particles-js"></div>

<div class="container">
    <h2>🇳🇱NL.LIVE✨</h2>
    
    <div class="scene">
        <div class="clock-container">
            <div class="number n2"><div>12</div></div>
            <div class="number n3"><div>11</div></div>
            <div class="number n4"><div>10</div></div>
            <div class="number n5"><div>9</div></div>
            <div class="number n6"><div>8</div></div>
            <div class="number n7"><div>Ƶ</div></div>
            <div class="number n8"><div>6</div></div>
            <div class="number n9"><div>5</div></div>
            <div class="number n10"><div>4</div></div>
            <div class="number n11"><div>3</div></div>
            <div class="number n12"><div>2</div></div>
            <div class="hand hour" id="hour"><div class="n1">∞</div></div>
            <div class="hand minute" id="minute"></div>
            <div class="hand second" id="second"></div>
        </div>
    </div>

    <div id="login-ui" class="box">
        <input id="nick-input" placeholder="NICKNAME..." maxlength="12">
        <select id="city-select">
            <option value="">-- SELECT CITY --</option>
        </select>
        <button onclick="boot()">INITIALIZE SYSTEM</button>
    </div>

    <div id="chat-ui" class="box" style="display:none;">
        <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:5px;">
            <span id="zone-display">Z: SCANNING</span>
            <span id="online-count">👥 0 ONLINE</span>
        </div>
        <div id="chat-box"></div>
        <div style="display:flex; gap:5px;">
            <input id="msg-input" placeholder="TYPE..." maxlength="33">
            <button onclick="window.send()" style="width:auto;">SND</button>
        </div>
    </div>
</div>

<script>
    // Clock Logic
    const hour = document.getElementById('hour');
    const minute = document.getElementById('minute'); 
    const second = document.getElementById('second');
    
    function updateClock() {
        const now = new Date();
        const s = now.getSeconds() + now.getMilliseconds() / 1000;
        const m = now.getMinutes() + s / 60;
        const h = (now.getHours() % 12) + m / 60;
        
        hour.style.transform = `translateX(-50%) rotate(${-h*30 + 30}deg)`;
        second.style.transform = `translateX(-50%) rotate(${-s*6}deg)`;
        minute.style.transform = `translateX(-50%) rotate(${-m*6}deg)`;
        requestAnimationFrame(updateClock);
    }
    updateClock();

    // 3D Tilt Logic
    const clock = document.querySelector('.clock-container');
    const scene = document.querySelector('.scene');
    scene.addEventListener('mousemove', (e) => {
        const rect = scene.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width - 0.5;
        const y = (e.clientY - rect.top) / rect.height - 0.5;
        clock.style.transform = `rotateY(${x * 20}deg) rotateX(${-y * 20}deg)`;
    });
</script>

<script type="module">
    // Firebase Logic (نفس الكود الخاص بك مع إضافة المدن)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, serverTimestamp, onValue, onDisconnect, set, get } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";
    
    const firebaseConfig = { 
        apiKey: "AIzaSyA7Pu0DJOWmdoDYUUVP1J9aqhxh4f3wyfA", 
        projectId: "a0zai-56c3a", 
        databaseURL: "https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app" 
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // قائمة المدن (اختصار للمثال)
    const cities = ["Amsterdam", "Rotterdam", "Utrecht", "Eindhoven", "Groningen"]; 
    const select = document.getElementById("city-select");
    cities.forEach(c => {
        let opt = document.createElement("option");
        opt.value = c; opt.textContent = c.toUpperCase();
        select.appendChild(opt);
    });

    window.boot = () => {
        const nick = document.getElementById("nick-input").value.trim().toUpperCase();
        const city = document.getElementById("city-select").value;
        if(!nick || !city) return alert("COMPLETE DATA");
        
        document.getElementById("login-ui").style.display = "none";
        document.getElementById("chat-ui").style.display = "block";
        document.getElementById("zone-display").textContent = `Z: ${city}`;
    };
</script>

</body>
</html>
