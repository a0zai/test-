<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NL.LIVE - nl</title>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <style>
        :root {
            --neon: #00ff41;
            --bg: #000000;
            --sense-green: #b2f2bb;
            --sense-blue: #4a9bbf;
            --sense-red: #9b5050;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); font-family: 'Courier New', monospace; 
            color: var(--neon); overflow-x: hidden;
        }

        /* Scanline Effect */
        body::before { 
            content: " "; display: block; position: absolute; inset: 0; 
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); 
            z-index: 100; background-size: 100% 2px, 3px 100%; pointer-events: none; 
        }

        #particles-js { position: fixed; inset: 0; z-index: 1; background: #000; }

        .container { 
            position: relative; z-index: 10; 
            display: flex; flex-direction: column; 
            align-items: center; min-height: 100vh; 
            padding-top: 5vh; box-sizing: border-box;
        }

        h2 { text-align: center; text-shadow: 0 0 10px var(--neon); margin-bottom: 20px; }

        /* Clock Styling */
        .clock-container {
            position: relative; width: 200px; height: 200px; 
            border-radius: 50%; transform-style: preserve-3d;
            margin-bottom: 30px; flex-shrink: 0;
        }
        .clock-container::after {
            content: '1•N'; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); font-size: 24px;
            color: #000; text-shadow: 0 0 7px #00ff88;
        }
        .number { position: absolute; width: 100%; height: 100%; text-align: center; font-size: 20px; font-weight: bold; padding: 15px; box-sizing: border-box; color: #cccccc; }
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; border-radius: 10px; }
        .hour { width: 4px; height: 55px; background: rgba(241,245,249,0.3); }
        .minute { width: 3px; height: 70px; background: var(--sense-red); }
        .second { width: 2px; height: 75px; background: var(--sense-blue); }

        /* Forms and Chat UI */
        .box { width: 90%; max-width: 380px; background: rgba(0, 10, 0, 0.85); border: 1px solid var(--neon); padding: 20px; border-radius: 5px; box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); }
        
        input, select { 
            width: 100%; padding: 12px; background: #000; 
            border: 1px solid var(--neon); color: var(--neon); 
            font-family: inherit; margin-bottom: 15px; outline: none; box-sizing: border-box;
        }

        button { 
            width: 100%; padding: 12px; background: var(--neon); 
            color: #000; border: none; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:active { background: #fff; }

        #chat-box { 
            height: 50vh; max-height: 400px; overflow-y: auto; 
            border: 1px solid rgba(0, 255, 65, 0.3); padding: 10px; 
            background: #000; margin: 10px 0; font-size: 13px;
        }

        .msg-line { margin-bottom: 10px; border-left: 2px solid var(--neon); padding-left: 8px; word-break: break-all; }
        .timestamp { font-size: 9px; opacity: 0.5; color: #fff; }
        .hidden { display: none !important; }

        /* Rotate Clock Numbers */
        .n2 { transform: rotate(30deg); } .n2 div { transform: rotate(-30deg); }
        .n3 { transform: rotate(60deg); } .n3 div { transform: rotate(-60deg); }
        .n4 { transform: rotate(90deg); } .n4 div { transform: rotate(-90deg); }
        .n5 { transform: rotate(120deg); } .n5 div { transform: rotate(-120deg); }
        .n6 { transform: rotate(150deg); } .n6 div { transform: rotate(-150deg); }
        .n7 { transform: rotate(180deg); } .n7 div { transform: rotate(-180deg); }
        .n8 { transform: rotate(210deg); } .n8 div { transform: rotate(-210deg); }
        .n9 { transform: rotate(240deg); } .n9 div { transform: rotate(-240deg); }
        .n10 { transform: rotate(270deg); } .n10 div { transform: rotate(-270deg); }
        .n11 { transform: rotate(300deg); } .n11 div { transform: rotate(-300deg); }
        .n12 { transform: rotate(330deg); } .n12 div { transform: rotate(-330deg); }

        @media (max-width: 400px) {
            .clock-container { width: 160px; height: 160px; }
            #chat-box { height: 40vh; }
        }
    </style>
</head>

<script>
    // Clock Logic
    function updateClock() {
        const now = new Date();
        const s = now.getSeconds() + now.getMilliseconds() / 1000;
        const m = now.getMinutes() + s / 60;
        const h = (now.getHours() % 12) + m / 60;
        document.getElementById('hour').style.transform = `translateX(-50%) rotate(${-h*30 + 30}deg)`;
        document.getElementById('minute').style.transform = `translateX(-50%) rotate(${-m*6}deg)`;
        document.getElementById('second').style.transform = `translateX(-50%) rotate(${-s*6}deg)`;
        requestAnimationFrame(updateClock);
    }
    updateClock();
</script>

const select = document.getElementById("city-select");

    let opt = document.createElement("option");
    opt.value = city.name.replace(/\s+/g, '_');
    opt.textContent = `${city.name.toUpperCase()} (${city.province})`;
    select.appendChild(opt);
});

let savedNick = localStorage.getItem("a0z_nick_v6");
if(savedNick) document.getElementById("nick-input").value = savedNick;

window.boot = () => {
    const nick = document.getElementById("nick-input").value.trim().toUpperCase();
    const city = document.getElementById("city-select").value;
    if(!/^[A-Z0-9]+$/.test(nick) || nick.length < 3) return alert("INVALID ID (Use A-Z, 0-9, min 3 chars)");
    if(!city) return alert("SELECT CITY");
    localStorage.setItem("a0z_nick_v6", nick);
    
    navigator.geolocation.getCurrentPosition((p) => {
        startRadar(city, nick);
    }, () => alert("GPS REQUIRED"), { enableHighAccuracy: true });
};

function startRadar(zID, myNick) {
    // Hide UI
    document.getElementById("main-clock").classList.add("hidden");
    document.getElementById("main-title").classList.add("hidden");
    document.getElementById("login-ui").style.display = "none";
    document.getElementById("chat-ui").style.display = "block";
    document.getElementById("zone-display").textContent = `Z: ${zID.replace(/_/g, ' ')}`;

    const msgRef = ref(db, `v6/${zID}/msgs`);
    const onlineRef = ref(db, `v6/${zID}/online/${myNick}`);
    const onlineList = ref(db, `v6/${zID}/online`);

    set(onlineRef, serverTimestamp());
    onDisconnect(onlineRef).remove();
    
    onValue(onlineList, (s) => {
        document.getElementById("online-count").textContent = `👥 ${s.val() ? Object.keys(s.val()).length : 0} ONLINE`;
    });

    const today = new Date().toISOString().slice(0, 10).replace(/-/g, '');
    const usageRef = ref(db, `v6_usage/${myNick}/${today}`);
    onValue(usageRef, (s) => {
        document.getElementById("char-limit").textContent = `${33 - (s.val() || 0)} LEFT`;
    });

    window.send = () => {
        const inp = document.getElementById("msg-input");
        const txt = inp.value.trim();
        if(!txt) return;
        get(usageRef).then((s) => {
            let used = s.val() || 0;
            if(used + txt.length > 33) return alert("LIMIT REACHED");
            push(msgRef, { n: myNick, m: txt, t: serverTimestamp() });
            set(usageRef, used + txt.length);
            inp.value = "";
        });
    };

    onChildAdded(msgRef, (s) => {
        const d = s.val();
        const div = document.createElement("div");
        div.className = "msg-line";
        div.innerHTML = `<span class="timestamp">[${new Date(d.t).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}]</span><br><b>${d.n}✅</b>: ${d.m}`;
        const box = document.getElementById("chat-box");
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    });
}
