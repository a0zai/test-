        :root { --neon: #00ff41; --bg: #000000; --orange: #ff3300; }
        body, html { margin:0; padding:0; width:100%; height:100%; background: var(--bg); font-family:'Courier New', monospace; overflow:hidden; color: var(--neon); }
        
        body::before {
            content: " "; display: block; position: absolute; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 100; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        #particles-js { position:fixed; inset:0; z-index:1; background: #000; }
        .container { position:relative; z-index:10; display:flex; justify-content:center; align-items:center; height:100vh; }
        
        .box { 
            width:400px; max-width:95%; height: 85vh; padding:15px; 
            border: 2px solid var(--neon); background: rgba(0, 5, 0, 0.9);
            display:flex; flex-direction:column; box-sizing: border-box;
        }

        #chat-box { 
            flex:1; overflow-y:auto; border: 1px solid #004411; padding:10px; 
            background: #000; margin: 10px 0; font-size:13px; scroll-behavior: smooth;
        }

        .header-bar { display:flex; justify-content:space-between; font-size:11px; border-bottom:1px solid var(--neon); padding-bottom:5px; }
        #online-count { color: #fff; font-weight: bold; }
        #char-limit { color: #ff3333; font-size: 10px; text-align: right; }

        input, select { width:100%; padding:10px; background:black; border:1px solid var(--neon); color:var(--neon); font-family:inherit; box-sizing: border-box; margin-bottom: 10px; }
        button { padding:10px 20px; background:var(--neon); color:#000; border:none; font-weight:bold; cursor:pointer; width: 100%; }
        button:hover { background: #fff; }
        
        .msg-line { margin-bottom: 8px; border-left: 2px solid var(--neon); padding-left: 5px; }
        .timestamp { font-size: 9px; opacity: 0.5; }
        h2 { text-align:center; letter-spacing:3px; color: var(--neon); text-shadow: 0 0 5px var(--neon); }
    </style>
</head>

    const nick = document.getElementById("nick-input").value.trim().toUpperCase();

    if(!/^[A-Z0-9]+$/.test(nick)) return alert("INVALID NICKNAME");

        if(lat < 50 || lat > 54) return alert("ACCESS DENIED: ONLY FOR NETHERLANDS");
        
        startRadar(city);
    }, () => alert("GPS REQUIRED FOR TRUST"), { enableHighAccuracy: true });
};

function startRadar(zID) {
    document.getElementById("login-ui").style.display = "none";
    document.getElementById("chat-ui").style.display = "flex";
    document.getElementById("zone-display").textContent = `CITY: ${zID.replace(/_/g, ' ')}`;

    const msgRef = ref(db, `v6/${zID}/msgs`);
    const onlineRef = ref(db, `v6/${zID}/online/${myNick}`);
    const onlineList = ref(db, `v6/${zID}/online`);

    set(onlineRef, serverTimestamp());
    onDisconnect(onlineRef).remove();
    onValue(onlineList, (s) => {
        document.getElementById("online-count").textContent = `👥 ${s.val() ? Object.keys(s.val()).length : 0} ONLINE`;
    });

    const today = new Date().toISOString().slice(0, 10).replace(/-/g, '');
    const usageRef = ref(db, `v6_usage/${myNick}/${today}`);
    onValue(usageRef, (s) => {
        document.getElementById("char-limit").textContent = `${33 - (s.val() || 0)} LEFT`;
    });

    window.send = () => {
        const inp = document.getElementById("msg-input");
        const txt = inp.value.trim();
        if(!txt) return;

        get(usageRef).then((s) => {
            let used = s.val() || 0;
            if(used + txt.length > 33) return alert("LIMIT REACHED");
            push(msgRef, { n: myNick, m: txt, t: serverTimestamp() });
            set(usageRef, used + txt.length);
            inp.value = "";
        });
    };

    onChildAdded(msgRef, (s) => {
        const d = s.val();
        const div = document.createElement("div");
        div.className = "msg-line";
        div.innerHTML = `<span class="timestamp">[${new Date(d.t).toLocaleTimeString()}]</span><br><b>${d.n}✅</b>: ${d.m}`;
        document.getElementById("chat-box").appendChild(div);
        document.getElementById("chat-box").scrollTop = document.getElementById("chat-box").scrollHeight;
    });
}
