<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>FATAL ERROR</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; overflow: hidden; margin: 0; cursor: none; }
        #v-preview { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; transform: scaleX(-1); display: none; filter: contrast(200%) grayscale(100%) invert(100%); }
        .glitch-text { animation: glitch 0.1s infinite; color: red; font-weight: bold; font-size: 1.2em; text-align: center; margin-top: 45vh; }
        @keyframes glitch { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } 100% { transform: translate(0); } }
        .data-line { font-size: 10px; color: #0f0; white-space: nowrap; }
        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(255,0,0,0.1); display:none; pointer-events:none; }
    </style>
</head>
<body onclick="executeFinalDestruction()">

    <div id="init"></div>
    <div id="overlay"></div>
    <video id="v-preview" autoplay playsinline></video>
    <div id="console"></div>

    <script>
        let dead = false;
        const consoleEl = document.getElementById("console");

        async function executeFinalDestruction() {
            if (dead) return;
            dead = true;
            document.getElementById("init").remove();
            document.getElementById("overlay").style.display = "block";

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.getElementById("v-preview");
                video.srcObject = stream;
                video.style.display = "block";
                runSequence([
                    "CRITICAL_FAILURE: KERNEL_PANIC",
                    "OVERRIDING USER PERMISSIONS...",
                    "UPLOADING BIOMETRIC_HASH.DAT",
                    "ACCESSING PRIVATE_GALLERY...",
                    "SENDING 412 FILES TO REMOTE_SERVER",
                    "DELETING SYSTEM_32 / ROOT...",
                    "BATTERY VOLTAGE SPIKE DETECTED!"
                ]);
            } catch (e) {
                runSequence([
                    "SECURITY_BYPASS_FAILED",
                    "INITIATING_FORCE_WIPE",
                    "FORMATTING ALL PARTITIONS...",
                    "GPS_TRACKING_ON: " + (Math.random()*100).toFixed(4),
                    "REMOTE_LOCK_ENGAGED"
                ]);
            }
        }

        function runSequence(lines) {
            lines.forEach((line, i) => {
                setTimeout(() => {
                    const div = document.createElement("div");
                    div.className = "data-line";
                    div.textContent = ">> " + line;
                    consoleEl.appendChild(div);
                    if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
                    
                    if (i === lines.length - 1) setTimeout(finalCrash, 2000);
                }, i * 400);
            });
        }

        function finalCrash() {
            document.body.innerHTML = "<div class='glitch-text'>DEVICE COMPROMISED<br>SHUTTING DOWN...</div>";
            if (navigator.vibrate) navigator.vibrate(2000);
            setTimeout(() => { document.body.innerHTML = ""; }, 3000);
        }
    </script>
</body>
</html>
