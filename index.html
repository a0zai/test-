<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A0Z - SECURE RADAR V4</title>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body { margin:0; font-family:'Courier New', monospace; background: var(--bg); color: var(--neon); overflow:hidden; }
        #particles-js { position:fixed; inset:0; z-index:1; pointer-events:none; }
        .container { position:relative; z-index:10; display:flex; justify-content:center; align-items:center; height:100vh; }
        .box { width:420px; max-width:92%; padding:25px; border: 4px double var(--neon); background: rgba(0, 15, 0, 0.95); box-shadow: 0 0 20px rgba(0,255,65,0.3); text-align: center; box-sizing: border-box; }
        #chat-screen { display:none; flex-direction:column; height:85vh; width:480px; }
        #chat-box { flex:1; overflow-y:auto; border: 1px solid var(--neon); padding:10px; background: #000; margin-bottom:10px; text-align:left; font-size:14px; }
        #char-count { color: #ff0000; font-size: 11px; text-align: right; margin-bottom: 5px; font-weight: bold; }
        input { width:100%; padding:12px; background:#000; border:1px solid var(--neon); color:var(--neon); outline:none; font-family:inherit; box-sizing: border-box; margin-bottom: 10px; }
        button { width:100%; padding:12px; background:var(--neon); color:#000; border:none; font-weight:bold; cursor:pointer; text-transform:uppercase; }
        #online-val { color: #fff; text-shadow: 0 0 5px var(--neon); }
    </style>
</head>
<body>

<div id="particles-js"></div>

<div class="container">
    <div id="login" class="box">
        <h2>A0Z IDENTIFIER</h2>
        <p style="font-size:11px; opacity:0.7;">UNIQUE NICKNAME (A-Z, 0-9 ONLY)</p>
        <input id="user-input" placeholder="NICKNAME..." maxlength="12">
        <button id="boot-btn" onclick="checkAndBoot()">INITIALIZE SYSTEM</button>
    </div>

    <div id="chat-screen" class="box">
        <div style="display:flex; justify-content:space-between; font-size:10px; border-bottom:1px solid #004411; padding-bottom:5px; margin-bottom:8px;">
            <span id="zone-id">ZONE: SCANNING...</span>
            <span id="online-val">👥 0 ONLINE</span>
        </div>
        <div id="chat-box"></div>
        <div id="char-count">LIMIT: 33 LEFT</div>
        <div style="display:flex; gap:5px;">
            <input id="msg-in" placeholder="TYPE..." onkeydown="if(event.key==='Enter')sendMsg()" maxlength="33" style="margin-bottom:0;">
            <button onclick="sendMsg()" style="width:70px;">SND</button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, serverTimestamp, onValue, onDisconnect, set, get } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-database.js";

const firebaseConfig = { 
    apiKey: "AIzaSyA7Pu0DJOWmdoDYUUVP1J9aqhxh4f3wyfA", 
    projectId: "a0zai-56c3a",
    databaseURL: "https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app" 
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
let myNick = "";
let currentZone = "";

window.checkAndBoot = () => {
    const input = document.getElementById("user-input");
    const nick = input.value.trim().toUpperCase();
    const regex = /^[A-Z0-9]+$/;

    if (!nick || !regex.test(nick)) return alert("INVALID NICKNAME");

    document.getElementById("boot-btn").textContent = "GPS LOCKING...";
    
    navigator.geolocation.getCurrentPosition(async (p) => {
        const lat = p.coords.latitude;
        const lon = p.coords.longitude;
        currentZone = `Z-${(Math.round(lat / 0.0033) * 0.0033).toFixed(4)}_${(Math.round(lon / 0.0033) * 0.0033).toFixed(4)}`.replace(/\./g, '');
        
        myNick = nick;
        startRadar(currentZone);
    }, () => alert("GPS REQUIRED"), { enableHighAccuracy: true });
};

function startRadar(zID) {
    document.getElementById("login").style.display = "none";
    document.getElementById("chat-screen").style.display = "flex";
    document.getElementById("zone-id").textContent = `ZONE: ${zID} | ID: ${myNick}`;

    const msgRef = ref(db, `v4_zones/${zID}/msgs`);
    const presenceRef = ref(db, `v4_zones/${zID}/online/${myNick}`);
    const onlineListRef = ref(db, `v4_zones/${zID}/online`);

    // 1. نظام الأونلاين (المشاهدة) - شغال 100% الآن
    set(presenceRef, { status: "online", t: serverTimestamp() });
    onDisconnect(presenceRef).remove();

    onValue(onlineListRef, (snapshot) => {
        const val = snapshot.val();
        const count = val ? Object.keys(val).length : 0;
        document.getElementById("online-val").textContent = `👥 ${count} ONLINE`;
    });

    // 2. نظام الـ 33 حرف (تجديد يومي)
    const today = new Date().toISOString().slice(0, 10).replace(/-/g, '');
    const usageRef = ref(db, `v4_usage/${myNick}/${today}`);

    onValue(usageRef, (snap) => {
        let used = snap.val() || 0;
        document.getElementById("char-count").textContent = `LIMIT: ${33 - used} LEFT`;
    });

    window.sendMsg = () => {
        const input = document.getElementById("msg-in");
        const val = input.value.trim();
        if(!val) return;

        get(usageRef).then((snap) => {
            let used = snap.val() || 0;
            if (used + val.length > 33) return alert("DAY LIMIT REACHED!");
            
            push(msgRef, { nick: myNick, text: val, t: serverTimestamp() });
            set(usageRef, used + val.length);
            input.value = "";
        });
    };

    onChildAdded(msgRef, (snap) => {
        const d = snap.val();
        const line = document.createElement("div");
        line.innerHTML = `> <b style="color:#fff;">${d.nick}✅</b>: ${d.text}`;
        document.getElementById("chat-box").appendChild(line);
        document.getElementById("chat-box").scrollTop = document.getElementById("chat-box").scrollHeight;
    });
}

particlesJS("particles-js", { "particles": { "number": { "value": 40 }, "color": { "value": "#00ff41" }, "shape": { "type": "edge" }, "line_linked": { "enable": true, "distance": 120, "color": "#00ff41", "opacity": 0.15 } } });
</script>
</body>
</html>
