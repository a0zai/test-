.hamburger::before,
.hamburger::after {
  content: none;
}

.hamburger:active {
  transform: scale(0.85);
}

.hamburger::before { top: -10px; }
.hamburger::after { top: 10px; }

.input-line {

@keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }

@keyframes shake {
  0% { transform: translate(0px, 0px); }
  25% { transform: translate(2px, -2px); }
  50% { transform: translate(-2px, 2px); }
  75% { transform: translate(2px, 2px); }
  100% { transform: translate(0px, 0px); }

body {
  animation: none;

<script>
const hamburger = document.getElementById('hamburger');
const menu = document.getElementById('menu');
const footer = document.getElementById('footer');
const navLinks = menu.querySelectorAll('a');
const modeToggle = document.getElementById('modeToggle');
let isDark = false;
modeToggle.addEventListener('click', () => {
  if (!isDark) {
    document.body.style.filter = "invert(1)";
    isDark = true;
  } else {
    document.body.style.filter = "none";
    isDark = false;
  }
});
hamburger.addEventListener('click', () => {
  menu.classList.toggle('active');
  if(menu.classList.contains('active')) {
    footer.style.backgroundColor = '#ffffff';  // أبيض عند فتح القائمة
    footer.style.color = '#000000';
  } else {
    footer.style.backgroundColor = 'rgba(128, 0, 128, 0.5)';  // بنفسجي شفاف قبل النقر
    footer.style.color = '#ffffff';
  }
  footer.scrollIntoView({ behavior: 'smooth' });
});

navLinks.forEach(link => {
  link.addEventListener('click', (e) => {
    e.preventDefault();
    const targetId = link.getAttribute('href').substring(1);
    const targetSection = document.getElementById(targetId);
    if (targetSection) {
      targetSection.scrollIntoView({ behavior: 'smooth' });
    }
    menu.classList.remove('active');
  });
});
</script>

(function() {

const geometry = new THREE.TorusKnotGeometry(5, 1.2, 150, 20);
  const material = new THREE.MeshStandardMaterial({ color: 0x00ffff, metalness: 0.8, roughness: 0.2 });
  const torusKnot = new THREE.Mesh(geometry, material);
  scene.add(torusKnot);

  const light = new THREE.PointLight(0xffffff, 2, 100);
  light.position.set(10,10,10);
  scene.add(light);

  camera.position.z = 20; 

  function animate() {
    requestAnimationFrame(animate);
    torusKnot.rotation.x += 0.01;
    torusKnot.rotation.y += 0.005;
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
  });
})();

  const symbolicMemory = JSON.parse(localStorage.getItem("symbolicMemory") || "{}");
function handleLearningCommand(input) {
  if (input.startsWith("learn ")) {
    const parts = input.split(" ");
    const cmd = parts[1];
    const response = parts.slice(2).join(" ");
    symbolicMemory[cmd] = response;
    localStorage.setItem("symbolicMemory", JSON.stringify(symbolicMemory));
    terminal.innerHTML += `<div class='cmd-line'>📚 Opgeslagen als les: "${cmd}" → "${response}"</div>`;
    return true;
  }
  return false;
}

// ربط رمز بمفهوم (تعليم رمزي)
function handleTeachSymbol(input) {
  if (input.startsWith("teach ")) {
    const [_, symbol, __, ...concept] = input.split(" ");
    if (symbol && concept.length) {
      symbolicMemory[symbol] = concept.join(" ");
      localStorage.setItem("symbolicMemory", JSON.stringify(symbolicMemory));
      terminal.innerHTML += `<div class='cmd-line'>🔣 "${symbol}" gekoppeld aan: ${concept.join(" ")}</div>`;
      return true;
    }
  }
  return false;
}

// استدعاء كل ما تعلّمه النظام
function handleRecallCommand(input) {
  if (input === "recall") {
    terminal.innerHTML += "<div class='cmd-line'>🧠 Geleerde elementen:</div>";
    Object.entries(symbolicMemory).forEach(([k, v]) => {
      terminal.innerHTML += `<div class='cmd-line'>${k} → ${v}</div>`;
    });
    return true;
  }
  return false;
}

// إعادة تعيين الذاكرة
function handleResetMind(input) {
  if (input === "reset mind") {
    localStorage.removeItem("symbolicMemory");
    terminal.innerHTML += "<div class='cmd-line'>🧽 Geheugen gewist.</div>";
    return true;
  }
  return false;
}


function handleIntent(input) {
  if (input.startsWith("intent ")) {
    const intentTarget = input.split(" ").slice(1).join(" ");
    const hasWhy = intentTarget.includes("waarom") || intentTarget.includes("why");
    const hasFeel = intentTarget.includes("voelen") || intentTarget.includes("feel");

    let guess = "⚙️ Algemene intentie.";
    if (hasWhy) guess = "❔ Intentie: Zoektocht naar betekenis.";
    if (hasFeel) guess = "❤️ Intentie: Emotionele expressie.";

    terminal.innerHTML += `<div class='cmd-line'>🧭 ${guess}</div>`;
    return true;
  }
  return false;
}

// إدماج كل الأوامر الرمزية التعليمية داخل نقطة واحدة
function symbolicSelfLearn(input) {
  const lower = input.trim().toLowerCase();
  return (
    handleLearningCommand(lower) ||
    handleTeachSymbol(lower) ||
    handleRecallCommand(lower) ||
    handleResetMind(lower) ||
    handleIntent(lower)
  );
}
function interpretInput(input) {
    const trimmedInput = input.trim();
  const lowerInput = trimmedInput.toLowerCase();

  if (questionResponses[lowerInput]) {
    const answers = questionResponses[lowerInput];
    return `Answer 1: ${answers[0]} \nAnswer 2: ${answers[1]}`;
  }
  if (symbolicSelfLearn(lowerInput)) return;
  
    if (symbolicMemory[lowerInput]) {
    terminal.innerHTML += `<div class='cmd-line'>${symbolicMemory[lowerInput]}</div>`;
    return;
  }

if (commandActions[lowerInput]) {
  commandActions[lowerInput]();
  return `🔧 Commando "${lowerInput}" geactiveerd.`;
}

  const result = [];

  const words = trimmedInput.split(/\s+/);
  words.forEach(word => {
    const mapped = grammarMapping[word] || mathMapping[word] || emotionMapping[word] || emojiResponseMap[word];
    if (mapped) {
      if (emojiResponseMap[word]) {
        result.push(`${word} → Feeling: ${emojiResponseMap[word].feeling}, Opposite: ${emojiResponseMap[word].opposite}`);
      } else {
        result.push(word + " → " + mapped);
      }
    }
  });

  const clean = trimmedInput.toUpperCase().replace(/[^A-Z0-9]/g, '').split('');
  clean.forEach((char, i) => {
    let letter = char;
    if (numToLetter[char]) letter = numToLetter[char];
    if (exampleCommands[letter]) {
      const cmd = exampleCommands[letter][i % exampleCommands[letter].length];
      result.push(letter + " → " + cmd);
    } else {
      result.push("[" + char + "]");
    }
  });

  return result.join(" | ");
}

// دالة الكتابة التدريجية في التيرمنال
function typeReply(text, element, charSpeed = 25, callback = null) {
  let idx = 0;
  element.textContent = "";
  
  function typeChar() {
    if (idx < text.length) {
      element.textContent += text.charAt(idx);
      terminal.scrollTop = terminal.scrollHeight; // تمرير تلقائي للـ terminal
      idx++;
      setTimeout(typeChar, charSpeed);
    } else {
      if (callback) callback(); // استدعاء التالي بعد انتهاء السطر
    }
  }
  
  typeChar();
}

// عرض جميع الأسطر واحدًا تلو الآخر
function displayLinesSequentially(lines, charSpeed = 25, lineDelay = 50) {
  let i = 0;

  function showLine() {
    if (i >= lines.length) return;

    const msg = document.createElement("div");
    msg.className = "cmd-line";
    terminal.appendChild(msg);

    typeReply(lines[i], msg, charSpeed, () => {
      // بعد الانتهاء من السطر الحالي ننتظر قليلاً قبل السطر التالي
      setTimeout(() => {
        i++;
        showLine();
      }, lineDelay);
    });
  }

  showLine();
}

// استدعاء الدالة
displayLinesSequentially(baseLines, 100, 200);
// عرض الفيديو بكامل الشاشة بدون التأثير على النصوص
function showFullScreenVideo(src) {
  const video = document.createElement("video");
  video.src = src;
  video.autoplay = true;
  video.loop = false;
  video.muted = true;
  video.playsInline = true;
  video.style.position = "fixed";
  video.style.top = "0";
  video.style.left = "0";
  video.style.width = "100%";
  video.style.height = "100%";
  video.style.objectFit = "cover";
  video.style.zIndex = "1";       // خلف النصوص
  video.style.opacity = "0";
  video.style.transition = "opacity 1s";
  document.body.appendChild(video);

  // fade-in جزئي
  setTimeout(() => { video.style.opacity = "0.5"; }, 50);

  // fade-out عند انتهاء الفيديو
  video.addEventListener("ended", () => {
    video.style.opacity = "0";
    setTimeout(() => document.body.removeChild(video), 1000);
  });
}

// الاستماع لأوامر التيرمنال
input.addEventListener("keydown", function(event) {
  if (event.key === "Enter") {
    const cmd = input.value.trim();
    const lowerCmd = cmd.toLowerCase();

    // عرض الفيديو إذا كان الأمر موجود
    if (videoMap[lowerCmd]) {
      showFullScreenVideo(videoMap[lowerCmd]);
    }

    const userCmd = document.createElement("div");
    userCmd.className = "cmd-line cmd-user";
    userCmd.textContent = "> " + cmd;

    const botReply = document.createElement("div");
    botReply.className = "cmd-line";

    terminal.appendChild(userCmd);
    terminal.appendChild(botReply);

    const result = interpretInput(cmd);
    typeReply(result, botReply);

    input.value = "";
    terminal.scrollTop = terminal.scrollHeight;
  }
});
