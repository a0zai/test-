<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Luxury Boutique</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Times New Roman', serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #d4af37; background: rgba(0,0,0,0.8); padding: 20px; border-left: 5px solid #d4af37; pointer-events: none; z-index: 10; }
        #joystick-container { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; z-index: 100; }
        #start { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #000; background: #d4af37; padding: 15px 50px; border: none; cursor: pointer; z-index: 1000; font-weight: bold; font-size: 20px; box-shadow: 0 0 20px rgba(212,175,55,0.5); }
    </style>
</head>
<body>

<div id="ui">
    <h1 style="margin:0; letter-spacing: 4px;">PRESTIGE</h1>
    <p style="margin:5px 0 0; font-style: italic; color: #fff;">Private Collection 2026</p>
</div>
<div id="start">ENTER PRIVATE GALLERY</div>
<div id="joystick-container"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.1/nipplejs.min.js"></script>

<script>
// ==== 1. الأساسيات ====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050505);
scene.fog = new THREE.Fog(0x050505, 1, 30);

const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 1.7, 10);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ReinhardToneMapping; // تحسين الألوان والإضاءة
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// ==== 2. إضاءة فخمة (Crystal & Gold Lighting) ====
const amb = new THREE.AmbientLight(0xffffff, 0.2);
scene.add(amb);

function addCeilingLight(x, z) {
    const light = new THREE.PointLight(0xfff3e0, 15, 15);
    light.position.set(x, 4.5, z);
    scene.add(light);
    
    // تمثيل النجف (Chandelier) بشكل بسيط
    const geo = new THREE.CylinderGeometry(0.5, 0.1, 0.5, 8);
    const mat = new THREE.MeshStandardMaterial({color: 0xd4af37, emissive: 0xd4af37});
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, 4.8, z);
    scene.add(mesh);
}
addCeilingLight(0, -5);
addCeilingLight(5, -15);
addCeilingLight(-5, -15);

// ==== 3. البيئة (سجاد، جدران، أثاث) ====
// السجاد الأحمر الملكي
const carpet = new THREE.Mesh(
    new THREE.PlaneGeometry(8, 40),
    new THREE.MeshStandardMaterial({color: 0x800000, roughness: 1})
);
carpet.rotation.x = -Math.PI / 2;
carpet.position.y = 0.01;
scene.add(carpet);

// الأرضية الرخامية سوداء
const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(30, 60),
    new THREE.MeshStandardMaterial({color: 0x0a0a0a, roughness: 0.1, metalness: 0.5})
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

// جدران خشبية داكنة
const wallMat = new THREE.MeshStandardMaterial({color: 0x1a0f00});
const wallBack = new THREE.Mesh(new THREE.PlaneGeometry(30, 10), wallMat);
wallBack.position.set(0, 2.5, -25);
scene.add(wallBack);

// أريكة فخمة (Sofa)
function createSofa(x, z, rot) {
    const group = new THREE.Group();
    const seat = new THREE.Mesh(new THREE.BoxGeometry(3, 0.6, 1.2), new THREE.MeshStandardMaterial({color: 0x222}));
    const back = new THREE.Mesh(new THREE.BoxGeometry(3, 1, 0.3), new THREE.MeshStandardMaterial({color: 0x222}));
    back.position.set(0, 0.5, -0.45);
    group.add(seat, back);
    group.position.set(x, 0.3, z);
    group.rotation.y = rot;
    scene.add(group);
}
createSofa(-7, -8, Math.PI/2);
createSofa(7, -8, -Math.PI/2);

// ==== 4. الموظف (بكامل الأناقة والكمامة) ====
function createEliteStaff() {
    const group = new THREE.Group();
    // البدلة
    const torso = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.1, 0.3), new THREE.MeshStandardMaterial({color: 0x000}));
    // القميص والربطة
    const shirt = new THREE.Mesh(new THREE.PlaneGeometry(0.2, 0.5), new THREE.MeshStandardMaterial({color: 0xffffff}));
    shirt.position.set(0, 0.3, 0.16);
    // الرأس والكمامة
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.22, 16, 16), new THREE.MeshStandardMaterial({color: 0xdbac98}));
    head.position.y = 0.75;
    const mask = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.1, 0.1), new THREE.MeshStandardMaterial({color: 0xffffff}));
    mask.position.set(0, 0.7, 0.18);

    group.add(torso, shirt, head, mask);
    group.position.set(0, 1, -22); // موقعه خلف طاولة الاستقبال
    return group;
}
const staff = createEliteStaff();
scene.add(staff);

// طاولة الاستقبال
const desk = new THREE.Mesh(new THREE.BoxGeometry(4, 1.2, 1.5), new THREE.MeshStandardMaterial({color: 0x111, metalness: 0.8}));
desk.position.set(0, 0.6, -20);
scene.add(desk);

// ==== 5. الساعات ومنصات العرض ====
function createLuxuryWatch(x, y, z) {
    const watch = new THREE.Group();
    const frame = new THREE.Mesh(new THREE.TorusGeometry(0.12, 0.02, 16, 100), new THREE.MeshStandardMaterial({color: 0xffd700, metalness: 1}));
    const dial = new THREE.Mesh(new THREE.CircleGeometry(0.11, 32), new THREE.MeshStandardMaterial({color: 0x000}));
    dial.position.z = 0.01;
    watch.add(frame, dial);
    watch.position.set(x, y, z);
    watch.rotation.y = Math.PI / 2;
    scene.add(watch);
}

function createDisplayUnit(x, z) {
    // قاعدة رخامية سوداء وذهبية
    const base = new THREE.Mesh(new THREE.BoxGeometry(1.8, 1.2, 1.2), new THREE.MeshStandardMaterial({color: 0x000, metalness: 0.9}));
    base.position.y = 0.6;
    
    // إطار ذهبي علوي
    const goldRim = new THREE.Mesh(new THREE.BoxGeometry(1.85, 0.05, 1.25), new THREE.MeshStandardMaterial({color: 0xd4af37}));
    goldRim.position.y = 1.2;

    // زجاج
    const glass = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.7, 1.1), new THREE.MeshStandardMaterial({color: 0xffffff, transparent: true, opacity: 0.15}));
    glass.position.y = 1.6;

    const unit = new THREE.Group();
    unit.add(base, goldRim, glass);
    unit.position.set(x, 0, z);
    scene.add(unit);

    createLuxuryWatch(x, 1.4, z);
    
    // ضوء مركز على الساعة
    const light = new THREE.SpotLight(0xffd700, 10);
    light.position.set(x, 4, z);
    light.target = unit;
    scene.add(light);
}

// توزيع المعروضات
[[-4,-5], [4,-5], [-4,-15], [4,-15]].forEach(p => createDisplayUnit(p[0], p[1]));

// ==== 6. التحكم والحركة ====
let moveDir = {x:0, y:0};
const joystick = nipplejs.create({ zone: document.getElementById('joystick-container'), mode: 'static', position: {left: '50px', bottom: '50px'}, color: '#d4af37' });
joystick.on('move', (e, d) => { moveDir.x = d.vector.x; moveDir.y = d.vector.y; });
joystick.on('end', () => { moveDir = {x:0, y:0}; });

let lon = 0, lat = 0;
document.addEventListener('pointermove', (e) => { if(e.buttons === 1){ lon -= e.movementX * 0.1; lat -= e.movementY * 0.1; lat = Math.max(-85, Math.min(85, lat)); } });

document.getElementById("start").onclick = () => { document.getElementById("start").style.display = "none"; };

function animate() {
    requestAnimationFrame(animate);
    const phi = THREE.MathUtils.degToRad(90 - lat);
    const theta = THREE.MathUtils.degToRad(lon);
    const target = new THREE.Vector3().setFromSphericalCoords(1, phi, theta).add(camera.position);
    camera.lookAt(target);

    const fwd = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
    fwd.y = 0; fwd.normalize();
    const rgt = new THREE.Vector3().crossVectors(camera.up, fwd).negate();

    camera.position.addScaledVector(fwd, moveDir.y * 0.12);
    camera.position.addScaledVector(rgt, moveDir.x * 0.12);

    // الموظف يراقبك بهدوء
    staff.lookAt(camera.position.x, 1.5, camera.position.z);

    renderer.render(scene, camera);
}
animate();

window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
