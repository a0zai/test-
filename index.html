<style>
:root {
    --sense-green: #00ff00;
    --sense-red: #ff3333;
    --sense-blue: #00d4ff;
}

html, body {
    margin: 0;
    padding: 0;
    background: transparent !important;
    color: white;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    width: 100%;
    overflow-x: hidden;
}

#vanta-bg, #particles-stars {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    z-index: -1;
    pointer-events: none;
}

header, main, section {
    background: transparent !important;
    position: relative;
    z-index: 1;
    width: 100%;
    box-sizing: border-box;
}

.logo-row {
    display: flex;
    align-items: center;
    gap: 12px;
}

.logo {
    width: 64px;
    height: 64px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(90deg,#002b20,#004d2f);
    box-shadow: 0 8px 30px rgba(0,0,0,0.6);
}

.logo h1 {
    margin: 0;
    font-size: 14px;
}
#viewersCount {
  position:fixed; top:15px; left:50%;
  transform:translateX(-50%);
  font-size:14px; font-weight:bold;
  color:#ff3333; z-index:10000;
  user-select:none;
  background: rgba(0,0,0,0.5);
  padding:6px 12px; border-radius:12px;
  box-shadow:0 0 8px #ff0000;
  cursor:pointer;
}
.fade-in-fog {
  opacity: 0;
  filter: blur(10px); 
  transform: translateY(20px); 
  transition: opacity 3s ease, filter 6s ease, transform 9s ease;
}

.fade-in-fog.visible {
  opacity: 1;
  filter: blur(0);
  transform: translateY(0);
}
/* VIEWERS LIST */
#viewersListPopup {
  position: fixed;
  top: 70px; 
  left: 50%;
  transform: translateX(-50%);
  max-height: 200px;
  width: 200px;
  overflow-y: auto;
  background: rgba(0, 0, 0, 0.9);
  color: #00ff00; 
  border: 1px solid #00ff00;
  border-radius: 8px;
  padding: 10px;
  font-size: 7px;
  display: none; 
  z-index: 10001;
  box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
}

.header-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 0 20px;
    box-sizing: border-box;
}
#modeToggle {
    cursor: pointer;
    font-size: 24px;
    transition: transform 0.3s ease;
    filter: drop-shadow(0 0 5px rgba(0, 255, 0, 0.8));
    animation: butterflyGlow 2s infinite alternate;
}

@keyframes butterflyGlow {
    0% {
        filter: drop-shadow(0 0 2px rgba(0, 255, 0, 0.5));
        transform: scale(1);
    }
    100% {
        filter: drop-shadow(0 0 15px rgba(0, 255, 0, 1)) brightness(1.2);
        transform: scale(1.1);
    }
}

.hamburger {
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    background: inherit;
    font-size: 28px;
    user-select: none;
    z-index: 1001;
    transition: transform 0.2s;
}

.hamburger:active {
    transform: scale(0.9);
}

nav {
    position: absolute;
    top: 60px;
    right: 20px;
    background-color: rgba(255, 255, 255, 0.95);
    border-radius: 8px;
    display: none;
    flex-direction: column;
    min-width: 160px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    z-index: 1002;
}

nav.active {
    display: flex;
}

nav a {
    padding: 12px 20px;
    text-decoration: none;
    color: #111;
    font-weight: bold;
    border-bottom: 1px solid #eee;
}

nav a:last-child {
    border-bottom: none;
}
.clock-container {
    transform-style: preserve-3d;
    transform: translateZ(20px);
    transition: transform 0.15s ease-out;
    will-change: transform;
    position: relative;
    width: 78px;
    height: 78px;
    border-radius: 50%;
    border: 1px solid #ff0000;
}
.glass-cover {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    pointer-events: none;
    transform: translateZ(30px);
}
.clock-container::after {
    content: 'A•Z';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 22px;
    letter-spacing: 2px;
    color: #000;
    text-shadow: 0 0 7px #000;
}
.brand-name {
    position: absolute;
    top: 63%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: var(--sense-green);
    font-size: 1px;
    letter-spacing: 7px;
    opacity: 0.6;
    text-transform: uppercase;
}

@keyframes pulse {
    0%,100% { transform: translate(-50%, -50%) scale(1); opacity: 0.9; }
    50% { transform: translate(-50%, -50%) scale(1.7); opacity: 0.4; }
}
.number {
    position: absolute;
    width: 100%;
    height: 100%;
    text-align: center;
    font-size: 14px;
    font-weight: bold;
    padding: 18px;
    box-sizing: border-box;
    color: #cccccc;
}
.n1  { transform: rotate(0deg); }    .n1 div  { transform: rotate(0deg); }
.n2  { transform: rotate(30deg); }   .n2 div  { transform: rotate(-30deg); }
.n3  { transform: rotate(60deg); }   .n3 div  { transform: rotate(-60deg); }
.n4  { transform: rotate(90deg); }   .n4 div  { transform: rotate(-90deg); }
.n5  { transform: rotate(120deg); }  .n5 div  { transform: rotate(-120deg); }
.n6  { transform: rotate(150deg); }  .n6 div  { transform: rotate(-150deg); }
.n7  { transform: rotate(180deg); }  .n7 div  { transform: rotate(-180deg); }
.n8  { transform: rotate(210deg); }  .n8 div  { transform: rotate(-210deg); }
.n9  { transform: rotate(240deg); }  .n9 div  { transform: rotate(-240deg); }
.n10 { transform: rotate(270deg); }  .n10 div { transform: rotate(-270deg); }
.n11 { transform: rotate(300deg); }  .n11 div { transform: rotate(-300deg); }
.n12 { transform: rotate(330deg); }  .n12 div { transform: rotate(-330deg); }
.hand {
    position: absolute;
    bottom: 50%;
    left: 50%;
    transform-origin: bottom;
    border-radius: 10px;
    transform: translateZ(20px);
}
.n1 {
    position: absolute;
    bottom: 100%; 
    left: 50%;
    transform: translateX(-50%) rotate(0deg); 
    font-size: 14px;
    color: #f1f5f9;
    white-space: nowrap;
    transition: opacity 0.3s ease;
}
.hour {
    width: 3px;
    height: 24px;
    background: rgba(241,245,249,0.25);
    box-shadow: 0 0 10px rgba(241,245,249,0.3); 
}
.minute {
    width: 2px;
    height: 36px;
    background: var(--sense-red);
    box-shadow: 0 0 11px var(--sense-red); 
}
.second {
    width: 1.5px;
    height: 48px;
    background: var(--sense-blue);
    box-shadow: 0 0 12px var(--sense-blue);
}
.tagline {
    margin-top: 33px;      
    color: #ffffff;            
    opacity: 0.85;         
    font-size: 14px;        
    letter-spacing: 2px;   
    text-align: center;    
    width: 100%;        
}
@media (max-width:600px){
    .title { font-size:9px; letter-spacing:8px; }
    .number { font-size:14px; }
}
body {
    opacity: 0;
    transition: opacity 3s ease-in;
}
body.loaded {
    opacity: 1;
}

footer {
  width: 100%;
  padding: 80px 20px;
  text-align: left;
  position: relative;
  overflow: hidden;
}

.footer-links {
  display: flex;
  flex-direction: column;
  gap: 5px;
  color: #1E90FF;
  text-align: left;
}

.footer-links a {
  color: #1E90FF;
  text-decoration: none;
  font-size: 14px;
  transition: 0.3s;
}

.footer-links a:hover {
  color: #00BFFF;
}

#threeContainer {
  position: absolute;
  bottom: 10px;
  right: 10px; 
  width: 100px;
  height: 100px;
  transform: translateX(-20px);
}
@keyframes moveLink {
  0% { transform: translateX(0); }
  50% { transform: translateX(10px); }
  100% { transform: translateX(0); }
}
@keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

@keyframes shake {
  0% { transform: translate(0px, 0px); }
  25% { transform: translate(2px, -2px); }
  50% { transform: translate(-2px, 2px); }
  75% { transform: translate(2px, 2px); }
  100% { transform: translate(0px, 0px); }
}
body {
  animation: none; 
}
</style>

<script>
const hamburger = document.getElementById('hamburger');
const menu = document.getElementById('menu');
const footer = document.getElementById('footer');
const navLinks = menu.querySelectorAll('a');
const modeToggle = document.getElementById('modeToggle');
let isDark = false;
modeToggle.addEventListener('click', () => {
  if (!isDark) {
    document.body.style.filter = "invert(1)";
    isDark = true;
  } else {
    document.body.style.filter = "none";
    isDark = false;
  }
});
hamburger.addEventListener('click', () => {
  menu.classList.toggle('active');
  if(menu.classList.contains('active')) {
    footer.style.backgroundColor = '#ffffff';  
    footer.style.color = '#000000';
  } else {
    footer.style.backgroundColor = 'rgba(128, 0, 128, 0.5)';  
    footer.style.color = '#ffffff';
  }
  footer.scrollIntoView({ behavior: 'smooth' });
});

navLinks.forEach(link => {
  link.addEventListener('click', (e) => {
    e.preventDefault();
    const targetId = link.getAttribute('href').substring(1);
    const targetSection = document.getElementById(targetId);
    if (targetSection) {
      targetSection.scrollIntoView({ behavior: 'smooth' });
    }
    menu.classList.remove('active');
  });
});
</script>
<script>
(function() {
  const container = document.getElementById('threeContainer');
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, container.clientWidth/container.clientHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  container.appendChild(renderer.domElement);

const geometry = new THREE.TorusKnotGeometry(5, 1.2, 150, 20);
  const material = new THREE.MeshStandardMaterial({ color: 0x00ffff, metalness: 0.8, roughness: 0.2 });
  const torusKnot = new THREE.Mesh(geometry, material);
  scene.add(torusKnot);

  const light = new THREE.PointLight(0xffffff, 2, 100);
  light.position.set(10,10,10);
  scene.add(light);

  camera.position.z = 20; 

  function animate() {
    requestAnimationFrame(animate);
    torusKnot.rotation.x += 0.01;
    torusKnot.rotation.y += 0.005;
    renderer.render(scene, camera);
  }
  animate();
  window.addEventListener('resize', () => {
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
  });
})();
</script>
<script>
const hour = document.getElementById('hour');
const minute = document.getElementById('minute'); 
const second = document.getElementById('second');
const n1 = hour.querySelector('.n1'); 
function updateClock() {
    const now = new Date();
    const ms = now.getMilliseconds();
    const s = now.getSeconds() + ms / 1000;
    const m = now.getMinutes() + s / 60;
    const h = (now.getHours() % 12) + m / 60;
    hour.style.transform = `translateX(-50%) rotate(${-h*30 + 30}deg)`;
    if (n1) {
        n1.style.transform = `translateX(-50%) rotate(${h*30 - 30}deg)`;
        n1.innerText = "∞";
        n1.style.fontWeight = '600';
        n1.style.letterSpacing = '2px';
        n1.style.fontSize = '18px';
        n1.style.color = '#f1f5f9'; 
    }
    second.style.transform = `translateX(-50%) rotate(${-s*6 + 0}deg)`;
    minute.style.transform = `translateX(-50%) rotate(${-m*6 + 0}deg)`;
    requestAnimationFrame(updateClock);
}
updateClock();
window.addEventListener('load', () => {
    document.body.classList.add('loaded');
});

</script>
