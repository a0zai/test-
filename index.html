<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>a0z</title>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        body { background: #000; color: #0ff; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        #particles-js { position: absolute; width: 100%; height: 100%; z-index: 1; }
        .container { position: relative; z-index: 10; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100%; }
        .box { width: 400px; padding: 25px; border: 1px solid #ff3333; background: rgba(10, 0, 0, 0.95); box-shadow: 0 0 15px #f33; border-radius: 8px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #ff3333; color: #ff3333; box-sizing: border-box; font-size: 16px; outline: none; }
        button { width: 100%; padding: 12px; background: #ff3333; color: #000; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
        #chat-screen { display: none; flex-direction: column; height: 85vh; width: 95%; max-width: 500px; }
        #chat-box { flex: 1; overflow-y: auto; border: 1px solid #ff3333; padding: 15px; margin-bottom: 5px; background: rgba(0, 0, 0, 0.9); text-align: left; }
        #char-count { color: #666; font-size: 11px; margin: 5px 0; }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div class="container">
        <div id="login-screen" class="box">
            <h2 style="color: #ff3333;">A🇳🇱Z</h2>
            <input type="text" id="city" placeholder="Stad">
            <input type="text" id="street" placeholder="Straatnaam">
            <input type="text" id="postcode" placeholder="Postcode">
            <button id="entry-btn" onclick="joinRoom()">VERBINDEN</button>
        </div>
        <div id="chat-screen" class="box">
            <div id="room-info" style="color:#f33; font-size:12px; margin-bottom:10px;"></div>
            <div id="chat-box"></div>
            <div id="char-count">Tekens over: 99</div>
            <div style="display: flex; gap: 5px;">
                <input type="text" id="msg-input" placeholder="Bericht..." onkeydown="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()" style="width: 80px;">SND</button>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyA7Pu0DJOWmdoDYUUVP1J9aqhxh4f3wyfA", 
        projectId: "a0zai-56c3a",
        databaseURL: "https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let userLoc = "Unknown";

    window.joinRoom = () => {
        const city = document.getElementById('city').value.trim().toLowerCase();
        const street = document.getElementById('street').value.trim().toLowerCase();
        const postcode = document.getElementById('postcode').value.trim().toUpperCase();

        if (!city || !street || !postcode) return alert("Vul alles in!");

        const btn = document.getElementById('entry-btn');
        btn.textContent = "VERIFICEREN...";
        btn.disabled = true;

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((p) => {
                userLoc = `${p.coords.latitude.toFixed(4)},${p.coords.longitude.toFixed(4)}`;
                completeEntry(city, street, postcode);
            }, () => {
                completeEntry(city, street, postcode);
            }, { enableHighAccuracy: true, timeout: 3000 });
        } else {
            completeEntry(city, street, postcode);
        }
    };

    function completeEntry(city, street, postcode) {
        localStorage.setItem('nlLiveUser', JSON.stringify({city, street, postcode}));
        const roomID = `${city}_${street}`.replace(/\s+/g, '');
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
        document.getElementById('room-info').textContent = `📍 ${street}, ${city}`;

        const chatRef = ref(db, `live_chats/${roomID}`);

        window.sendMessage = () => {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            let today = new Date().toDateString();
            let used = parseInt(localStorage.getItem('u_' + today) || "0");

            if (!text) return;
            if (used + text.length > 99) return alert("Limiet 99 bereikt!");

            push(chatRef, { sender: postcode, message: text, loc: userLoc, time: serverTimestamp() });
            localStorage.setItem('u_' + today, (used + text.length).toString());
            input.value = '';
            updateCount();
        };

        onChildAdded(chatRef, (snap) => {
            const d = snap.val();
            const b = (d.loc && d.loc !== "Unknown") ? " <span style='color:#0f0; text-shadow: 0 0 5px #0f0;'>✅</span>" : "";
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.style.margin = "8px 0";
            msgDiv.innerHTML = `<span style="color:#f33; font-weight:bold;">[${d.sender}${b}]:</span> <span style="color:#0ff">${d.message}</span>`;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        });
        updateCount();
    }

    function updateCount() {
        let today = new Date().toDateString();
        let used = parseInt(localStorage.getItem('u_' + today) || "0");
        const countElem = document.getElementById('char-count');
        if (countElem) countElem.textContent = `Tekens over: ${99 - used}`;
    }

    window.addEventListener('load', () => {
        const saved = JSON.parse(localStorage.getItem('nlLiveUser'));
        if(saved) {
            document.getElementById('city').value = saved.city;
            document.getElementById('street').value = saved.street;
            document.getElementById('postcode').value = saved.postcode;
        }
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 50 },
                "color": { "value": "#ff3333" },
                "line_linked": { "enable": true, "color": "#ff3333" },
                "move": { "enable": true, "speed": 1.5 }
            }
        });
    });
</script>
</body>
</html>
