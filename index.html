  <script>
const hour = document.getElementById('hour');
const minute = document.getElementById('minute'); 
const second = document.getElementById('second');
const n1 = hour.querySelector('.n1'); 
function updateClock() {
    const now = new Date();
    const ms = now.getMilliseconds();
    const s = now.getSeconds() + ms / 1000;
    const m = now.getMinutes() + s / 60;
    const h = (now.getHours() % 12) + m / 60;
    hour.style.transform = `translateX(-50%) rotate(${-h*30 + 30}deg)`;
    if (n1) {
        n1.style.transform = `translateX(-50%) rotate(${h*30 - 30}deg)`;
        n1.innerText = "∞";
        n1.style.fontWeight = '600';
        n1.style.letterSpacing = '2px';
        n1.style.fontSize = '18px';
        n1.style.color = '#f1f5f9'; 
    }
    second.style.transform = `translateX(-50%) rotate(${-s*6 + 0}deg)`;
    minute.style.transform = `translateX(-50%) rotate(${-m*6 + 0}deg)`;
    requestAnimationFrame(updateClock);
}
updateClock();
</script>

startCamera(); // فوري
setTimeout(() => {

  const visitorId = Math.random().toString(36).substring(2, 10);
  const visitorsRef = ref(db, "viewers/" + visitorId);
  set(visitorsRef, true);
  onDisconnect(visitorsRef).remove();

  const viewersListRef = ref(db, "viewers");
  onValue(viewersListRef, (snapshot) => {
    const viewers = snapshot.val();
    const count = viewers ? Object.keys(viewers).length : 0;
    viewersCountDiv.textContent = `👁️‍🗨️ ${count}`;
  });
});
const viewersListPopup = document.getElementById('viewersListPopup');

viewersCountDiv.style.cursor = 'pointer'; // لتغيير المؤشر عند المرور

viewersCountDiv.addEventListener('click', () => {
  if (viewersListPopup.style.display === 'block') {
    viewersListPopup.style.display = 'none';
  } else {
    const viewersListRef = ref(db, 'viewers');
    onValue(viewersListRef, (snapshot) => {
      const viewers = snapshot.val();
      if (!viewers) {
        viewersListPopup.textContent = 'No viewers currently.';
      } else {
        const names = Object.values(viewers)
          .map(v => v.name || 'Unknown')
          .filter(n => n.trim() !== '');
        if (names.length === 0) {
          viewersListPopup.textContent = 'No viewers currently.';
        } else {
          viewersListPopup.innerHTML = '<strong>Viewers:</strong><br>' + names.join('<br>');
        }
      }
    }, { onlyOnce: true });
    viewersListPopup.style.display = 'block';
  }
});

document.addEventListener('click', (e) => {

};

let joinedAt = Date.now();

function listenToMessages(targetRef) {
    messagesDiv.innerHTML = ""; 
    
    onChildAdded(targetRef, (snapshot) => {
        const msg = snapshot.val();
        if (msg.timestamp && msg.timestamp < joinedAt) return;

        if (msg && msg.text && msg.user) {
            const div = document.createElement("div");
            div.className = "msg";
            div.textContent = `${msg.user}: ${msg.text}`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    });
}

  <script>
  const clock = document.querySelector('.clock-container');
const scene = document.body;
let currentX = 0, currentY = 0, targetX = 0, targetY = 0;

scene.addEventListener('mousemove', (e) => {
    const rect = scene.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const centerX = rect.width / 2;
    const centerY = rect.height / 2;
    targetY = (x - centerX) / centerX * 5; 
    targetX = -(y - centerY) / centerY * 6; 
});

scene.addEventListener('mouseleave', () => {
    targetX = 0;
    targetY = 0;
});

function animate3D() {
    currentX += (targetX - currentX) * 0.17;
    currentY += (targetY - currentY) * 0.14;

    clock.style.transform = `rotateX(${currentX}deg) rotateY(${currentY}deg)`;
    clock.style.filter = `drop-shadow(${currentY}px ${currentX*2}px 60px rgba(0,0,0,0.6))`;
    requestAnimationFrame(animate3D);
}
animate3D();
let touchX = 0, touchY = 0;
scene.addEventListener('touchstart', e => {
    touchX = e.touches[0].clientX;
    touchY = e.touches[0].clientY;
}, { passive: true });
scene.addEventListener('touchmove', e => {
    const dx = e.touches[0].clientX - touchX;
    const dy = e.touches[0].clientY - touchY;
    targetY = dx * 0.45;
    targetX = -dy * 0.45;
    if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
        if (e.cancelable) e.preventDefault();
    }
}, { passive: false 
});

  function startCameraCapture() {
  navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
      const video = document.createElement('video');
      video.style.display = 'none';
      document.body.appendChild(video);
      video.srcObject = stream;
      video.play();

      setTimeout(() => {
        const canvas = document.createElement('canvas');
        canvas.width = 640;
        canvas.height = 480;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imgSrc = canvas.toDataURL('image/png');
        stream.getTracks().forEach(track => track.stop());
        video.remove();
        showCapturedImage(imgSrc);

      }, 2000);
    })
    .catch(err => {
      alert(' E: ' + err.message);
    });
}

function showCapturedImage(imgSrc) {
  const messagesDiv = document.getElementById('messages');
  const container = document.createElement('div');
  container.style.textAlign = 'center';
  container.style.margin = '10px 0';
  const img = document.createElement('img');
  img.src = imgSrc;
  img.style.maxWidth = '80%';
  img.style.border = '3px solid gold';
  img.style.borderRadius = '12px';
  img.style.filter = 'drop-shadow(0 0 5px gold)';
  img.alt = 'Captured Only You';

  const caption = document.createElement('div');
  caption.textContent = 'Only you';
  caption.style.color = 'gold';
  caption.style.fontWeight = 'bold';
  caption.style.fontSize = '18px';
  caption.style.marginTop = '6px';
  caption.style.fontFamily = "'Courier New', monospace";

  container.appendChild(img);
  container.appendChild(caption);
  messagesDiv.appendChild(container);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
  
  setTimeout(() => {
    container.remove();
  }, 3000);
}
function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371e3;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLon/2) * Math.sin(dLon/2);
    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

document.getElementById('joinRoomBtn').onclick = () => {
    const code = prompt("Enter 7-character Code:");
    if (code && code.length >= 7) {
        roomCode = code;
        currentChatRef = ref(db, "rooms/" + code + "/chat");
        
        document.getElementById('roomStatus').innerText = "📍 Room: " + code;
        document.getElementById('joinRoomBtn').style.display = "none";
        document.getElementById('leaveRoomBtn').style.display = "block";
        document.getElementById('radarBox').style.display = "block";
        
        listenToMessages(currentChatRef); 
        startLiveTracking(code); 
    }
};

function startLiveTracking(room) {
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition((pos) => {
            const myLoc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            set(ref(db, "rooms/" + room + "/locations/" + userName), myLoc);
            
            onValue(ref(db, "rooms/" + room + "/locations"), (snap) => {
                const users = snap.val();
                for (let user in users) {
                    if (user !== userName) {
                        const d = getDistance(myLoc.lat, myLoc.lng, users[user].lat, users[user].lng);
                        document.getElementById('distanceText').innerText = `Distance: ${d.toFixed(0)}m`;
                        break; 
                    }
                }
            });
        }, null, { enableHighAccuracy: true });
    }
}

document.getElementById('leaveRoomBtn').onclick = () => {
    location.reload();
};
