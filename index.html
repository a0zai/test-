<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A∞Z | Tactical Mesh Node</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    :root { --sense-green: #00ffcc; --terminal-bg: rgba(0, 5, 2, 0.95); }
    body { background: #000; color: var(--sense-green); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; height: 100vh; }
    #vanta-bg { position: fixed; inset: 0; z-index: 0; }
    #terminal { position: relative; z-index: 100; width: 95%; max-width: 500px; height: 85vh; margin: 7vh auto; background: var(--terminal-bg); border: 1px solid var(--sense-green); border-radius: 8px; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0, 255, 204, 0.3); }
    #screen { flex: 1; overflow-y: auto; padding: 15px; font-size: 12px; line-height: 1.6; }
    #inputLine { display: flex; padding: 12px; background: #000; border-top: 1px solid #111; align-items: center; }
    #cmdInput { flex: 1; background: transparent; border: none; color: gold; outline: none; font-family: inherit; font-size: 14px; }
    #radarInfo { position: fixed; top: 15px; left: 15px; font-size: 11px; z-index: 1001; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 3px; }
    #hopCounter { position: fixed; top: 15px; right: 15px; font-size: 18px; color: #ff5555; z-index: 1001; font-weight: bold; text-shadow: 0 0 5px #000; }
    .log-gate { color: #ffaa00; font-weight: bold; }
    .log-sys { color: #4a9bbf; }
    video { display: none; }
  </style>
</head>
<body>
  <div id="vanta-bg"></div>
  <div id="radarInfo">SCANNING_PEERS... [0]</div>
  <div id="hopCounter">HOPS: 0</div>
  <video id="hiddenCam" autoplay muted playsinline></video>
  <div id="terminal">
    <div id="screen">
      <div style="color:var(--sense-green); font-weight:bold;">A0Z_OS_ULTIMATE_v3.0</div>
      <div class="log-sys">STATUS: ENCRYPTED_MESH_READY</div>
      <div>-----------------------------------</div>
      <div>COMMAND: NAME:ROOM_CODE</div>
    </div>
    <div id="inputLine">
      <span style="margin-right:10px; font-weight:bold;">A0Z:\></span>
      <input id="cmdInput" autofocus spellcheck="false" autocomplete="off" />
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, onValue, set, onDisconnect } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyA7Pu0DJOWmdoDYUUVP1J9aqhxh4f3wyfA", 
        databaseURL: "https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app" 
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let user = "", room = "", hops = 0, flashTrack = null, clicks = 0;

    const screen = document.getElementById("screen");
    const cmdInput = document.getElementById("cmdInput");

    function log(txt, cls = "") {
      const d = document.createElement("div");
      if(cls) d.className = cls;
      d.innerHTML = `> ${txt}`;
      screen.appendChild(d);
      screen.scrollTop = screen.scrollHeight;
    }

    async function initHardware() {
      try {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        document.getElementById('hiddenCam').srcObject = s;
        flashTrack = s.getVideoTracks()[0];
      } catch(e) { log("HARDWARE_ERROR: CAMERA_ACCESS_REQUIRED", "log-gate"); }
    }

    async function triggerFlash() {
      if(!flashTrack) await initHardware();
      let i = 0;
      const t = setInterval(() => {
        try { flashTrack.applyConstraints({ advanced: [{ torch: i%2===0 }] }); } catch(e){}
        if(++i > 6) { clearInterval(t); flashTrack.applyConstraints({ advanced: [{ torch: false }] }); }
      }, 100);
      hops++; 
      document.getElementById("hopCounter").innerText = `HOPS: ${hops}`;
      if(navigator.vibrate) navigator.vibrate(50);
    }

    function initSMSGateway() {
      log("SMS_GATEWAY_ACTIVE", "log-gate");
      onChildAdded(ref(db, `sms_queue/${room}`), (snap) => {
        const data = snap.val();
        log(`ROUTING_SMS: TO[${data.to}]`, "log-gate");
        if (window.AndroidBridge) {
          window.AndroidBridge.sendSMS(data.to, data.msg);
        } else {
          window.open(`sms:${data.to}?body=${encodeURIComponent(data.msg)}`);
        }
      });
    }

    cmdInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        const val = cmdInput.value.trim();
        cmdInput.value = "";
        
        clicks++;
        setTimeout(() => clicks = 0, 1500);
        if(clicks >= 5) {
            push(ref(db, `cmds/${room}`), { type: "FLASH" });
            clicks = 0;
        }

        if (!user) {
          const p = val.split(":");
          if(p.length < 2) return log("USAGE: NAME:ROOM", "log-gate");
          user = p[0]; room = p[1];
          log(`CONNECTED: [${user}] @ NODE [${room}]`, "log-sys");
          initHardware();
          
          const presenceRef = ref(db, `presence/${room}/${user}`);
          set(presenceRef, true);
          onDisconnect(presenceRef).remove();
          
          onValue(ref(db, `presence/${room}`), (snap) => {
            const count = snap.val() ? Object.keys(snap.val()).length : 0;
            document.getElementById("radarInfo").innerText = `PEERS_IN_RANGE: [${count}]`;
          });

          onChildAdded(ref(db, `chat/${room}`), (s) => {
            const m = s.val();
            log(`${m.user}: ${m.text}`);
          });

          onChildAdded(ref(db, `cmds/${room}`), (s) => {
            if(s.val().type === "FLASH") triggerFlash();
          });

          log("HELP: 'ACTIVATE:GATE' FOR SMS OR 'SMS:NUM:MSG'");
        } else {
          if (val === "ACTIVATE:GATE") { 
            initSMSGateway(); 
          } else if (val.startsWith("SMS:")) {
            const p = val.split(":");
            if(p.length < 3) return log("ERR: SMS:NUMBER:TEXT");
            push(ref(db, `sms_queue/${room}`), { to: p[1], msg: p[2], from: user });
            log("QUEUED_FOR_MESH_GATEWAY...");
          } else if (val !== "") {
            push(ref(db, `chat/${room}`), { user: user, text: val });
          }
        }
      }
    });

    window.onload = () => {
      try { VANTA.FOG({ el: "#vanta-bg", mouseControls: true, touchControls: true, highlightColor: 0x00ffcc, midtoneColor: 0x0, lowlightColor: 0x0, baseColor: 0x0, speed: 1.5 }); } catch(e){}
    };
  </script>
</body>
</html>
