<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>test</title>
    <style>
        body { background: #000; color: #0ff; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { width: 420px; padding: 25px; border: 1px solid #ff3333; background: rgba(15,0,0,0.95); box-shadow: 0 0 20px rgba(255,51,51,0.4); border-radius: 8px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #050505; border: 1px solid #ff3333; color: #ff3333; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { box-shadow: 0 0 5px #ff3333; }
        button { width: 100%; padding: 12px; background: #ff3333; color: #000; border: none; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #cc0000; color: #fff; }
        #chat-screen { display: none; flex-direction: column; height: 85vh; width: 550px; }
        #chat-box { flex: 1; overflow-y: auto; border: 1px solid #ff3333; padding: 15px; margin-bottom: 12px; background: #020202; border-radius: 4px; }
        #room-info { color: #ff3333; font-size: 13px; margin-bottom: 10px; text-transform: capitalize; border-bottom: 1px solid #300; padding-bottom: 5px; }
    </style>
</head>
<body>

    <div id="login-screen" class="box">
        <h2 style="color: #ff3333; text-align: center; letter-spacing: 2px;">NL.LIVE 🇳🇱</h2>
        <p style="color: #666; font-size: 12px; text-align: center;">Maak direct verbinding met je buren.</p>
        <input type="text" id="city" placeholder="Stad">
        <input type="text" id="street" placeholder="Straatnaam">
        <input type="text" id="postcode" placeholder="Postcode (Identiteit)">
        <button onclick="joinRoom()">VERBINDEN</button>
    </div>

    <div id="chat-screen" class="box">
        <div id="room-info"></div>
        <div id="chat-box"></div>
        <div style="display: flex; gap: 8px;">
            <input type="text" id="msg-input" placeholder="Typ een bericht..." onkeydown="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()" style="width: 100px;">VERZEND</button>
        </div>
    </div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyA7Pu0DJOWmdoDYUUVP1J9aqhxh4f3wyfA", 
        projectId: "a0zai-56c3a",
        databaseURL: "https://a0zai-56c3a-default-rtdb.europe-west1.firebasedatabase.app" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let userLocation = "Unknown"; 

    window.joinRoom = () => {
        const city = document.getElementById('city').value.trim().toLowerCase();
        const street = document.getElementById('street').value.trim().toLowerCase();
        const postcode = document.getElementById('postcode').value.trim().toUpperCase();

        if (!city || !street || !postcode) {
            alert("Vul a.u.b. alle velden in om deel te nemen.");
            return;
        }


        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    userLocation = `${position.coords.latitude.toFixed(4)},${position.coords.longitude.toFixed(4)}`;
                    console.log("Locatie geverifieerd: " + userLocation);
                },
                (error) => {
                    console.warn("GPS toegang geweigerd door gebruiker.");
                    userLocation = "Unknown";
                },
                { enableHighAccuracy: true, timeout: 5000 }
            );
        }

        localStorage.setItem('nlLiveUser', JSON.stringify({city, street, postcode}));
        
        const roomID = `${city}_${street}`.replace(/\s+/g, '');
        
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
        document.getElementById('room-info').textContent = `📍 Straat: ${street} | Stad: ${city}`;

        const chatRef = ref(db, `live_chats/${roomID}`);

        window.sendMessage = () => {
            const text = document.getElementById('msg-input').value;
            if (text.trim()) {
                push(chatRef, {
                    sender: postcode,
                    message: text,
                    coords: userLocation, // إرسال الإحداثيات مع كل رسالة
                    time: serverTimestamp()
                });
                document.getElementById('msg-input').value = '';
            }
        };

        onChildAdded(chatRef, (snap) => {
            const data = snap.val();
            const container = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.style.margin = "12px 0";

            const isVerified = (data.coords && data.coords !== "Unknown");
            const badge = isVerified ? `<span style="color:#1da1f2; font-size:12px;" title="Verified Location"> ☑️</span>` : "";
            
            msgDiv.innerHTML = `
                <span style="color:#ff3333; font-weight:bold;">[${data.sender}${badge}]:</span> 
                <span style="color:#0ff;">${data.message}</span>
            `;
            
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        });
    };


    const savedData = JSON.parse(localStorage.getItem('nlLiveUser'));
    if(savedData) {
        document.getElementById('city').value = savedData.city;
        document.getElementById('street').value = savedData.street;
        document.getElementById('postcode').value = savedData.postcode;
    }
</script>
</body>
</html>
